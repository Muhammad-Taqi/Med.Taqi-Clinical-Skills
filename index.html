stals - indicates respiratory distress", "🔁 **Breathing pattern:** Cheyne-Stokes (HF/CNS), Kussmaul (DKA), paradoxical (flail chest)", "🔊 **Audible sounds:** Stridor (upper airway obstruction), wheeze (lower obstruction)"]}, {"icon": "02", "title": "Hands, Arms & Peripheral Signs", "subtitle": "Nails → wrists → radial pulse → tremor", "bullets": ["**Clubbing**: Causes: **Fibrosis** (IPF), bronchiectasis, empyema, lung cancer, mesothelioma, cystic fibrosis", "**Peripheral cyanosis**: Bluish fingertips → vasoconstriction or desaturation", "**Nicotine staining**: Yellow-brown nails - smoking (COPD, lung cancer risk)", "**Wrist flap (asterixis)**: CO2 retention - ask patient to extend wrists >15 sec. Flapping = type 2 resp failure (COPD)", "💊 **Fine tremor:** Beta-2 agonist overuse (salbutamol) - always check medication history", "🫀 **Radial pulse:** Rate, rhythm. Tachycardia = infection/PE/distress. Bounding = CO2 retention", "🔴 **Lymph nodes:** Axillary - malignancy, TB"]}, {"icon": "03", "title": "Face & Neck", "subtitle": "Eyes, mouth, trachea, lymph nodes", "bullets": ["💙 **Central cyanosis:** Tongue and lips - clinically evident at SaO2 <85%", "👁️ **Conjunctival pallor:** Anaemia - worsens dyspnoea", "👁️ **Horner's syndrome:** Ptosis + miosis + anhidrosis → Pancoast tumour (lung apex)", "😮 **Pursed-lip breathing:** COPD - keeps airways open by creating back-pressure", "🗣️ **Hoarse voice:** Recurrent laryngeal nerve palsy - lung cancer, aortic aneurysm", "§Trachea - Critical Step", "📏 **Cricosternal distance:** <3 cm = hyperinflation (COPD, asthma)", "🔴 **Cervical lymphadenopathy:** TB, sarcoidosis, lymphoma, lung cancer metastases - palpate all chains", "🌊 **Tracheal tug:** Trachea pulls down on inspiration = severe airflow obstruction / hyperinflation", "🫀 **Raised JVP:** Cor pulmonale (chronic hypoxic lung disease), SVC obstruction (lung cancer)"], "think": {"label": "CAUTION!", "text": "**Feel for tracheal position:** Place index finger in suprasternal notch. Central = normal. Deviated TOWARDS lesion = collapse/fibrosis. Deviated AWAY = tension pneumothorax, large effusion, large mass"}}, {"icon": "04", "title": "Chest Expansion", "subtitle": "Compare anterior then posterior - both sides", "bullets": ["🤲 Place thumbs at xiphisternum (anterior) or spinous process (posterior), fingers wrap around sides", "📏 Thumbs should separate symmetrically ≥5 cm on deep inspiration", "⚖️ **Reduced bilaterally:** COPD, asthma, neuromuscular (poor inspiratory effort)", "⚖️ **Reduced unilaterally:** Pleural effusion, pneumothorax, consolidation/collapse on THAT side", "🔼 Upper zone expansion (hands at clavicles) - reduced = apical fibrosis (TB, sarcoid), Pancoast"]}, {"icon": "05", "title": "Percussion", "subtitle": "Map the lungs - compare side to side", "bullets": ["§Technique", "✋ Place middle finger of non-dominant hand flat on chest wall, parallel to ribs", "🔨 Strike middle phalanx briskly with tip of dominant middle finger - use wrist flick", "🔄 Percuss apex → base comparing LEFT vs RIGHT at each level. Include lateral chest walls", "📍 Percuss anteriorly (2nd, 4th, 6th ICS), posteriorly (T2, T4, T6, T8 levels), axillae", "§Percussion Notes - Differential Diagnosis", "**Resonant**: Normal hollow sound · Normal lung", "**Hyperresonant**: Booming / drum-like · Pneumothorax, emphysema (hyperinflation)", "**Dull**: Thud - like percussing thigh · Consolidation (pneumonia), collapse, tumour", "**Stony dull**: Absolute dullness - no resonance · Pleural effusion (fluid replaces air)", "**Cardiac dullness**: Dull left anterior chest · Normal - cardiac shadow. Increased = pericardial effusion"], "think": {"label": "THINK!", "text": "Percuss the **liver dullness** (right side, below 5th ICS anteriorly) - hyperresonance over liver = hyperinflation. Liver descended below rib margin in COPD"}}, {"icon": "06", "title": "Auscultation - Breath Sounds & Added Sounds", "subtitle": "The most information-dense step", "bullets": ["§Technique", "🩺 Use diaphragm - compare left vs right at same levels (apex → base, anterior, posterior, axillae)", "😮‍💨 Ask patient to breathe through mouth - normal quiet breathing, then deep breaths if needed", "🔄 Listen for full cycle (inspiration + expiration) at each location", "§Breath Sound Types", "**Vesicular**: Soft, rustling. Insp > exp · Most lung fields · -", "**Bronchial**: Harsh, tubular. Exp ≥ insp. Pause between · Only over trachea/manubrium · Consolidation, collapse + patent bronchus, fibrosis", "**Bronchovesicular**: Intermediate · Hilar regions · Consolidation at hilar level", "**Absent / Reduced**: Quiet or inaudible · Never normal peripherally · Effusion, pneumothorax, collapse, obesity, poor effort", "§Added (Adventitious) Sounds", "**Fine Crackles (crepitations)**: Late inspiratory, basal. **Pulmonary fibrosis** (Velcro-like), pulmonary oedema. Don't clear with cough", "**Coarse Crackles**: Early inspiratory, any level. Bronchiectasis, pneumonia, COPD. May change with cough", "**Wheeze (rhonchi)**: High-pitched, musical. Expiratory predominant. **Asthma, COPD**. Polyphonic = widespread obstruction", "**Monophonic wheeze**: Single pitch - fixed partial obstruction: foreign body, endobronchial tumour", "**Stridor**: Inspiratory high-pitched - **upper airway** obstruction: croup, epiglottitis, foreign body, tumour. EMERGENCY if new", "**Pleural Rub**: Creaking, leathery, both phases. **Pleuritis** - PE, pneumonia, TB, malignancy", "§Vocal Resonance (Tactile Fremitus)", "🗣️ Ask patient to say \"99\" repeatedly. Place stethoscope and compare sides", "📢 **Increased resonance:** Consolidation (sound conducts well through solid lung) - bronchophony, aegophony (\"e\" → \"A\")", "🔇 **Decreased resonance:** Pleural effusion (fluid absorbs sound), pneumothorax, collapse", "🔊 **Whispering pectoriloquy:** Whispered \"99\" clearly audible → consolidation"], "think": {"label": "CRITICAL!", "text": "**To complete your exam:** SpO2 monitoring, peak flow, sputum examination, CXR, CT thorax if indicated, ABGs (if type 2 RF suspected), spirometry"}}, {"icon": "07", "title": "Classic Respiratory Exam Syndromes", "subtitle": "Quick-reference pattern recognition", "bullets": ["**Normal**: Equal · Central · Resonant · Vesicular · Normal", "**Consolidation**: ↓ ipsilateral · Central · Dull · Bronchial · ↑", "**Pleural Effusion**: ↓ ipsilateral · Away (if large) · Stony dull · Absent (± rub) · ↓", "**Pneumothorax**: ↓ ipsilateral · Away (if tension) · Hyperresonant · Absent · ↓", "**Collapse**: ↓ ipsilateral · Towards · Dull · Absent/bronchial · ↓", "**Fibrosis**: ↓ bilaterally · Towards (if unilateral) · Dull · Bronchial + fine crackles · ↑", "**COPD/Asthma**: ↓ bilaterally · Central (↓ cricosternal) · Hyperresonant · ↓ Vesicular + wheeze · ↓"]}], "diff": {"peds": ["Respiratory rate normal range varies hugely with age - always check age-specific norms before calling tachypnoea", "Wheeze in a young child is most commonly viral-induced (bronchiolitis, viral wheeze) rather than classic asthma", "Grunting, head bobbing, and nasal flaring are red-flag signs of significant distress unique to infants"], "adult": ["Clubbing carries a broader adult differential list to work through, with malignancy always high on that list", "Chronic occupational exposure history (asbestos, coal, silica) is essential in adults with a restrictive pattern or fibrosis"]}}, {"key": "git", "name": "Abdominal (GIT) Examination", "short": "Abdo", "accent": "#ca8a04", "icon": "🫃", "tagline": "Inspect, palpate, percuss, auscultate (GIT reverses the order)", "steps": [{"icon": "01", "title": "Preparation & Peripheral Signs", "subtitle": "Position patient correctly - peripheral stigmata of GI disease", "bullets": ["🛏️ Patient supine, one pillow, abdomen exposed from nipples to pubic symphysis. Expose legs later", "💡 Ensure good tangential lighting - raking light reveals subtle contours", "§Hands (GI peripheries)", "**Clubbing**: Cirrhosis, IBD (Crohn's), coeliac, GI lymphoma", "**Leukonychia**: Hypoalbuminaemia → cirrhosis, malnutrition", "**Palmar erythema**: Liver disease (oestrogen excess)", "**Dupuytren's contracture**: Alcoholic liver disease", "**Asterixis**: Hepatic encephalopathy → outstretched hands, coarse flap", "**Excoriations**: Cholestatic jaundice (bile salt deposition → itch)", "§Face & Eyes", "🟡 **Jaundice (sclerae):** Pre-hepatic (haemolysis - lemon yellow, dark urine absent, dark stools), hepatic (orange-yellow, dark urine, pale stools), post-hepatic (obstructive - deep yellow/green, dark urine, pale stools, itch)", "⬜ **Anaemia:** Pallor of conjunctivae → GI blood loss (ulcer, cancer, IBD), malabsorption (coeliac, B12)", "🔵 **Parotid enlargement:** Bilateral → alcoholic liver disease, eating disorders", "💧 **Mouth:** Angular stomatitis (iron/B12), apthous ulcers (Crohn's, coeliac), glossitis, pigmentation (Peutz-Jeghers)"]}, {"icon": "02", "title": "Inspection of the Abdomen", "subtitle": "Look before you touch - 9 regions, all layers", "bullets": ["§Inspect From the Side and Foot of Bed", "📐 **Contour:** Scaphoid (malnutrition, dehydration), flat, protuberant (fat, flatus, fluid, faeces, fetus, fatal masses, fibroids)", "🔄 **Symmetry:** Asymmetric distension → organomegaly, mass, localised obstruction", "🌊 **Movement with breathing:** Normal = abdominal movement. Absent = peritonitis (patient doesn't breathe abdominally)", "✂️ **Scars:** Note location → midline (laparotomy), RIF (appendicectomy), RUQ (cholecystectomy - laparoscopic ports), flank (nephrectomy), Pfannenstiel (gynaecology/Caesarean)", "💜 **Dilated veins:** Caput medusae (portal hypertension - flow away from umbilicus). IVC obstruction (flow upward)", "🔵 **Visible peristalsis:** Small bowel obstruction (thin patient), pyloric stenosis (infant)", "🟣 **Skin changes:** Striae (pregnancy, Cushing's, rapid weight change), bruising (Grey-Turner = retroperitoneal bleed, Cullen's = periumbilical → haemoperitoneum - pancreatitis/ectopic)", "🫁 **Hernias:** Umbilical, paraumbilical, inguinal, femoral - ask patient to cough"]}, {"icon": "03", "title": "Palpation", "subtitle": "Light then deep - 9 regions - watch the face!", "bullets": ["⚠️ **ALWAYS ASK about pain first** - start away from the painful area. Watch the patient's FACE, not your hand", "🖐️ **Light palpation first:** All 9 regions. Assess: tenderness, guarding (voluntary vs involuntary), rigidity, superficial masses", "✊ **Deep palpation:** Masses - site, size, shape, surface, consistency, edge, mobility, pulsatility, tenderness", "§Specific Palpation Signs", "**Guarding**: Involuntary muscle rigidity = peritoneal irritation. Board-like rigidity = generalised peritonitis", "**Rebound tenderness**: Pain on release > pressure = peritonism. Use percussion instead (kinder to patient)", "**Murphy's sign**: Two fingers RUQ → patient inhales deeply → catches breath = acute cholecystitis (positive Murphy's)", "**Rovsing's sign**: Palpation in LIF → pain in RIF = appendicitis (referred tenderness via peritoneal irritation)", "**McBurney's point**: 1/3 of the way from ASIS to umbilicus → maximal tenderness in appendicitis", "**Psoas sign**: Extend hip against resistance → RIF pain = retrocaecal appendicitis or psoas abscess"]}, {"icon": "04", "title": "Liver, Spleen & Kidney Examination", "subtitle": "Organomegaly - palpate + percuss + measure", "bullets": ["§Liver", "⬇️ Start in RIF, move diagonally toward RUQ on inspiration - feel for firm lower edge", "📏 Measure span by percussion: upper border (resonant→dull - 5th intercostal space MCL), lower border (dull→resonant). Normal span: 12-15 cm", "🔊 Auscultate for bruit (hepatocellular carcinoma, AVM) or rub (perihepatitis, infarction)", "**Hepatomegaly - Causes**: Cirrhosis, hepatitis, fatty liver, cardiac failure (nutmeg liver), haematological malignancy, hepatocellular carcinoma, metastases, hydatid cyst", "**Characteristics to report**: Size (cm below costal margin), surface (smooth vs nodular), consistency (soft/firm/hard), tender, pulsatile (TR), bruit", "§Spleen", "⬆️ Start in RIF, palpate toward LUQ - spleen enlarges diagonally toward right iliac fossa", "🔄 Cannot get above it (goes under costal margin), notched medial border, dull to percussion, moves with respiration, NOT ballottable", "📐 If not felt - confirm with percussion: Traube's space (9th-11th rib, midaxillary line) normally resonant. Dullness = splenomegaly", "**Splenomegaly Causes**: Haematological: haemolytic anaemia, lymphoma, leukaemia, myelofibrosis. Infective: EBV, malaria, schistosomiasis. Portal HTN: cirrhosis. Autoimmune: SLE, RA (Felty's)", "**Massive Splenomegaly**: Crosses midline to RIF. Causes: CML, myelofibrosis, malaria, visceral leishmaniasis (kala-azar), Gaucher's disease", "§Kidneys (Ballottement)", "🫙 Bimanual technique: one hand posteriorly (push forward), one anteriorly (feel for ballot) - renal mass can be ballotted unlike spleen", "🔵 Can get above kidney (unlike spleen), resonant to percussion (overlying bowel), does NOT move with respiration"]}, {"icon": "05", "title": "Percussion & Ascites", "subtitle": "Tympanic vs dull - shifting dullness - fluid thrill", "bullets": ["🥁 Normal abdomen: **tympanic** (hollow viscera containing gas). Dullness = solid organ or fluid", "📍 Percuss systematically - all 9 regions. Note borders of organs", "§Ascites Detection", "**Shifting Dullness**: Percuss from umbilicus toward flank - note where dullness begins. Hand stays still. Patient rolls away 45°. Wait 30 sec. Percuss again - dullness shifts (fluid moves with gravity). Sensitive: detects ~1500 mL of ascites", "**Fluid Thrill**: One hand flat on one flank. Flick the other flank. Ask patient/assistant to press ulnar edge of hand along midline (stops fat wave). Feel a thrill transmitted = large volume ascites (>2L). Less sensitive than shifting dullness", "§Causes of Ascites (by SAAG)", "**Liver cirrhosis (most common), cardiac failure, Budd-Chiari, portal vein thrombosis**: Malignancy (peritoneal mets), TB peritonitis, pancreatitis, nephrotic syndrome"]}, {"icon": "06", "title": "Auscultation & Completion", "subtitle": "Bowel sounds, bruits, hernia orifices, PR exam", "bullets": ["§Bowel Sounds", "🔊 Listen in **one area for 2 minutes** before declaring absent. Normal = intermittent gurgles every 5-30 sec", "📢 **Hyperactive / tinkling:** Mechanical bowel obstruction (intermittent, high-pitched), gastroenteritis, early obstruction", "🔇 **Absent:** Paralytic ileus (post-op, peritonitis, electrolyte disturbance, drugs)", "§Bruits", "🩺 Aorta (epigastrium) - aortic aneurysm. Renal arteries (lateral to midline) - renal artery stenosis (renovascular HTN). Hepatic - HCC, AVM. Splenic - splenic artery aneurysm", "§To Complete", "🦵 Examine hernial orifices (inguinal, femoral) - ask to cough, check reducibility", "🫀 Check for external genitalia (scrotal swelling, varicocele in males)", "🩻 Offer digital rectal examination (DRE) - essential for PR bleeding, constipation, prostate", "🌡️ Check temperature chart, urine dipstick. Review LFTs, amylase, lipase, U&E as indicated"], "think": {"label": "CRITICAL!", "text": "**Never forget DRE in rectal bleeding, change in bowel habit, or suspected appendicitis!** A rectal carcinoma is palpable in ~75% of cases. PR blood on the glove = crucial finding."}}]}, {"key": "cns", "name": "CNS Examination", "short": "CNS", "accent": "#7c3aed", "icon": "🧠", "tagline": "Higher functions, cranial nerves, motor, sensory, cerebellar", "steps": [{"icon": "01", "title": "General Inspection & Mental State", "subtitle": "Before detailed neuro exam - always start here", "bullets": ["🙋 Introduce, gain consent. Note: orientation in time, place and person as you speak", "👁️ **Appearance:** Facial asymmetry, facial palsy, ptosis, abnormal eye movements, abnormal posture", "🗣️ **Speech:** Dysarthria (slurred = cerebellar/UMN), dysphasia (expressive/receptive/nominal - dominant hemisphere)", "🔄 **Involuntary movements:** Tremor (resting vs intention), chorea, hemiballismus, myoclonus, tics, fasciculations", "🚶 **Gait (if ambulatory):** Hemiplegic (circumduction), cerebellar (wide-based, ataxic), Parkinsonian (stooped, shuffling, festinant), high-stepping (foot drop), waddling (proximal myopathy), antalgic", "**GCS (Glasgow Coma Scale)**: Eye (1-4) + Verbal (1-5) + Motor (1-6) = /15. Always document separately, not just total", "**MMSE / ACE-III**: Orientation, registration, attention, recall, language, visuospatial. <24/30 = cognitive impairment"]}, {"icon": "02", "title": "Cranial Nerves I-VI", "subtitle": "Olfactory → Abducens - systematic testing", "bullets": ["**I**: Olfactory · Each nostril - smell coffee/peppermint (not ammonia!) · Anosmia → frontal lobe tumour, head injury, COVID-19, meningioma", "**II**: Optic · Visual acuity (Snellen), visual fields (confrontation), colour vision, fundoscopy, RAPD · RAPD = optic neuritis (MS). Field defects → localise the lesion", "**III**: Oculomotor · Pupil response to light and accommodation, eye movements (H-pattern), ptosis · Fixed dilated pupil + ptosis = CN3 palsy (aneurysm PCOA, herniation)", "**IV**: Trochlear · Downward/inward eye movement (looking down stairs), vertical diplopia · Head tilt to compensate → superior oblique palsy", "**V**: Trigeminal · Sensation V1/V2/V3 (forehead/cheek/chin) with cotton wool + pinprick. Motor: jaw clench + open against resistance. Corneal reflex · Facial numbness → brainstem, cerebellopontine angle, cavernous sinus", "**VI**: Abducens · Lateral eye movement - failure to abduct → convergent squint · False localising sign of raised ICP. Also MS, Wernicke's, pontine lesion", "§Visual Field Defects - Key Patterns", "**Monocular blindness**: Retina or optic nerve (before chiasm). Ipsilateral eye affected", "**Bitemporal hemianopia**: Optic chiasm compression - pituitary adenoma, craniopharyngioma", "**Homonymous hemianopia**: Optic tract/radiation/occipital cortex - MCA stroke, PCA stroke", "**Superior quadrantanopia**: Temporal lobe (Meyer's loop) - \"pie in the sky\"", "**Inferior quadrantanopia**: Parietal lobe radiation - \"pie on the floor\"", "**Macular sparing**: Occipital cortex (dual blood supply) - posterior cerebral artery infarct"]}, {"icon": "03", "title": "Cranial Nerves VII-XII", "subtitle": "Facial → Hypoglossal - lower cranial nerves", "bullets": ["**VII**: Facial · Raise eyebrows, screw eyes shut (against resistance), puff cheeks, show teeth, smile. Taste (anterior ⅔ tongue) · UMN: forehead spared (bilateral cortical supply). LMN: forehead involved → Bell's palsy, parotid tumour, acoustic neuroma", "**VIII**: Vestibulocochlear · Hearing - whisper test (2 feet, repeat numbers). Rinne's test (fork 512 Hz on mastoid vs air). Weber's test (fork on vertex) · Rinne's: BC>AC = conductive deafness. Weber lateralises to bad ear = conductive; good ear = sensorineural. Acoustic neuroma", "**IX & X**: Glossopharyngeal & Vagus · Say \"Ahh\" - palate rises symmetrically. Gag reflex (afferent IX, efferent X). Swallowing. Hoarse voice (X) · Palate deviates AWAY from lesion. Absent gag = dysphagia risk. Unilateral vocal cord = recurrent laryngeal nerve palsy", "**XI**: Accessory · Shrug shoulders against resistance (trapezius). Turn head against resistance (sternocleidomastoid) · Weakness on ipsilateral side. Jugular foramen syndrome (IX, X, XI together)", "**XII**: Hypoglossal · Protrude tongue - straight? Any wasting? Fasciculations? · UMN: tongue deviates AWAY from lesion. LMN: deviates TOWARDS lesion (ipsilateral), with wasting + fasciculations"], "think": {"label": "THINK!", "text": "**Rinne's Mnemonic:** Rinne's Positive (AC>BC) = Normal OR Sensorineural deafness. Rinne's Negative (BC>AC) = Conductive deafness. Weber lateralises towards worse ear in conductive, towards better ear in sensorineural."}}, {"icon": "04", "title": "Motor Examination - Upper Limbs", "subtitle": "Inspection → tone → power → reflexes", "bullets": ["§Inspection", "👁️ Wasting (LMN / disuse), fasciculations (LMN - ALS), tremor, abnormal posture", "✋ Pronator drift: arms outstretched, eyes closed, 30 sec → ipsilateral pronation + drift = UMN pyramidal weakness", "§Tone", "🔄 Passively flex/extend elbow and wrist - examine relaxed limb", "⬆️ **Increased tone:** Spasticity (clasp-knife) = UMN lesion. Rigidity (lead-pipe, cogwheel) = Parkinson's, extrapyramidal", "⬇️ **Decreased tone:** Hypotonia = LMN lesion, cerebellar lesion, acute spinal shock", "§Power - MRC Scale", "**0**: No contraction", "**1**: Flicker / visible contraction, no movement", "**2**: Movement with gravity eliminated", "**3**: Movement against gravity but not resistance", "**4**: Movement against some resistance (4−/4/4+)", "**5**: Normal power", "§Upper Limb Power Testing", "**Shoulder abduction (C5)**: Deltoid - \"push arms out to sides, don't let me push them down\"", "**Elbow flexion (C5,C6)**: Biceps - \"pull arm up, don't let me straighten it\"", "**Elbow extension (C7)**: Triceps - \"push arm straight, don't let me bend it\"", "**Wrist extension (C7)**: Finger/wrist extensors", "**Grip (C8)**: \"Squeeze my fingers as hard as you can\"", "**Finger spread (T1)**: Interossei - \"spread fingers, don't let me push them together\"", "§Upper Limb Reflexes"], "think": {"label": "CAUTION!", "text": "Reflexes: Grade as 0 (absent), + (reduced), ++ (normal), +++ (brisk), ++++ (clonus). **Absent + fasciculations = LMN. Brisk + clonus + Babinski = UMN.**"}}, {"icon": "05", "title": "Motor Examination - Lower Limbs", "subtitle": "Tone → power → reflexes → Babinski", "bullets": ["§Tone", "🔄 Roll thigh from side to side - foot moves freely = normal. Rigid = increased tone", "🦵 Rapidly flex/extend knee and hip - assess resistance", "⚡ Ankle clonus: sharply dorsiflex ankle and sustain - >3 beats = UMN pathology", "§Lower Limb Power Testing", "**Hip flexion (L1,L2)**: \"Lift your leg off the bed, don't let me push it down\" - iliopsoas", "**Hip extension (L4,L5)**: Gluteus maximus - push leg back into bed against resistance", "**Knee flexion (L5,S1)**: Hamstrings - \"pull heel towards buttocks\"", "**Knee extension (L3,L4)**: Quadriceps - \"straighten knee, don't let me bend it\"", "**Ankle dorsiflexion (L4,L5)**: Tibialis anterior - \"pull foot up towards you\"", "**Ankle plantarflexion (S1,S2)**: \"Push foot down like pressing accelerator\"", "**Big toe extension (L5)**: Extensor hallucis longus - key L5 root test", "**Hip abduction / adduction**: L4/L5 abduction (gluteus medius). L2/L3 adduction (adductors)", "§Lower Limb Reflexes", "**Knee jerk (L3,L4)**: Tap patellar tendon - quadriceps contraction", "**Ankle jerk (S1,S2)**: Dorsiflex foot slightly, tap Achilles tendon", "**Plantar reflex (L5,S1)**: Stroke lateral sole heel → toes. Flexion = normal. **Babinski (extension + fanning) = UMN lesion**", "**Cremasteric reflex (L1,L2)**: Stroke inner thigh → testis elevates. Absent = cord lesion above L1"], "think": {"label": "CRITICAL!", "text": "**Upgoing plantar (Babinski sign) = UMN lesion above L5/S1.** Always document which foot. Both upgoing = bilateral UMN - cord lesion, bilateral strokes, cerebral palsy"}}, {"icon": "06", "title": "Sensory Examination", "subtitle": "Light touch, pinprick, vibration, proprioception, temperature", "bullets": ["§Sensory Modalities - What They Test", "**Light touch (cotton wool)**: Dorsal columns + spinothalamic. Compare distal → proximal, dermatomal pattern", "**Pinprick (neurotip)**: Lateral spinothalamic tract (crosses immediately). \"Sharp or dull?\" Test same levels", "**Temperature**: Lateral spinothalamic. Tuning fork (cold metal) or hot/cold tubes", "**Vibration (128 Hz fork)**: Dorsal columns (ascend ipsilaterally). Start at big toe → ankle → knee → ASIS if impaired", "**Proprioception (Joint position sense)**: Dorsal columns. Hold lateral surfaces of distal phalanx. Move up/down with eyes closed. \"Which way?\" Start distally", "**Two-point discrimination**: Cortical sensation - parietal lobe. Normal fingertip <5 mm", "§Sensory Level - Spinal Cord Localisation", "**C4**: Clavicles (cape area)", "**T4**: Nipple line", "**T6**: Xiphisternum", "**T10**: Umbilicus", "**T12/L1**: Inguinal ligament", "**L3**: Anterior knee", "**L4**: Medial shin / great toe", "**L5**: Lateral shin / dorsum foot / big toe", "**S1**: Lateral foot / sole", "**S3-S5**: Perianal / saddle area"], "think": {"label": "THINK!", "text": "**Dissociated sensory loss:** Spinothalamic (pain/temp) lost but dorsal column (vibration/proprioception) intact at same level → syringomyelia, Brown-Séquard syndrome. The reverse pattern = posterior column lesion (subacute combined degeneration, B12 deficiency)"}}, {"icon": "07", "title": "Coordination & Cerebellar Function", "subtitle": "DANISH mnemonic - all cerebellar signs", "bullets": ["§DANISH Mnemonic", "**D - Dysdiadochokinesia**: Rapid alternating movements (pronation/supination) - irregular, slow = cerebellar", "**A - Ataxia (gait)**: Wide-based, unsteady, unable to tandem walk. Ipsilateral cerebellar lesion", "**N - Nystagmus**: Fast phase towards lesion (horizontal). Ask to follow finger to extremes of gaze", "**I - Intention tremor**: Worsens as target approaches (finger-nose test). Absent at rest", "**S - Scanning dysarthria**: Explosive, staccato speech (\"British Constitution\") - ask patient to repeat", "**H - Hypotonia**: Pendular knee jerk, reduced limb tone - ipsilateral to lesion", "§Coordination Tests", "👆 **Finger-nose test:** Touch nose → examiner's finger (move it!) → nose. Slow, watch for past-pointing and intention tremor", "🦵 **Heel-shin test:** Place heel on opposite knee, slide down shin to ankle. Smooth? Veering = ataxia", "🤲 **Dysdiadochokinesia:** Rapid pronation/supination on palm of other hand as fast as possible", "🧍 **Romberg's test:** Stand with feet together, eyes open then closed. Falls with eyes closed = dorsal column / proprioceptive deficit (not cerebellar - cerebellar ataxia is same with both eyes)", "🚶 **Tandem walk:** Heel-to-toe in straight line. Ataxia = cerebellar or vestibular"], "think": {"label": "CAUTION!", "text": "**Romberg positive (positive = FALLS with eyes closed):** Dorsal column disease (B12 deficiency, tabes dorsalis, MS). NOT a cerebellar test - cerebellar patients fall with eyes open AND closed."}}, {"icon": "08", "title": "UMN vs LMN - Localising the Lesion", "subtitle": "The fundamental distinction in all of neurology", "bullets": ["**Wasting**: Minimal / disuse only · Pronounced, early", "**Tone**: Increased (spasticity/rigidity) · Decreased (flaccid)", "**Power**: Pyramidal pattern weakness · Follows nerve/root distribution", "**Reflexes**: Brisk, clonus · Reduced / absent", "**Plantar**: Extensor (Babinski +ve) · Flexor (normal)", "**Fasciculations**: Absent · Present (LMN hallmark)", "§UMN Localisation", "**Cortex (motor cortex)**: Contralateral face + arm > leg weakness (MCA territory). Homunculus distribution", "**Internal capsule**", "**Brainstem**: Ipsilateral CN deficit + contralateral hemiplegia = crossed signs. Weber's / Wallenberg's syndromes", "**Spinal cord**: Bilateral UMN below level. Brown-Séquard = ipsilateral UMN + dorsal column loss, contralateral spinothalamic loss"], "think": {"label": "CRITICAL!", "text": "**To complete your CNS examination:** Fundoscopy (papilloedema in raised ICP), bedside cognitive testing (MMSE), gait assessment, sphincter assessment if cord lesion suspected, CT head / MRI brain/spine, and full bloods (B12, glucose, TFTs, syphilis serology if indicated)"}}]}, {"key": "msk", "name": "Musculoskeletal & Rheumatological Examination", "short": "MSK", "accent": "#ea580c", "icon": "🦴", "tagline": "Look, feel, move, special tests, joint by joint", "steps": [{"icon": "01", "title": "GALS Screen", "subtitle": "Gait, Arms, Legs, Spine - the rheumatological screening tool", "bullets": ["§3 Screening Questions First", "❓ \"Do you have any pain or stiffness in your muscles, joints or back?\"", "❓ \"Can you dress yourself completely without any difficulty?\"", "❓ \"Can you walk up and down stairs without any difficulty?\"", "§GALS Assessment", "**Gait**: Walk to far wall and back, turn, walk back. Observe all phases · Smooth, symmetric, heel strike, toe-off, arm swing", "**Arms**: Hands: spread fingers, make fist, grip, fine pinch. Elbow: fully extend. Shoulder: hands behind head (abduct + ER). TMJ: open mouth 3 fingers · Full range, no swelling, no pain", "**Legs**: Hips: flex/ER/IR (supine). Knee: flex, extend, patellar tap/effusion. Ankle + MTP: squeeze across joints. Foot inspection · Full range, no effusion, no tenderness", "**Spine**: Cervical: rotate, flex/extend. Lumbar: fingertip-to-floor (measure), modified Schober's. Thoracic kyphosis. Scoliosis · Full ROM, >5 cm Schober's, no kyphoscoliosis"]}, {"icon": "02", "title": "Hand & Wrist Examination", "subtitle": "Rheumatoid vs Osteoarthritis vs Psoriatic - key differentials", "bullets": ["§Look - Feel - Move", "👁️ **Inspect dorsum then palmar surface:** Swelling (which joints?), deformity, skin changes, muscle wasting, nail changes (pitting, onycholysis → psoriasis)", "✋ **Palpate:** MCP joints (squeeze), PIP joints (squeeze), wrist, DIP joints - warmth, tenderness, swelling type (bony = OA, soft = RA)", "🔄 **Active then passive movement:** Wrist extension/flexion, MCP/PIP/DIP flexion-extension, grip strength, fine pinch", "§Differential Diagnosis by Deformity", "**Ulnar deviation**: MCPs deviated ulnarly · Rheumatoid arthritis", "**Swan neck**: PIP hyperextension + DIP flexion · Rheumatoid arthritis, SLE", "**Boutonnière**: PIP flexion + DIP hyperextension · Rheumatoid arthritis", "**Z-thumb**: Thumb IP hyperextension + MCP flexion · Rheumatoid arthritis", "**Heberden's nodes**: Bony swelling at DIP joints · Osteoarthritis", "**Bouchard's nodes**: Bony swelling at PIP joints · Osteoarthritis", "**Sausage digits**: Dactylitis - whole digit swollen · Psoriatic arthritis, reactive arthritis", "**Tophaceous gout**: Chalky white deposits over joints · Chronic tophaceous gout"]}, {"icon": "03", "title": "Knee Examination", "subtitle": "Effusion tests, ligament stability, meniscal tests", "bullets": ["§Inspection", "👁️ Standing: genu valgum (knock-knee), genu varum (bow-legged), deformity, wasting of quadriceps (especially VMO)", "🛏️ Supine: swelling (supra/infrapatellar), erythema, scars, skin changes", "§Effusion Tests", "**Patellar Tap**: Empty suprapatellar pouch with one hand (slide from 10 cm above). With other hand, press patella sharply down. A \"tap\" felt = moderate-large effusion (>15 mL)", "**Bulge Sign (Stroke Test)**: Stroke medial side of knee up and out (empties medial gutter). Quickly stroke lateral side - fluid bulge appears on medial side. Small effusion (<10 mL)", "§Key Ligament Tests", "**Anterior Drawer / Lachman**: ACL - tibial anterior translation at 90° (drawer) or 20° flexion (Lachman, more sensitive)", "**Posterior Drawer**: PCL - posterior tibial sag at 90° (posterior sagging sign)", "**Valgus / Varus Stress**: MCL (valgus force) and LCL (varus force) - test at 30° flexion", "**McMurray's Test**: Flex knee fully, foot externally/internally rotated, extend → click/pain = meniscal tear"]}, {"icon": "04", "title": "Hip Examination", "subtitle": "FABER, FADIR, Trendelenburg, Thomas test", "bullets": ["§Key Hip Tests", "**Thomas Test**: Flex opposite hip fully (flattens lumbar lordosis). Affected leg rises off bed = fixed flexion deformity. Measure angle", "**FABER (Patrick's) Test**: Figure-4 position - hip Flexion, ABduction, External Rotation. Pain = hip joint pathology or sacroiliac joint disease", "**FADIR Test**: Hip Flexion, ADduction, Internal Rotation → pain = femoroacetabular impingement (FAI), hip labral tear", "**Trendelenburg Test**: Patient stands on one leg - pelvis drops on opposite side = positive. Gluteus medius weakness (hip OA, superior gluteal nerve palsy, DDH)", "**Log Roll**: Supine, rotate entire limb passively - pain/restriction = hip joint disease (capsular pattern: IR>flexion>ER)", "**Leg Length**: True (ASIS to medial malleolus) vs apparent (umbilicus to medial malleolus). True shortening = hip/femur pathology"], "think": {"label": "CAUTION!", "text": "**Referred pain to the knee from the hip is common - always examine the hip if a patient presents with knee pain and no local knee cause is found.** Especially in children (Perthes', SUFE - hip pathology presents as knee pain)."}}, {"icon": "05", "title": "Differentiating Arthritis Patterns", "subtitle": "RA vs OA vs Psoriatic vs Gout vs Reactive", "bullets": ["**Joints**: MCP, PIP, wrists, knees, C-spine. Symmetrical · DIP, CMC thumb, hips, knees, L-spine · DIP, asymmetric, axial · 1st MTP (podagra), ankles, knees", "**Swelling**: Soft, boggy (synovitis) · Bony (osteophytes) · Dactylitis, enthesitis · Hot, red, shiny, exquisitely tender", "**Stiffness**: Morning >1 hour · Morning <30 min, worse with use · Morning stiffness · Acute onset at night", "**Extra-articular**: Nodules, anaemia, vasculitis, lung, eye · Crepitus, deformity · Psoriatic skin/nail changes · Tophi, renal stones, uric acid", "**Labs**: RF+, anti-CCP+, raised CRP/ESR · Normal · RF−, HLA-B27 (axial) · ↑Uric acid, negatively birefringent crystals on aspiration"], "think": {"label": "THINK!", "text": "**Septic arthritis is a rheumatological emergency** - red, hot, swollen single joint with fever and systemic upset. Joint aspiration mandatory (neutrophils >50,000/µL). Do NOT delay antibiotics. Most common organism: Staphylococcus aureus. Never miss in immunocompromised patients."}}]}, {"key": "thy", "name": "Thyroid & Neck Examination", "short": "Thyroid", "accent": "#059669", "icon": "🦋", "tagline": "Look, feel, listen - then check function", "steps": [{"icon": "👀", "title": "Inspection", "bullets": ["Look for a visible swelling - ask the patient to swallow (a **thyroid** swelling moves up) and protrude the tongue (a **thyroglossal cyst** moves up)", "Look for scars from previous thyroid surgery", "Eye signs: **exophthalmos**, lid lag, and lid retraction (all suggestive of Graves' disease)"]}, {"icon": "✋", "title": "Palpation", "bullets": ["Palpate from behind the seated patient - assess size, consistency, and nodularity, and check for tenderness", "Feel for movement of the swelling on swallowing", "Check for tracheal deviation and any associated cervical lymphadenopathy"]}, {"icon": "👂", "title": "Auscultation", "bullets": ["Listen directly over the thyroid gland for a **bruit** - suggests hypervascularity, classically seen in Graves' disease"]}, {"icon": "🖐️", "title": "Signs of Thyroid Status", "bullets": ["**Hyperthyroid**: fine tremor, tachycardia, warm and sweaty palms, lid lag", "**Hypothyroid**: bradycardia, dry cool skin, slow-relaxing (delayed) reflexes, coarse and thinning hair"], "think": {"label": "THINK!", "text": "Hands tell the story fast: warm & sweaty + tremor = hyper. Dry & cool + slow reflexes = hypo."}}, {"icon": "📋", "title": "Completion", "bullets": ["Check for proximal myopathy - can occur in BOTH hyper- and hypothyroidism", "Formally test the ankle jerk reflex - the relaxation phase is classically slow ('hung-up reflex') in hypothyroidism"], "note": {"peds": "A goitre in a child is uncommon and should be investigated promptly rather than simply observed, unlike in adults where small goitres are often monitored.", "adult": "Autoimmune thyroid disease (Hashimoto's, Graves') is far more prevalent in adults, especially women, and dominates the adult differential."}}]}, {"key": "pvs", "name": "Peripheral Vascular Examination", "short": "PVS", "accent": "#334155", "icon": "🦶", "tagline": "Pulses, perfusion, and the 6 P's of acute limb ischaemia", "steps": [{"icon": "👀", "title": "Inspection", "bullets": ["Look at colour, hair loss over the limb, muscle wasting, and any ulceration", "**Arterial ulcers**: punched-out edges, painful, typically distal (over the toes or heel)", "**Venous ulcers**: irregular edges, over the gaiter area, less painful, often with surrounding venous eczema"]}, {"icon": "🌡️", "title": "Temperature & Capillary Refill", "bullets": ["Compare skin temperature side to side, and proximal to distal along the limb", "Capillary refill time - normal is **<2 seconds**"]}, {"icon": "💓", "title": "Pulses", "bullets": ["Palpate the femoral, popliteal, posterior tibial, and dorsalis pedis pulses", "Document the presence/absence and volume of each pulse level", "Auscultate along the arterial line for bruits, suggesting turbulent flow through a stenosis"], "think": {"label": "THINK!", "text": "The 6 P's of acute limb ischaemia: Pain, Pallor, Pulseless, Paraesthesia, Paralysis, Perishingly cold."}}, {"icon": "📐", "title": "Special Tests", "bullets": ["**Buerger's test** - elevate the leg to look for pallor, then hang it down over the bed edge to look for reactive hyperaemia", "**Ankle-Brachial Pressure Index (ABPI)** gives an objective quantification of arterial supply"]}, {"icon": "🦵", "title": "Venous Assessment", "bullets": ["Look for varicose veins, venous eczema, and lipodermatosclerosis (a sign of chronic venous hypertension)", "**Tap test / Trendelenburg test** assess the competence of the venous valves"], "note": {"peds": "Peripheral arterial disease is essentially absent in children - absent femoral pulses in an infant instead point strongly toward **coarctation of the aorta**.", "adult": "Diabetes, smoking, and hyperlipidaemia are the dominant risk factors driving peripheral arterial disease in adults, and are essential to assess."}}]}], "cases": [{"id": "c01", "category": "Cardiology", "clues": ["A 58-year-old man with a 30 pack-year smoking history presents to the emergency department.", "He describes crushing central chest pain that started 45 minutes ago while climbing stairs, radiating to his left arm and jaw.", "He is diaphoretic, nauseated, and looks pale and anxious.", "ECG shows ST-segment elevation across leads V1 to V4.", "Troponin I returns markedly elevated at 12 ng/mL."], "answer": "Acute anterior ST-elevation myocardial infarction (STEMI)", "accept": ["stemi", "st elevation mi", "st elevation myocardial infarction", "anterior mi", "myocardial infarction", "heart attack", "acute mi", "acute myocardial infarction"], "explanation": "Anterior STEMI results from occlusion of the left anterior descending artery, producing ST elevation in the precordial leads V1 to V4. Immediate reperfusion, ideally primary PCI, is the priority."}, {"id": "c02", "category": "Endocrinology", "clues": ["A 19-year-old woman is brought to the emergency department by her roommate.", "She has had three days of increasing thirst, frequent urination, and vomiting.", "She is breathing rapidly and deeply, and her roommate notices a fruity smell on her breath.", "Blood glucose is 480 mg/dL with a serum bicarbonate of 8 mmol/L.", "Urinalysis shows large ketones, and arterial pH is 7.10."], "answer": "Diabetic ketoacidosis (DKA)", "accept": ["dka", "diabetic ketoacidosis"], "explanation": "DKA results from absolute or relative insulin deficiency, usually in type 1 diabetes, producing hyperglycaemia, ketosis, and a high anion gap metabolic acidosis. Kussmaul breathing and an acetone smell on the breath are classic clues."}, {"id": "c03", "category": "Surgery", "clues": ["A 22-year-old man presents with abdominal pain that began around his umbilicus this morning.", "Over the past several hours the pain has migrated to the lower right side of his abdomen.", "He has a low-grade fever, nausea, and loss of appetite.", "Examination reveals tenderness and guarding at McBurney's point, with rebound tenderness.", "His white cell count is elevated at 14,000/microL and ultrasound shows a non-compressible, dilated appendix."], "answer": "Acute appendicitis", "accept": ["appendicitis", "acute appendicitis"], "explanation": "Classic appendicitis presents with periumbilical pain migrating to the right iliac fossa, low-grade fever, and localised peritonism at McBurney's point. Imaging confirms the diagnosis, and management is surgical."}, {"id": "c04", "category": "Obstetrics & Gynaecology", "clues": ["A 27-year-old woman presents to the emergency department with lower abdominal pain.", "Her last menstrual period was seven weeks ago, and she has had light vaginal spotting for two days.", "She becomes lightheaded on standing, and her pulse is 118 beats per minute.", "A urine pregnancy test is positive, but no intrauterine pregnancy is seen on transvaginal ultrasound.", "Serum beta-hCG is 2400 mIU/mL, lower than expected for gestational age, with free fluid seen in the pelvis."], "answer": "Ectopic pregnancy", "accept": ["ectopic pregnancy", "ectopic", "tubal pregnancy"], "explanation": "An ectopic pregnancy implants outside the uterine cavity, most often in the fallopian tube. A positive pregnancy test with an empty uterus, free pelvic fluid, and haemodynamic instability suggests rupture, a surgical emergency."}, {"id": "c05", "category": "Pulmonology", "clues": ["A 45-year-old woman returns from a 14-hour international flight.", "Two days later she develops sudden shortness of breath and sharp right-sided chest pain that worsens with breathing.", "Her right calf is swollen, warm, and tender compared to the left.", "Oxygen saturation is 91% on room air, and her heart rate is 118 beats per minute.", "CT pulmonary angiography shows a filling defect in the right main pulmonary artery."], "answer": "Pulmonary embolism", "accept": ["pulmonary embolism", "pe", "pulmonary embolus"], "explanation": "Prolonged immobility is a major risk factor for venous thromboembolism. A DVT that embolises to the lungs causes pleuritic chest pain, dyspnoea, tachycardia, and hypoxia; CT pulmonary angiography is the diagnostic test of choice."}, {"id": "c06", "category": "Infectious Disease", "clues": ["A 20-year-old university student living in dormitory housing presents with two days of worsening headache.", "He now has a fever of 39.4C and neck stiffness that makes it painful to flex his chin to his chest.", "He is photophobic and appears drowsy and confused to his roommate.", "Examination shows a positive Kernig's sign, and a petechial rash is noted on his trunk and legs.", "Lumbar puncture reveals cloudy CSF with a neutrophil predominance, low glucose, and high protein."], "answer": "Bacterial (meningococcal) meningitis", "accept": ["bacterial meningitis", "meningitis", "meningococcal meningitis", "meningococcemia", "meningococcal disease"], "explanation": "The triad of fever, neck stiffness, and altered mental status with a petechial rash is classic for meningococcal meningitis, especially in young people in close-contact living settings. Empirical antibiotics should never be delayed for imaging or lumbar puncture."}, {"id": "c07", "category": "Paediatrics", "clues": ["A 5-week-old male infant is brought to clinic by his parents.", "He has been vomiting after nearly every feed for the past week, and the vomiting has become more forceful.", "His parents describe the vomit as shooting out forcefully, but it never contains bile.", "He is hungry again immediately after vomiting and has not been gaining weight well.", "Examination reveals a firm, mobile, olive-shaped mass in the epigastrium, and labs show a hypochloraemic, hypokalaemic metabolic alkalosis."], "answer": "Hypertrophic pyloric stenosis", "accept": ["pyloric stenosis", "hypertrophic pyloric stenosis"], "explanation": "Pyloric stenosis classically presents in a first-born male infant around 3 to 6 weeks of age with non-bilious projectile vomiting and a palpable olive-shaped mass. Persistent vomiting of gastric contents produces a hypochloraemic, hypokalaemic metabolic alkalosis."}, {"id": "c08", "category": "Paediatrics", "clues": ["A 3-year-old girl has had a fever above 39C for five consecutive days.", "Her parents noticed red, cracked lips and a bright red strawberry-like tongue.", "She has bilateral conjunctival redness without any discharge, and a widespread rash over her trunk.", "Her hands and feet are swollen, and there is a single enlarged lymph node in her neck.", "Two weeks after symptom onset the skin on her fingertips begins to peel, and echocardiogram shows coronary artery dilation."], "answer": "Kawasaki disease", "accept": ["kawasaki disease", "kawasaki"], "explanation": "Kawasaki disease is a medium-vessel vasculitis of early childhood. Diagnosis rests on prolonged fever plus at least four of: conjunctivitis, oral changes, rash, extremity changes, and cervical lymphadenopathy. The main concern is coronary artery aneurysm formation, so early IVIG is critical."}, {"id": "c09", "category": "Urology", "clues": ["A 14-year-old boy wakes suddenly at night with severe pain in his right testicle.", "The pain came on abruptly and is now accompanied by nausea and vomiting.", "On examination the right testicle is swollen, tender, and sits higher than the left, in a horizontal lie.", "The cremasteric reflex is absent on the affected side, and elevating the testicle does not relieve the pain.", "Doppler ultrasound shows absent blood flow to the right testicle."], "answer": "Testicular torsion", "accept": ["testicular torsion"], "explanation": "Testicular torsion is a surgical emergency caused by twisting of the spermatic cord, cutting off blood supply. Sudden severe pain, a high-riding horizontal testicle, and an absent cremasteric reflex should prompt immediate surgical exploration; imaging must never delay treatment beyond the golden six-hour window."}, {"id": "c10", "category": "Vascular Surgery", "clues": ["A 71-year-old man with a long smoking history collapses at home.", "He describes sudden, severe pain tearing through his back and abdomen.", "Paramedics find him pale, sweating, and hypotensive with a blood pressure of 78/44 mmHg.", "Examination reveals a pulsatile, tender mass in the mid-abdomen.", "Bedside ultrasound shows a 7.5 cm infrarenal aortic dilation with free intraperitoneal fluid."], "answer": "Ruptured abdominal aortic aneurysm", "accept": ["ruptured abdominal aortic aneurysm", "aaa rupture", "ruptured aaa", "abdominal aortic aneurysm rupture", "ruptured aortic aneurysm"], "explanation": "A ruptured AAA classically presents with the triad of abdominal or back pain, hypotension, and a pulsatile abdominal mass. It is a true surgical emergency requiring immediate operative repair."}, {"id": "c11", "category": "Endocrinology", "clues": ["A 34-year-old woman with known autoimmune thyroid disease presents with several months of fatigue and weight loss.", "Her family notes that her skin has become noticeably darker, especially over her knuckles and old scars.", "She develops a viral illness, and two days later presents with vomiting, confusion, and severe weakness.", "Blood pressure is 78/50 mmHg despite intravenous fluids, with a low sodium and a high potassium.", "Random cortisol is very low despite the severe stress of illness, confirming adrenal failure."], "answer": "Acute adrenal insufficiency (Addisonian crisis)", "accept": ["addisonian crisis", "acute adrenal insufficiency", "adrenal crisis", "addison crisis", "addisons disease", "addison's disease"], "explanation": "Chronic primary adrenal insufficiency, Addison's disease, causes hyperpigmentation from excess ACTH. An intercurrent illness can precipitate an adrenal crisis with hypotension, hyponatraemia, and hyperkalaemia; treatment is immediate IV hydrocortisone and fluids."}, {"id": "c12", "category": "Endocrinology", "clues": ["A 40-year-old woman with poorly controlled Graves' disease undergoes emergency gallbladder surgery.", "Twelve hours later she develops a fever of 40.1C and appears agitated and confused.", "Her heart rate is 160 beats per minute and irregular, and she is in florid heart failure.", "She has profuse sweating, tremor, and vomiting.", "Thyroid studies confirm a markedly suppressed TSH with a very high free T4, consistent with a thyrotoxic crisis."], "answer": "Thyroid storm", "accept": ["thyroid storm", "thyrotoxic crisis"], "explanation": "Thyroid storm is a life-threatening exaggeration of thyrotoxicosis, often precipitated by surgery, infection, or trauma in a patient with underlying hyperthyroidism. It presents with fever, tachyarrhythmia, and agitation, and can rapidly progress to cardiovascular collapse."}, {"id": "c13", "category": "Emergency Medicine", "clues": ["A 26-year-old man is stabbed in the chest during an altercation.", "On arrival he is in severe respiratory distress, gasping for air.", "His trachea is deviated away from the injured side, and the right side of his chest is hyperresonant to percussion.", "Breath sounds are absent on the right, and his neck veins are distended.", "His blood pressure drops to 70/40 mmHg and he becomes increasingly cyanotic."], "answer": "Tension pneumothorax", "accept": ["tension pneumothorax"], "explanation": "Tension pneumothorax occurs when air enters the pleural space with each breath but cannot escape, causing mediastinal shift, impaired venous return, and obstructive shock. It is a clinical diagnosis requiring immediate needle decompression before any imaging."}, {"id": "c14", "category": "Neurology", "clues": ["A 29-year-old man had a diarrhoeal illness about two weeks ago that has since resolved.", "He now notices tingling in his feet followed by progressive weakness that started in his legs.", "Over the next several days the weakness ascends to involve his arms and trunk.", "Examination shows symmetric weakness with absent deep tendon reflexes throughout.", "Lumbar puncture reveals a markedly elevated protein with a normal white cell count, an albuminocytologic dissociation."], "answer": "Guillain-Barre syndrome", "accept": ["guillain-barre syndrome", "guillain barre syndrome", "gbs", "guillain-barre", "acute inflammatory demyelinating polyneuropathy"], "explanation": "Guillain-Barre syndrome is an autoimmune polyneuropathy often triggered by a preceding infection, classically Campylobacter jejuni. Ascending symmetric weakness with areflexia and albuminocytologic dissociation on CSF analysis are the hallmark findings; respiratory function must be monitored closely."}, {"id": "c15", "category": "Neurology", "clues": ["A 32-year-old woman notices that her eyelids droop by the end of the day but look normal in the morning.", "She has also developed double vision that worsens with prolonged reading.", "Chewing becomes difficult toward the end of meals, and her voice grows softer the longer she talks.", "Her symptoms clearly improve after a period of rest.", "Serum testing detects antibodies against the acetylcholine receptor, and CT of the chest reveals a thymoma."], "answer": "Myasthenia gravis", "accept": ["myasthenia gravis", "mg"], "explanation": "Myasthenia gravis is caused by autoantibodies against postsynaptic acetylcholine receptors at the neuromuscular junction, producing fatigable weakness that worsens with activity and improves with rest. It is associated with thymic abnormalities including thymoma."}, {"id": "c16", "category": "Haematology", "clues": ["A 9-year-old boy with known sickle cell disease presents with fever and chest pain.", "He has a new cough and is breathing faster than usual.", "Oxygen saturation has dropped to 89% from his baseline of 98%.", "Auscultation reveals reduced air entry at the right lung base.", "Chest X-ray shows a new infiltrate in the right lower lobe, confirming the diagnosis."], "answer": "Acute chest syndrome", "accept": ["acute chest syndrome"], "explanation": "Acute chest syndrome is a leading cause of death in sickle cell disease, defined by a new pulmonary infiltrate plus respiratory symptoms or fever. It results from vaso-occlusion, infection, or fat embolism within the pulmonary vasculature, and requires prompt oxygen, antibiotics, and consideration of exchange transfusion."}, {"id": "c17", "category": "Paediatrics", "clues": ["A 6-year-old boy develops a rash one week after recovering from an upper respiratory infection.", "The rash consists of raised, red-purple spots symmetrically distributed over his buttocks and lower legs.", "He complains of crampy abdominal pain, and his knees and ankles are swollen and painful.", "Urinalysis reveals microscopic blood and mild protein in his urine.", "Skin biopsy shows IgA deposition in the walls of small vessels, confirming a small-vessel vasculitis."], "answer": "Henoch-Schonlein purpura (IgA vasculitis)", "accept": ["henoch-schonlein purpura", "henoch schonlein purpura", "hsp", "iga vasculitis"], "explanation": "IgA vasculitis, formerly Henoch-Schonlein purpura, is the most common vasculitis of childhood, often following a respiratory infection. The classic tetrad is palpable purpura, arthralgia, abdominal pain, and renal involvement from IgA deposition in small vessels."}, {"id": "c18", "category": "Paediatrics", "clues": ["A previously healthy 10-month-old infant develops sudden episodes of intense crying with his legs drawn up to his chest.", "Between episodes he seems well, but the episodes recur every 15 to 20 minutes.", "He then vomits, and his stool becomes mixed with blood and mucus, resembling redcurrant jelly.", "Examination reveals a sausage-shaped mass in the right upper abdomen.", "Abdominal ultrasound shows a target sign, concentric rings of bowel telescoped inside itself."], "answer": "Intussusception", "accept": ["intussusception"], "explanation": "Intussusception occurs when a segment of bowel telescopes into an adjacent segment, most commonly ileocolic, in infants aged 6 to 18 months. Colicky pain, redcurrant jelly stool, and a target sign on ultrasound are classic; air or contrast enema is both diagnostic and often therapeutic."}, {"id": "c19", "category": "Neurology", "clues": ["A 52-year-old woman is gardening when she suddenly cries out and clutches her head.", "She describes it as the worst headache of her life, reaching maximum intensity within seconds.", "She becomes nauseated, vomits, and develops neck stiffness over the next hour.", "She is photophobic and briefly loses consciousness at onset.", "Non-contrast CT of the head shows blood filling the basal cisterns and sulci."], "answer": "Subarachnoid haemorrhage", "accept": ["subarachnoid hemorrhage", "subarachnoid haemorrhage", "sah"], "explanation": "A sudden, severe thunderclap headache reaching peak intensity within seconds is the hallmark of subarachnoid haemorrhage, most often from a ruptured berry aneurysm. Non-contrast CT is the first-line investigation, with lumbar puncture reserved for cases where CT is negative but suspicion remains high."}, {"id": "c20", "category": "Obstetrics & Gynaecology", "clues": ["A 24-year-old woman presents with sudden onset severe pain in her right lower abdomen.", "The pain is intermittent, colicky, and associated with nausea and vomiting.", "She has a known 6 cm ovarian cyst identified on a scan several months ago.", "Examination reveals right adnexal tenderness with a palpable mass.", "Doppler ultrasound shows an enlarged right ovary with absent venous flow."], "answer": "Ovarian torsion", "accept": ["ovarian torsion", "adnexal torsion"], "explanation": "Ovarian torsion occurs when the ovary twists on its ligamentous supports, compromising blood supply, often in the setting of an ovarian cyst or mass that acts as a lead point. It is a surgical emergency; delayed diagnosis risks loss of the ovary."}]}</script>
<script>(function(){
"use strict";
var DATA = JSON.parse(document.getElementById('app-data').textContent);
var REPORTS = DATA.reports;
var EXAMS = DATA.exams;
var CASES = DATA.cases || [];

var root = document.getElementById('app');

// ---- routing state ----
var state = { view:'home', moduleType:null, moduleKey:null, step:0, caseId:null };
var history = [];

// ---- game progress (persisted in localStorage where available) ----
var GAME_KEY = 'medtaqi_dx_progress_v1';
var gameProgress = loadProgress();
function loadProgress(){
  try{
    var raw = window.localStorage.getItem(GAME_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveProgress(){
  try{ window.localStorage.setItem(GAME_KEY, JSON.stringify(gameProgress)); }catch(e){}
}

function pushState(next){
  history.push(JSON.parse(JSON.stringify(state)));
  Object.assign(state, next);
  render();
  window.scrollTo(0,0);
}
function goBack(){
  if(history.length===0){ Object.assign(state,{view:'home',moduleType:null,moduleKey:null,step:0,caseId:null}); render(); return; }
  var prev = history.pop();
  Object.assign(state, prev);
  render();
  window.scrollTo(0,0);
}

function esc(s){
  s = String(s==null?'':s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdBold(s){
  s = String(s==null?'':s);
  // convert **text** -> <strong class="kw">text</strong>, escape rest
  var parts = s.split(/(\*\*[^*]+\*\*)/g);
  return parts.map(function(p){
    if(p.slice(0,2)==='**' && p.slice(-2)==='**'){
      return '<strong class="kw">'+esc(p.slice(2,-2))+'</strong>';
    }
    return esc(p);
  }).join('');
}
function hexToRgba(hex, a){
  hex = hex.replace('#','');
  var r=parseInt(hex.substring(0,2),16), g=parseInt(hex.substring(2,4),16), b=parseInt(hex.substring(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function findModule(type, key){
  var list = type==='reports' ? REPORTS : EXAMS;
  for(var i=0;i<list.length;i++){ if(list[i].key===key) return list[i]; }
  return null;
}
function findCase(id){
  for(var i=0;i<CASES.length;i++){ if(CASES[i].id===id) return CASES[i]; }
  return null;
}

// ================= RENDER =================
function render(){
  root.innerHTML='';
  if(state.view==='home') return renderHome();
  if(state.view==='list') return renderList(state.moduleType);
  if(state.view==='viewer') return renderViewer(state.moduleType, state.moduleKey, state.step);
  if(state.view==='game-list') return renderGameList();
  if(state.view==='game-play') return renderGamePlay(state.caseId);
}

function el(tag, cls, html){
  var e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html!==undefined) e.innerHTML = html;
  return e;
}

// ---------- HOME ----------
function renderHome(){
  var top = el('div','topbar','');
  var badge = el('div','logo-badge','<span class="dot">\u2721</span><span>Clinical Skills</span>');
  top.appendChild(badge);
  root.appendChild(top);

  var hero = el('div','hero');
  hero.innerHTML =
    '<span class="kicker">MED TAQI \u00b7 STUDY DECKS</span>'+
    '<h1 class="headline-font">MED.TAQI<span>Clinical Skills</span></h1>'+
    '<p class="sub">Flashcard notes for reading reports, performing clinical examinations, and sharpening your diagnostic reasoning.</p>';
  root.appendChild(hero);

  var tiles = el('div','tiles');

  var t1 = el('button','tile reports');
  t1.innerHTML = '<div class="t-count">'+REPORTS.length+' REPORTS</div>'+
    '<span class="t-icon">\ud83d\udccb</span>'+
    '<h3 class="t-title headline-font">Reports<br>Interpretation</h3>'+
    '<p class="t-sub">CXR, ECG, ABG, CBC, LFTs &amp; more, step by step</p>'+
    '<div class="t-arrow">\u203a</div>';
  t1.onclick=function(){ pushState({view:'list', moduleType:'reports'}); };
  tiles.appendChild(t1);

  var t2 = el('button','tile exams');
  t2.innerHTML = '<div class="t-count">'+EXAMS.length+' SYSTEMS</div>'+
    '<span class="t-icon">\ud83e\ude7a</span>'+
    '<h3 class="t-title headline-font">Clinical<br>Examinations</h3>'+
    '<p class="t-sub">CNS, CVS, Resp, GIT &amp; more, incl. Peds vs Adult differences</p>'+
    '<div class="t-arrow">\u203a</div>';
  t2.onclick=function(){ pushState({view:'list', moduleType:'exams'}); };
  tiles.appendChild(t2);

  var t3 = el('button','tile game');
  var solvedCount = Object.keys(gameProgress).filter(function(k){return gameProgress[k].status==='won';}).length;
  t3.innerHTML = '<div class="t-count">'+CASES.length+' CASES</div>'+
    '<span class="t-icon">\ud83d\udd0d</span>'+
    '<h3 class="t-title headline-font">Guess the<br>Diagnosis</h3>'+
    '<p class="t-sub">'+(solvedCount>0 ? solvedCount+' of '+CASES.length+' solved, keep going!' : 'Reveal clues one at a time and crack the case')+'</p>'+
    '<div class="t-arrow">\u203a</div>';
  t3.onclick=function(){ pushState({view:'game-list'}); };
  tiles.appendChild(t3);

  root.appendChild(tiles);
  root.appendChild(el('div','footnote','Made for board &amp; clerkship prep \u00b7 tap a card to begin'));
}

// ---------- LIST ----------
function renderList(type){
  var top = el('div','topbar');
  var back = el('button','backbtn','&larr;');
  back.onclick = goBack;
  top.appendChild(back);
  top.appendChild(el('div','crumb', type==='reports' ? 'Med.Taqi &rsaquo; <b>Reports</b>' : 'Med.Taqi &rsaquo; <b>Examinations</b>'));
  root.appendChild(top);

  var banner = el('div','page-title-banner');
  banner.style.background = type==='reports'
    ? 'linear-gradient(135deg,#fb7185,#be123c)'
    : 'linear-gradient(135deg,#fb923c,#c2410c)';
  banner.innerHTML = '<span class="banner-icon">'+(type==='reports'?'\ud83d\udccb':'\ud83e\ude7a')+'</span>'+
    '<h2 class="headline-font">'+(type==='reports'?'Reports Interpretation':'Clinical Examinations')+'</h2>'+
    '<p>'+(type==='reports'?'Pick a report to open its step by step flashcard deck':'Pick a system to open its exam flashcard deck')+'</p>';
  root.appendChild(banner);

  var list = el('div','grid-list');
  var arr = type==='reports' ? REPORTS : EXAMS;
  arr.forEach(function(m){
    var card = el('div','list-card');
    var iconWrap = el('div','lc-icon', m.icon);
    iconWrap.style.background = hexToRgba(m.accent,0.14);
    iconWrap.style.color = m.accent;
    card.appendChild(iconWrap);
    var body = el('div','lc-body');
    var countBadge = '<span class="lc-count" style="background:'+m.accent+'">'+m.steps.length+' cards'+(m.diff?' + diff':'')+'</span>';
    body.innerHTML = '<p class="lc-title">'+esc(m.name)+'</p><p class="lc-sub">'+esc(m.tagline)+'</p>'+countBadge;
    card.appendChild(body);
    card.appendChild(el('div','lc-chev','\u203a'));
    card.onclick = function(){ pushState({view:'viewer', moduleType:type, moduleKey:m.key, step:0}); };
    list.appendChild(card);
  });
  root.appendChild(list);
}

// ---------- VIEWER ----------
function totalSlides(mod){
  return mod.steps.length + (mod.diff ? 1 : 0);
}

function renderViewer(type, key, step){
  var mod = findModule(type,key);
  if(!mod){ pushState({view:'list', moduleType:type}); return; }
  var total = totalSlides(mod);
  if(step<0) step=0;
  if(step>=total) step=total-1;
  state.step = step;

  var top = el('div','topbar');
  var back = el('button','backbtn','&larr;');
  back.onclick = goBack;
  top.appendChild(back);
  top.appendChild(el('div','crumb', 'Med.Taqi &rsaquo; '+(type==='reports'?'Reports':'Exams')+' &rsaquo; <b>'+esc(mod.short||mod.name)+'</b>'));
  root.appendChild(top);

  var head = el('div','viewer-head');
  head.style.background = 'linear-gradient(135deg,'+mod.accent+'cc,'+mod.accent+')';
  var isDiff = mod.diff && step===mod.steps.length;
  var stepLabel = isDiff ? 'Peds vs Adult/Medicine' : ('Card '+(step+1)+' of '+mod.steps.length);
  head.innerHTML =
    '<span class="vh-icon">'+mod.icon+'</span>'+
    '<h2 class="headline-font">'+esc(mod.name)+'</h2>'+
    '<p class="vh-tag">'+esc(mod.tagline)+'</p>'+
    '<div class="progress-track"><div class="progress-fill" style="width:'+(((step+1)/total)*100)+'%"></div></div>'+
    '<div class="progress-label">'+stepLabel+'</div>';
  root.appendChild(head);

  var stage = el('div','stage');
  var cardWrap = el('div','card-wrap');

  if(isDiff){
    cardWrap.appendChild(renderDiffCard(mod));
  } else {
    cardWrap.appendChild(renderFlashcard(mod, mod.steps[step]));
  }
  stage.appendChild(cardWrap);

  var navRow = el('div','nav-row');
  var prevBtn = el('button','navbtn','&larr;');
  prevBtn.disabled = step===0;
  prevBtn.onclick = function(){ if(step>0) pushStep(step-1); };
  var nextBtn = el('button','navbtn','&rarr;');
  nextBtn.disabled = step>=total-1;
  nextBtn.onclick = function(){ if(step<total-1) pushStep(step+1); };

  var dots = el('div','dots');
  for(var i=0;i<total;i++){
    (function(i){
      var special = mod.diff && i===mod.steps.length;
      var d = el('span','dot'+(i===step?' active':'')+(special?' special':''));
      d.onclick = function(){ pushStep(i); };
      dots.appendChild(d);
    })(i);
  }

  navRow.appendChild(prevBtn);
  navRow.appendChild(dots);
  navRow.appendChild(nextBtn);
  stage.appendChild(navRow);

  root.appendChild(stage);

  function pushStep(newStep){
    state.step = newStep;
    render();
    window.scrollTo(0,0);
  }
}

function renderFlashcard(mod, stepData){
  var card = el('div','flashcard');
  card.style.setProperty('--bullet-color', mod.accent);
  var iconRow = el('div','fc-icon-row');
  var iconEl = el('div','fc-icon', esc(stepData.icon));
  iconEl.style.background = hexToRgba(mod.accent,0.14);
  iconEl.style.color = mod.accent;
  iconRow.appendChild(iconEl);
  var titleWrap = el('div');
  titleWrap.innerHTML = '<h3 class="fc-title">'+esc(stepData.title)+'</h3>'+
    (stepData.subtitle ? '<p class="fc-sub">'+esc(stepData.subtitle)+'</p>' : '');
  iconRow.appendChild(titleWrap);
  card.appendChild(iconRow);

  var ul = el('ul','fc-bullets');
  stepData.bullets.forEach(function(b){
    var li = document.createElement('li');
    if(b.charAt(0) === '\u00a7'){
      li.className = 'fc-subhead';
      li.textContent = b.slice(1);
    } else {
      li.innerHTML = '<span class="li-text">'+mdBold(b)+'</span>';
    }
    ul.appendChild(li);
  });
  card.appendChild(ul);

  if(stepData.think){
    var kind = stepData.think.kind || '';
    var tb = el('div','think-box'+(kind ? ' k-'+kind : ''));
    var icon = kind==='danger' ? '\ud83d\udea8' : (kind==='pearl' ? '\ud83c\udf1f' : '\ud83d\udca1');
    tb.innerHTML = '<span class="tb-icon">'+icon+'</span><div class="tb-text"><span class="tb-label">'+esc(stepData.think.label||'THINK!')+'</span>'+mdBold(stepData.think.text)+'</div>';
    card.appendChild(tb);
  }
  if(stepData.note){
    var sn = el('div','step-note');
    sn.innerHTML =
      '<div class="sn-head">\u2696\ufe0f&nbsp; PEDS VS ADULT, THIS FINDING</div>'+
      '<div class="sn-rows">'+
        '<div class="sn-row peds"><span class="sn-tag">\ud83e\uddd2 PEDS</span><span>'+mdBold(stepData.note.peds)+'</span></div>'+
        '<div class="sn-row adult"><span class="sn-tag">\ud83e\uddd1 ADULT</span><span>'+mdBold(stepData.note.adult)+'</span></div>'+
      '</div>';
    card.appendChild(sn);
  }
  return card;
}

function renderDiffCard(mod){
  var card = el('div','diff-card');
  card.innerHTML = '<h3 class="diff-title headline-font">Pediatric vs Adult</h3>'+
    '<p class="diff-sub">What changes in this exam \u00b7 '+esc(mod.name)+'</p>';
  var cols = el('div','diff-cols');

  var pedsCol = el('div','diff-col peds');
  pedsCol.innerHTML = '<div class="diff-col-head"><div class="dch-icon">\ud83e\uddd2</div><div class="dch-label">PEDIATRICS</div></div>';
  var pUl = el('ul');
  mod.diff.peds.forEach(function(t){ var li=document.createElement('li'); li.innerHTML=mdBold(t); pUl.appendChild(li); });
  pedsCol.appendChild(pUl);

  var adultCol = el('div','diff-col adult');
  adultCol.innerHTML = '<div class="diff-col-head"><div class="dch-icon">\ud83e\uddd1</div><div class="dch-label">ADULT / MEDICINE</div></div>';
  var aUl = el('ul');
  mod.diff.adult.forEach(function(t){ var li=document.createElement('li'); li.innerHTML=mdBold(t); aUl.appendChild(li); });
  adultCol.appendChild(aUl);

  cols.appendChild(pedsCol);
  cols.appendChild(adultCol);
  card.appendChild(cols);
  return card;
}

// ================= GUESS THE DIAGNOSIS GAME =================
function renderGameList(){
  var top = el('div','topbar');
  var back = el('button','backbtn','&larr;');
  back.onclick = goBack;
  top.appendChild(back);
  top.appendChild(el('div','crumb', 'Med.Taqi &rsaquo; <b>Guess the Diagnosis</b>'));
  root.appendChild(top);

  var banner = el('div','page-title-banner');
  banner.style.background = 'linear-gradient(135deg,var(--game-1),var(--game-2))';
  var solved = Object.keys(gameProgress).filter(function(k){return gameProgress[k].status==='won';}).length;
  banner.innerHTML = '<span class="banner-icon">\ud83d\udd0d</span>'+
    '<h2 class="headline-font">Guess the Diagnosis</h2>'+
    '<p>'+solved+' of '+CASES.length+' cases solved. Reveal clues one by one, guess before you run out!</p>';
  root.appendChild(banner);

  var grid = el('div','case-grid');
  CASES.forEach(function(c, idx){
    var prog = gameProgress[c.id];
    var status = prog ? prog.status : null;
    var tile = el('div','case-tile'+(status==='won'?' solved':status==='lost'?' failed':''));
    tile.innerHTML = '<span class="ct-num">'+(idx+1)+'</span>'+
      (status==='won' ? '<span class="ct-badge">\u2705</span>' : status==='lost' ? '<span class="ct-badge">\u2716\ufe0f</span>' : '');
    tile.onclick = function(){ pushState({view:'game-play', caseId:c.id}); };
    grid.appendChild(tile);
  });
  root.appendChild(grid);
  root.appendChild(el('div','footnote','Tap any case number to play it \u00b7 green = solved, red = missed'));
}

function renderGamePlay(caseId){
  var kase = findCase(caseId);
  if(!kase){ pushState({view:'game-list'}); return; }
  var prog = gameProgress[caseId] || { status:'playing', revealed:1, guesses:[] };
  if(!gameProgress[caseId]) gameProgress[caseId] = prog;

  var idx = CASES.findIndex(function(c){return c.id===caseId;});

  var top = el('div','topbar');
  var back = el('button','backbtn','&larr;');
  back.onclick = goBack;
  top.appendChild(back);
  top.appendChild(el('div','crumb', 'Med.Taqi &rsaquo; Diagnosis &rsaquo; <b>Case '+(idx+1)+'</b>'));
  root.appendChild(top);

  var head = el('div','viewer-head');
  head.style.background = 'linear-gradient(135deg,var(--game-1),var(--game-2))';
  var maxClues = kase.clues.length;
  head.innerHTML =
    '<span class="vh-icon">\ud83d\udd0d</span>'+
    '<h2 class="headline-font">Case '+(idx+1)+' of '+CASES.length+'</h2>'+
    '<p class="vh-tag">'+esc(kase.category||'Clinical vignette')+'</p>'+
    '<div class="progress-track"><div class="progress-fill" style="width:'+((prog.revealed/maxClues)*100)+'%"></div></div>'+
    '<div class="progress-label">'+prog.revealed+' of '+maxClues+' clues revealed</div>';
  root.appendChild(head);

  var stage = el('div','stage');

  // attempts indicator
  var attemptRow = el('div','attempt-dots');
  for(var i=0;i<maxClues;i++){
    var g = prog.guesses[i];
    var box = el('div','attempt-box'+(g===undefined?'':g.correct?' correct':' wrong'));
    box.textContent = g===undefined ? '' : (g.correct ? '\u2713' : '\u2716');
    attemptRow.appendChild(box);
  }
  stage.appendChild(attemptRow);

  // clue list
  var clueList = el('div','clue-list');
  kase.clues.forEach(function(clueText, i){
    var revealed = i < prog.revealed;
    var item = el('div','clue-item'+(revealed?'':' locked'));
    item.innerHTML = '<div class="clue-num">'+(i+1)+'</div><div class="clue-text">'+(revealed ? mdBold(clueText) : 'Locked, guess to reveal the next clue') +'</div>';
    clueList.appendChild(item);
  });
  stage.appendChild(clueList);

  if(prog.status==='playing'){
    var guessCard = el('div','guess-card');
    var row = el('div','guess-row');
    var input = document.createElement('input');
    input.className = 'guess-input';
    input.placeholder = 'Type your diagnosis...';
    input.autocomplete = 'off';
    var btn = el('button','guess-btn','Submit');
    row.appendChild(input);
    row.appendChild(btn);
    guessCard.appendChild(row);
    stage.appendChild(guessCard);

    function submitGuess(){
      var val = input.value.trim();
      if(!val) return;
      var correct = checkAnswer(val, kase);
      prog.guesses.push({text:val, correct:correct});
      if(correct){
        prog.status = 'won';
      } else if(prog.guesses.length >= maxClues){
        prog.status = 'lost';
      } else {
        prog.revealed = Math.min(maxClues, prog.revealed+1);
      }
      saveProgress();
      render();
    }
    btn.onclick = submitGuess;
    input.addEventListener('keydown', function(e){ if(e.key==='Enter') submitGuess(); });
    setTimeout(function(){ input.focus(); }, 50);
  } else {
    var win = prog.status==='won';
    var result = el('div','result-card'+(win?' win':' lose'));
    result.innerHTML =
      '<div class="rc-emoji">'+(win?'\ud83c\udf89':'\ud83d\udcda')+'</div>'+
      '<h3 class="rc-title">'+(win?'Nailed it!':'So close, next time!')+'</h3>'+
      '<div class="rc-diagnosis">'+esc(kase.answer)+'</div>'+
      '<div class="rc-explain">'+mdBold(kase.explanation)+'</div>';
    var nextBtn = el('button','rc-next', idx < CASES.length-1 ? 'Next case \u2192' : 'Back to case list');
    nextBtn.onclick = function(){
      if(idx < CASES.length-1){
        pushState({view:'game-play', caseId:CASES[idx+1].id});
      } else {
        pushState({view:'game-list'});
      }
    };
    result.appendChild(nextBtn);
    stage.appendChild(result);
  }

  root.appendChild(stage);
}

function normalizeGuess(s){
  return s.toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}
function checkAnswer(guess, kase){
  var g = normalizeGuess(guess);
  if(!g) return false;
  for(var i=0;i<kase.accept.length;i++){
    var a = normalizeGuess(kase.accept[i]);
    if(!a) continue;
    if(g === a || g.indexOf(a) !== -1 || a.indexOf(g) !== -1){
      return true;
    }
  }
  return false;
}

// keyboard nav
document.addEventListener('keydown', function(e){
  if(state.view!=='viewer') return;
  var mod = findModule(state.moduleType, state.moduleKey);
  if(!mod) return;
  var total = totalSlides(mod);
  if(e.key==='ArrowRight' && state.step<total-1){ state.step++; render(); }
  if(e.key==='ArrowLeft' && state.step>0){ state.step--; render(); }
});

render();
})();
</script>
