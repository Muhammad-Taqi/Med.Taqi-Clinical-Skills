<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Med.Taqi Clinical Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red-1:#f43f5e; --red-2:#be123c;
  --cream:#fff5f2;
  --ink:#1f2430;
  --muted:#6b7280;
  --card-radius:26px;
  --shadow: 0 14px 34px rgba(190,18,60,0.14), 0 2px 8px rgba(0,0,0,0.06);
  --game-1:#7c3aed; --game-2:#4c1d95;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(900px 500px at 8% -8%, rgba(244,63,94,0.14), transparent 60%),
    radial-gradient(700px 500px at 105% 10%, rgba(190,18,60,0.10), transparent 55%),
    linear-gradient(180deg,#fff8f5 0%, #fdeef0 45%, #fbe4e8 100%);
  min-height:100vh;
  overflow-x:hidden;
}
.blob{position:fixed;border-radius:50%;filter:blur(2px);opacity:0.35;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;
  padding:18px 16px 60px;display:flex;flex-direction:column;transition:max-width .2s ease;}

.headline-font{font-family:'Anton',sans-serif;letter-spacing:0.5px;}

/* ===== Top bar ===== */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;min-height:40px;}
.backbtn{
  width:40px;height:40px;border-radius:50%;background:#fff;border:none;
  box-shadow:var(--shadow); display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:var(--red-2);flex-shrink:0;
  transition:transform .15s ease;
}
.backbtn:hover{transform:scale(1.06);}
.crumb{font-size:13px;font-weight:600;color:var(--muted);}
.crumb b{color:var(--red-2);}
.logo-badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;background:#fff;
  padding:6px 12px 6px 8px;border-radius:999px;box-shadow:var(--shadow);
  font-weight:800;font-size:12px;color:var(--red-2);
}
.logo-badge .dot{width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--red-1),var(--red-2));
  display:flex;align-items:center;justify-content:center;font-size:11px;}

/* ===== Landing Hero ===== */
.hero{position:relative;text-align:center;padding:38px 14px 26px;}
.hero .pulse{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:-1;opacity:0.15;}
.hero .kicker{
  display:inline-block;background:#fff;color:var(--red-2);font-weight:700;font-size:12.5px;
  padding:7px 16px;border-radius:999px;box-shadow:var(--shadow);letter-spacing:0.06em;
  text-transform:uppercase;margin-bottom:18px;
}
.hero h1{
  font-size:clamp(34px,10vw,50px);line-height:0.98;margin:0 0 10px;
  color:var(--red-2); text-shadow: 3px 3px 0 rgba(0,0,0,0.06);
}
.hero h1 span{display:block;color:var(--ink);font-size:0.42em;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:0.02em;margin-top:8px;}
.hero p.sub{color:var(--muted);font-size:14.5px;max-width:340px;margin:0 auto;font-weight:500;}

.tiles{display:grid;grid-template-columns:1fr;gap:18px;margin-top:26px;}
.tile{
  position:relative;border-radius:28px;padding:26px 22px;overflow:hidden;
  cursor:pointer;border:none;text-align:left;box-shadow:var(--shadow);
  transition:transform .18s ease, box-shadow .18s ease;
}
.tile:active{transform:scale(0.985);}
.tile:hover{transform:translateY(-3px);}
.tile.reports{background:linear-gradient(135deg,#fb7185,#be123c);}
.tile.exams{background:linear-gradient(135deg,#fb923c,#c2410c);}
.tile.game{background:linear-gradient(135deg,var(--game-1),var(--game-2));}
.tile .t-icon{font-size:40px;display:block;margin-bottom:10px;filter:drop-shadow(0 3px 4px rgba(0,0,0,0.15));}
.tile .t-title{font-family:'Anton',sans-serif;color:#fff;font-size:26px;letter-spacing:0.3px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.12); margin:0 0 4px;}
.tile .t-sub{color:rgba(255,255,255,0.92);font-size:13px;font-weight:500;margin:0;}
.tile .t-count{
  position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.24);
  color:#fff;font-weight:800;font-size:12px;padding:5px 12px;border-radius:999px;
  backdrop-filter:blur(4px);
}
.tile .t-arrow{position:absolute;bottom:18px;right:20px;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}

.footnote{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;font-weight:500;}

/* ===== List page (reports/exam systems) ===== */
.page-title-banner{
  background:linear-gradient(135deg,var(--red-1),var(--red-2));
  border-radius:24px;padding:22px 20px;margin-bottom:18px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.page-title-banner h2{
  font-family:'Anton',sans-serif;color:#fff;font-size:26px;margin:0 0 4px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.12);letter-spacing:0.3px;
  padding-right:64px;line-height:1.05;
}
.page-title-banner p{color:rgba(255,255,255,0.92);font-size:13px;margin:0;font-weight:500;padding-right:56px;}
.page-title-banner .banner-icon{position:absolute;right:14px;top:14px;font-size:46px;opacity:0.25;pointer-events:none;}

.grid-list{display:grid;grid-template-columns:1fr;gap:12px;}
.list-card{
  background:#fff;border-radius:20px;padding:15px 16px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent;
  transition:transform .15s ease, border-color .15s ease;
}
.list-card:hover{transform:translateX(3px);}
.list-card .lc-icon{
  width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.list-card .lc-body{flex:1;min-width:0;}
.list-card .lc-title{font-weight:800;font-size:15.5px;margin:0 0 2px;color:var(--ink);}
.list-card .lc-sub{font-size:12.5px;color:var(--muted);margin:0;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-card .lc-count{font-size:11px;font-weight:700;color:#fff;padding:3px 9px;border-radius:999px;margin-top:6px;display:inline-block;}
.list-card .lc-chev{color:#cbd5e1;font-size:20px;flex-shrink:0;}

/* ===== Flashcard viewer ===== */
.viewer-head{
  border-radius:24px;padding:20px 20px 18px;margin-bottom:16px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;color:#fff;
}
.viewer-head h2{font-family:'Anton',sans-serif;font-size:22px;margin:0 0 4px;letter-spacing:0.3px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.12);padding-right:52px;line-height:1.1;}
.viewer-head .vh-tag{font-size:12.5px;opacity:0.92;font-weight:500;margin:0;padding-right:52px;line-height:1.35;}
.viewer-head .vh-icon{position:absolute;right:16px;top:16px;font-size:34px;opacity:0.28;pointer-events:none;}
.progress-track{height:6px;background:rgba(255,255,255,0.35);border-radius:999px;margin-top:14px;overflow:hidden;}
.progress-fill{height:100%;background:#fff;border-radius:999px;transition:width .3s ease;}
.progress-label{font-size:11px;font-weight:700;margin-top:6px;opacity:0.95;}

.stage{position:relative;flex:1;display:flex;flex-direction:column;width:100%;max-width:640px;margin:0 auto;}
.card-wrap{position:relative;min-height:340px;}
.flashcard{
  background:#fff;border-radius:var(--card-radius);padding:24px 22px 22px;box-shadow:var(--shadow);
  animation:pop .28s ease;
}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.fc-icon-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.fc-icon{
  width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;font-family:'Anton',sans-serif;flex-shrink:0;
}
.fc-title{font-weight:800;font-size:18px;color:var(--ink);margin:0;line-height:1.25;}
.fc-sub{font-size:12px;color:var(--muted);margin:2px 0 0;font-weight:500;}
.fc-bullets{list-style:none;margin:0 0 8px;padding:0;display:flex;flex-direction:column;gap:12px;}
.fc-bullets li{
  display:flex;gap:10px;font-size:14.5px;line-height:1.5;color:#374151;font-weight:500;
  align-items:flex-start;
}
.fc-bullets li::before{
  content:'▶';font-size:10px;margin-top:5px;flex-shrink:0;color:var(--bullet-color,var(--red-2));
}
.fc-bullets li .li-text{flex:1;min-width:0;}
.fc-bullets li strong.kw{color:var(--bullet-color,var(--red-2));font-weight:800;}
.fc-bullets li.fc-subhead{
  display:block;margin:2px 0 -4px;font-family:'Anton',sans-serif;font-size:11.5px;
  letter-spacing:0.06em;text-transform:uppercase;color:var(--bullet-color,var(--red-2));opacity:0.82;
}
.fc-bullets li.fc-subhead::before{content:none;}
.fc-bullets li.fc-subhead:not(:first-child){padding-top:10px;margin-top:2px;border-top:1.5px dashed #f3d3d8;}

.think-box{
  margin-top:16px;background:linear-gradient(135deg,#fff9db,#fef3c7);
  border:1.5px solid #fde68a;border-radius:16px;padding:14px 16px;display:flex;gap:10px;
}
.think-box .tb-icon{font-size:22px;flex-shrink:0;}
.think-box .tb-text{font-size:13.5px;color:#78350f;font-weight:600;line-height:1.5;}
.think-box .tb-label{font-family:'Anton',sans-serif;color:#b45309;font-size:13px;letter-spacing:0.4px;
  display:block;margin-bottom:3px;}
.think-box.k-danger{background:linear-gradient(135deg,#fee2e2,#fecaca);border-color:#fca5a5;}
.think-box.k-danger .tb-text{color:#7f1d1d;}
.think-box.k-danger .tb-label{color:#b91c1c;}
.think-box.k-pearl{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#86efac;}
.think-box.k-pearl .tb-text{color:#14532d;}
.think-box.k-pearl .tb-label{color:#15803d;}

/* step-level peds vs adult note */
.step-note{margin-top:14px;border-radius:16px;overflow:hidden;border:1.5px solid #e5e7eb;}
.step-note .sn-head{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#f8fafc;
  font-family:'Anton',sans-serif;font-size:11.5px;letter-spacing:0.5px;color:#64748b;}
.step-note .sn-rows{display:flex;flex-direction:column;}
.step-note .sn-row{display:flex;gap:9px;padding:10px 12px;font-size:12.5px;line-height:1.45;font-weight:500;color:#374151;}
.step-note .sn-row.peds{background:#eff6ff;border-top:1px solid #dbeafe;}
.step-note .sn-row.adult{background:#fdf2f8;border-top:1px solid #fbcfe8;}
.step-note .sn-tag{flex-shrink:0;font-weight:800;font-size:11px;padding:2px 8px;border-radius:999px;height:fit-content;white-space:nowrap;}
.step-note .sn-row.peds .sn-tag{background:#bfdbfe;color:#1d4ed8;}
.step-note .sn-row.adult .sn-tag{background:#fbcfe8;color:#be185d;}

/* diff/comparison card */
.diff-card{background:#fff;border-radius:var(--card-radius);padding:22px;box-shadow:var(--shadow);animation:pop .28s ease;}
.diff-title{font-family:'Anton',sans-serif;font-size:19px;color:var(--ink);text-align:center;margin:0 0 4px;}
.diff-sub{text-align:center;color:var(--muted);font-size:12.5px;margin:0 0 18px;font-weight:600;}
.diff-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.diff-col{border-radius:18px;padding:14px 12px;}
.diff-col.peds{background:linear-gradient(160deg,#dbeafe,#eff6ff);border:1.5px solid #bfdbfe;}
.diff-col.adult{background:linear-gradient(160deg,#fce7f3,#fdf2f8);border:1.5px solid #fbcfe8;}
.diff-col-head{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:10px;}
.diff-col-head .dch-icon{width:40px;height:40px;border-radius:50%;background:#fff;display:flex;align-items:center;
  justify-content:center;font-size:19px;box-shadow:0 3px 8px rgba(0,0,0,0.08);margin-bottom:6px;}
.diff-col-head .dch-label{font-weight:800;font-size:12px;letter-spacing:0.03em;}
.diff-col.peds .dch-label{color:#1d4ed8;}
.diff-col.adult .dch-label{color:#be185d;}
.diff-col ul{margin:0;padding-left:16px;display:flex;flex-direction:column;gap:8px;}
.diff-col li{font-size:12px;line-height:1.45;font-weight:500;color:#374151;}
.diff-col li strong{color:inherit;}

/* nav arrows + dots */
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:18px;}
.navbtn{
  width:52px;height:52px;border-radius:50%;background:#fff;border:none;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--red-2);
  cursor:pointer;flex-shrink:0;transition:transform .15s ease;
}
.navbtn:disabled{opacity:0.35;cursor:default;}
.navbtn:not(:disabled):active{transform:scale(0.92);}
.dots{display:flex;gap:6px;flex:1;justify-content:center;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:#f1c6cf;cursor:pointer;transition:all .2s ease;}
.dot.active{width:22px;border-radius:5px;background:var(--red-2);}
.dot.special{background:#fbbf24;}
.dot.special.active{background:#b45309;}

.watermark-corner{position:fixed;bottom:14px;right:16px;z-index:5;display:flex;align-items:center;gap:6px;
  background:#fff;padding:6px 12px 6px 7px;border-radius:999px;box-shadow:var(--shadow);opacity:0.92;pointer-events:none;}
.watermark-corner .wc-dot{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--red-1),var(--red-2));
  display:flex;align-items:center;justify-content:center;font-size:11px;}
.watermark-corner span.wc-text{font-weight:800;font-size:11px;color:var(--red-2);}

/* ===== Diagnosis game ===== */
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px;}
.case-tile{
  aspect-ratio:1;border-radius:16px;background:#fff;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-weight:800;cursor:pointer;position:relative;border:2px solid transparent;color:var(--ink);
  transition:transform .15s ease;
}
.case-tile:hover{transform:translateY(-2px);}
.case-tile .ct-num{font-size:17px;font-family:'Anton',sans-serif;}
.case-tile.solved{background:linear-gradient(135deg,#34d399,#059669);color:#fff;}
.case-tile.failed{background:linear-gradient(135deg,#fb7185,#be123c);color:#fff;}
.case-tile .ct-badge{position:absolute;top:4px;right:6px;font-size:10px;}

.clue-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.clue-item{
  background:#fff;border-radius:16px;padding:13px 15px;box-shadow:var(--shadow);
  display:flex;gap:11px;align-items:flex-start;
}
.clue-item .clue-num{
  width:26px;height:26px;border-radius:50%;background:var(--game-1);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11.5px;flex-shrink:0;
  font-family:'Anton',sans-serif;
}
.clue-item .clue-text{font-size:13.5px;line-height:1.5;color:#374151;font-weight:500;padding-top:3px;}
.clue-item.locked{background:#f8fafc;box-shadow:none;border:1.5px dashed #e2e8f0;}
.clue-item.locked .clue-num{background:#cbd5e1;}
.clue-item.locked .clue-text{color:#94a3b8;font-style:italic;}

.guess-card{background:#fff;border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px;}
.guess-row{display:flex;gap:10px;}
.guess-input{flex:1;border-radius:14px;border:2px solid #f1c6cf;padding:13px 15px;font-size:14.5px;
  font-family:'Poppins',sans-serif;font-weight:600;outline:none;background:#fff;min-width:0;color:var(--ink);}
.guess-input:focus{border-color:var(--game-1);}
.guess-btn{border-radius:14px;border:none;background:linear-gradient(135deg,var(--game-1),var(--game-2));
  color:#fff;font-weight:800;padding:0 20px;cursor:pointer;font-size:13.5px;flex-shrink:0;}
.guess-btn:disabled{opacity:0.5;cursor:default;}

.attempt-dots{display:flex;gap:8px;margin:2px 0 4px;justify-content:center;}
.attempt-box{width:32px;height:32px;border-radius:9px;background:#f1f5f9;display:flex;align-items:center;
  justify-content:center;font-weight:800;color:#94a3b8;font-size:13px;font-family:'Anton',sans-serif;}
.attempt-box.wrong{background:#fee2e2;color:#dc2626;}
.attempt-box.correct{background:#dcfce7;color:#16a34a;}

.result-card{border-radius:var(--card-radius);padding:26px 22px;text-align:center;box-shadow:var(--shadow);animation:pop .3s ease;}
.result-card.win{background:linear-gradient(160deg,#dcfce7,#f0fdf4);border:2px solid #86efac;}
.result-card.lose{background:linear-gradient(160deg,#fee2e2,#fff1f2);border:2px solid #fca5a5;}
.result-card .rc-emoji{font-size:42px;margin-bottom:6px;}
.result-card .rc-title{font-family:'Anton',sans-serif;font-size:21px;margin:0 0 8px;}
.result-card.win .rc-title{color:#15803d;}
.result-card.lose .rc-title{color:#b91c1c;}
.result-card .rc-diagnosis{font-weight:800;font-size:16px;margin:2px 0 14px;color:var(--ink);}
.result-card .rc-explain{font-size:13px;color:#374151;line-height:1.6;text-align:left;background:#fff;
  border-radius:14px;padding:14px 16px;margin-top:4px;font-weight:500;}
.result-card .rc-next{margin-top:16px;border:none;border-radius:999px;padding:12px 30px;background:var(--ink);
  color:#fff;font-weight:800;cursor:pointer;font-size:13.5px;}

.hidden{display:none !important;}

/* ===== Responsive: tablet & laptop ===== */
@media (min-width:700px){
  .app{max-width:700px;padding:26px 30px 70px;}
  .tiles{grid-template-columns:1fr 1fr 1fr;}
  .grid-list{grid-template-columns:1fr 1fr;}
  .case-grid{grid-template-columns:repeat(auto-fill,minmax(74px,1fr));}
  .hero{padding:46px 14px 30px;}
}
@media (min-width:1000px){
  .app{max-width:960px;padding:32px 40px 80px;}
  .grid-list{grid-template-columns:1fr 1fr 1fr;}
  .stage{max-width:680px;}
  .flashcard{padding:32px 34px 30px;}
  .fc-title{font-size:20px;}
  .fc-bullets li{font-size:15px;}
  .hero h1{font-size:56px;}
}
@media (max-width:380px){
  .fc-title{font-size:16.5px;}
  .diff-cols{grid-template-columns:1fr;}
}
</style>
</head>

<div class="app" id="app"></div>

<div class="watermark-corner">
  <div class="wc-dot">✚</div><span class="wc-text">Med.Taqi</span>

sm.", "**Right heart border**: Right atrium. Bulging → RA enlargement, pericardial effusion.", "**Left heart border**: Aortic knuckle (top) → pulmonary trunk → left atrial appendage → left ventricle (bottom)."], "think": {"label": "CRITICAL!", "text": "**Widened mediastinum (>8cm) + tearing chest pain = aortic dissection until proven otherwise.** Do NOT give thrombolytics. Urgent CT aortogram."}}, {"icon": "03", "title": "Cardiac Silhouette", "subtitle": "Size, shape, borders - assess every contour", "bullets": ["§Cardiothoracic ratio (CTR)", "**<0.5**: Normal (PA film)", "**0.5-0.55**: Borderline - repeat if clinical concern", "**>0.55**: Cardiomegaly - LV failure, cardiomyopathy, pericardial effusion", "§Cardiac chamber enlargement patterns", "**LV enlargement**: Apex displaced downward and laterally. Boot-shaped heart (cor bovinum in severe cases).", "**LA enlargement**: Double right heart border, left atrial appendage bulge, splaying of carina (>70°), posterior displacement of oesophagus on lateral.", "**RV enlargement**: Cardiac apex lifted off diaphragm (on lateral: retrosternal contact >⅓ of sternum).", "**Pericardial effusion**: Globular \"water bottle\" heart. Rapid enlargement without pulmonary oedema. Echo to confirm."]}, {"icon": "04", "title": "Lung Fields - Zones, Densities & Key Patterns", "subtitle": "Compare zones symmetrically; silhouette sign localises pathology", "bullets": ["§Densities (most → least dense)", "**🤍 Metal**: Clips, pacemakers, prostheses - bright white", "**🩶 Bone**: Ribs, vertebrae, clavicles", "**🩶 Soft tissue / fluid**: Heart, liver, consolidation, effusion", "**🖤 Fat**: Epicardial fat pad, lipoma", "**🖤 Air**: Lung, trachea, bowel - black", "§Key opacity patterns", "**Consolidation**: Airspace opacity with air bronchogram · Pneumonia, pulmonary oedema, haemorrhage, infarction", "**Interstitial**: Reticular, nodular, or reticulo-nodular shadowing · Pulmonary fibrosis, sarcoidosis, lymphangitis carcinomatosa, viral pneumonia", "**Atelectasis**: Volume loss, linear/plate/lobar collapse · Mucus plugging, endobronchial tumour, post-surgical", "**Pleural effusion**: Blunting of costophrenic angle, meniscus sign, dense white · CCF (bilateral), parapneumonic, malignancy, empyema, trauma", "**Pneumothorax**: Visible lung edge, absent lung markings beyond · Spontaneous, trauma, iatrogenic, tension", "**Cavitation**: Air-containing lucency within opacity · TB, abscess, Wegener's, squamous cell carcinoma, infarct"], "think": {"label": "THINK!", "text": "**Silhouette sign:** Loss of a normally visible border indicates adjacent pathology. Lost right heart border = RML consolidation. Lost left heart border = lingular consolidation. Lost hemidiaphragm = lower lobe consolidation/effusion."}}, {"icon": "05", "title": "Diaphragm, Bones & Soft Tissues", "subtitle": "Don't stop at the lungs - the whole film has information", "bullets": ["§Diaphragm", "👆 Right normally higher than left (liver). Left lower → gastric bubble visible beneath", "⬆️ Elevated hemidiaphragm: phrenic nerve palsy, subphrenic pathology, collapse/consolidation of lower lobe, hepatomegaly/splenomegaly", "⬇️ Flattened diaphragm: hyperinflation (COPD, severe asthma, tension PTX)", "💨 Free sub-diaphragmatic air: perforated viscus - surgical emergency", "§Bones - count and assess every rib, clavicle, scapula, vertebra", "🦴 Rib fractures: look for pneumothorax, haemothorax. Flail chest = 3+ consecutive ribs each fractured in 2 places", "🦴 Lytic or sclerotic lesions: metastases (lytic = renal/lung/thyroid; sclerotic = prostate/breast), myeloma", "🦴 Widened superior mediastinum + fractured first rib = major vascular injury until proven otherwise", "§Soft tissues & lines", "📍 ETT tip: 3-7 cm above carina (just below T4)", "📍 CVP line: tip in SVC/right atrium junction - not in ventricle", "📍 NG tube: below diaphragm, left of midline (stomach)", "📍 Chest drain: in pleural space - no kinks"]}, {"icon": "06", "title": "Pulmonary Oedema - Severity Grading", "subtitle": "Kerley lines, bat-wing shadows, effusions - grade it", "bullets": ["§ABCDE of pulmonary oedema (in order of severity)", "**1**: Upper lobe venous diversion (vessels in upper zones ≥ lower zones) · ~18 mmHg", "**2**: Kerley B lines (horizontal lines at lung periphery, interstitial oedema), haziness of hila · ~20-25 mmHg", "**3**: Alveolar oedema - bat-wing / butterfly perihilar opacity · ~25-30 mmHg", "**4**: Bilateral pleural effusions, severe widespread opacity · >30 mmHg"], "think": {"label": "CAUTION!", "text": "**Unilateral pulmonary oedema** may be seen after rapid drainage of a large pneumothorax (re-expansion oedema) or in the contralateral lung after prolonged lateral decubitus position. Don't always assume bilateral."}}, {"icon": "07", "title": "⚡ Emergency Quick Reference", "subtitle": "CXR critical findings at a glance", "bullets": ["**Tension PTX**: Absent breath sounds + deviated trachea (away). Don't wait for CXR. Needle decompression 2nd ICS MCL", "**Aortic Dissection**: Widened mediastinum >8 cm + tearing pain. No thrombolytics. Urgent CT aortogram", "**Massive Haemothorax**: Opacification + haemodynamic instability. Chest drain + urgent cardiothoracic review", "**Lobar Collapse**: Tracheal/fissure deviation toward opacity. Bronchoscopy if endobronchial cause suspected", "**Perforated Viscus**: Free sub-diaphragmatic air. Erect film. Surgical emergency. CT to confirm and plan", "**Pulmonary Oedema**: Bat-wing opacity + Kerley B lines + upper lobe diversion. Treat CCF urgently", "**Malpositioned ETT**: Too low → right main bronchus intubation. Pull back. Confirm 3-7 cm above carina", "**Cavitating Lesion**: Always consider TB, abscess, malignancy. Sputum cultures + AFBs + CT chest"]}]}, {"key": "ecg", "name": "Electrocardiogram", "short": "ECG", "accent": "#2563eb", "icon": "💓", "tagline": "Rate, Rhythm, Axis, Waves, in that order", "steps": [{"icon": "01", "title": "Confirm Details & Calibration", "subtitle": "Before reading a single wave", "bullets": ["**Patient & Date**: Name, DOB, date of recording. Compare with previous ECGs always.", "**Standard Speed**: 25 mm/sec (standard). Each small box = 0.04s. Each large box = 0.2s.", "**Calibration**: Standard = 10mm/mV. Check calibration marker at start of trace.", "**Lead Quality**: Any leads off? Artifact? Tremor baseline? Can't interpret poor quality leads.", "**12-lead groups**: I (Lateral) · II (Inferior) · III (Inferior) · aVR (Cavity) · aVL (Lateral) · aVF (Inferior) · V1 (Septal) · V2 (Septal) · V3 (Anterior) · V4 (Anterior) · V5 (Lateral) · V6 (Lateral)"], "think": {"label": "THINK!", "text": "**Territory groupings to memorise:** Inferior = II, III, aVF (RCA). Lateral = I, aVL, V5, V6 (LCx). Anterior = V1-V4 (LAD). Septal = V1, V2."}}, {"icon": "02", "title": "Heart Rate", "subtitle": "Multiple methods - know them all", "bullets": ["§Rate classification", "**Bradycardia**: <60", "**Normal**: 60-100", "**Tachycardia**: >100", "§Methods to calculate rate", "1️⃣ **300 ÷ large boxes between R waves** - quick and classic. Memorise: 300, 150, 100, 75, 60, 50 for 1-6 large boxes", "2️⃣ **1500 ÷ small boxes between R waves** - more precise at slower rates", "3️⃣ **Count complexes in a 6-second strip × 10** - best for irregular rhythms (AF)", "4️⃣ Machine-calculated rate is a starting point only - always confirm yourself"], "think": {"label": "CAUTION!", "text": "In **atrial fibrillation**, the \"rate\" is a range - report as e.g. \"ventricular rate 70-110 bpm.\" Never use the 300÷ method for irregular rhythms."}}, {"icon": "03", "title": "Rhythm Analysis", "subtitle": "Regular or irregular? P before every QRS?", "bullets": ["§Step-by-step rhythm analysis", "1️⃣ **Is it regular or irregular?** Use calipers/pencil to mark R-R intervals across a long strip", "2️⃣ **Is there a P wave before every QRS?** Normal sinus: P before every QRS, same morphology", "3️⃣ **Is every P followed by a QRS?** If not → heart block", "4️⃣ **P wave morphology:** Upright in I, II, aVF, inverted in aVR = sinus origin. Absent = AF. Sawtooth = flutter. Multiple morphologies = WAP/MAT", "5️⃣ **QRS width:** Narrow <0.12s (supraventricular). Wide ≥0.12s (ventricular or aberrant conduction)", "§Common rhythms - quick ID", "**Normal sinus**: 60-100 · Before each QRS · Narrow · Regular, upright P in II", "**Sinus bradycardia**: <60 · Normal · Narrow · Slow but organised", "**Sinus tachycardia**: >100 · Normal · Narrow · Gradual onset, cause-driven", "**Atrial fibrillation**: Variable · Absent (fibrillatory) · Narrow (usu) · Irregularly irregular!", "**Atrial flutter**: 150 (2:1) · Sawtooth 300/min · Narrow · Constant 2:1 most common", "**SVT (AVNRT)**: 150-250 · Hidden in QRS · Narrow · Sudden onset/offset", "**VT**: >100 · Dissociated · Wide ≥0.12s · AV dissociation, fusion beats", "**VF**: Chaotic · None · Chaotic · No pulse, defibrillate NOW", "**Junctional**: 40-60 · Inverted / absent · Narrow · Retrograde P or buried"], "think": {"label": "CRITICAL!", "text": "**Wide complex tachycardia = VT until proven otherwise.** Treat as VT if in doubt. Giving verapamil to VT can be fatal. Never assume SVT with aberrancy first."}}, {"icon": "04", "title": "Cardiac Axis", "subtitle": "The direction of the main electrical vector", "bullets": ["§Normal axis = −30° to +90°", "**Normal Axis**: −30° to +90°; I: positive, aVF: positive", "**Left Axis Deviation**: −30° to −90°; I: positive, aVF: **negative**", "**Right Axis Deviation**: >+90°; I: **negative**, aVF: positive", "**Extreme Axis**: −90° to ±180°; I: negative, aVF: negative", "§Quick axis check - just use leads I and aVF", "✅ Both positive = normal axis (most common). No further calculation needed", "⬅️ Lead I positive + aVF negative = **LEFT axis**. Causes: LBBB, LAFB, inferior MI, LVH, pre-excitation, pacemaker", "➡️ Lead I negative + aVF positive = **RIGHT axis**. Causes: RBBB, LPFB, RVH, PE (acute), Dextrocardia, lateral MI, normal in children", "↕️ Both negative = **extreme/northwest axis**. Causes: VT, pacemaker, severe cardiomyopathy, hyperkalemia"], "think": {"label": "PEARL!", "text": "**Memory trick:** Think of a thumbs up/down in each lead - up = positive QRS, down = negative. If both thumbs up = normal. I up + aVF down = left. I down + aVF up = right."}}, {"icon": "05", "title": "P Wave Analysis", "subtitle": "Atrial depolarisation - small but critical", "bullets": ["§Normal P wave", "📏 Duration <0.12s (3 small boxes), amplitude <2.5mm", "⬆️ Upright in I, II, aVF, V4-V6. Inverted in aVR. Variable in III, aVL, V1", "🔄 One P per QRS in normal sinus rhythm", "§P wave abnormalities", "**P mitrale**: Broad, notched P in II (M-shaped), biphasic in V1 · Left atrial enlargement (mitral stenosis, LVH)", "**P pulmonale**: Tall, peaked P in II (>2.5mm) · Right atrial enlargement (pulmonary HTN, COPD, TS)", "**Absent P waves**: Fibrillatory baseline · Atrial fibrillation", "**Sawtooth P**: Regular 300/min flutter waves · Atrial flutter", "**Inverted P in II**: Negative P in inferior leads · Junctional rhythm, retrograde conduction", "**Multiple morphologies**: ≥3 different P shapes · MAT (multifocal atrial tachycardia) - COPD"]}, {"icon": "06", "title": "PR Interval & AV Conduction", "subtitle": "The AV node is a traffic light - check it every time", "bullets": ["§PR interval normal = 0.12-0.20s (3-5 small boxes)", "**Normal**: 0.12-0.20s · Regular · Normal sinus rhythm", "**Short PR**: <0.12s · Regular · WPW (delta wave!), LGL, junctional, AV nodal bypass", "**Long PR (fixed)**: >0.20s · Regular, 1:1 · 1st degree AV block", "**Progressively long → dropped QRS**: Lengthening · Grouped beating · 2nd degree Mobitz I (Wenckebach)", "**Fixed long → sudden dropped QRS**: Constant · Grouped beating · 2nd degree Mobitz II - HIGH RISK", "**No relationship P to QRS**: Variable · AV dissociation · 3rd degree (complete) AV block", "§WPW - Short PR + Delta Wave", "⚡ Short PR + slurred QRS upstroke (delta wave) + wide QRS = Wolff-Parkinson-White syndrome", "🚨 Risk of AF conducting rapidly via accessory pathway → VF. **AVOID AV nodal blocking agents (verapamil, adenosine, digoxin)!**"], "think": {"label": "CRITICAL!", "text": "**Mobitz II and 3rd degree AV block** can progress to asystole. Both require **urgent pacing assessment** regardless of haemodynamic stability. Never dismiss these as \"just a heart block.\""}}, {"icon": "07", "title": "QRS Complex Analysis", "subtitle": "Ventricular depolarisation - bundle branches, hypertrophy, MI", "bullets": ["§RBBB - \"Rabbit ears\" in V1", "📈 Normal: R wave grows from V1 to V6. Transition (R=S) normally at V3 or V4", "⬅️ **Poor R wave progression (PRWP):** Transition delayed (V4+). Causes: anterior MI, LBBB, LVH, COPD, cardiomyopathy", "↩️ **Reverse R progression:** R decreases from V1 onwards. Strongly suggests anterior MI", "⚡ **Tall R in V1 alone:** RBBB, WPW type A, posterior MI, RVH, HCM, Duchenne MD", "📏 **Pathological Q wave criteria:** Duration ≥0.04s (1 small box) AND depth ≥25% of following R wave height", "🔍 Must be present in ≥2 contiguous leads in the same territory", "📍 **Inferior:** Q waves in II, III, aVF = inferior MI (RCA)", "📍 **Anterior:** Loss of R wave / Q in V1-V4 = anterior MI (LAD)", "📍 **Lateral:** Q in I, aVL = lateral MI (LCx)", "⚠️ Q in III and aVR alone = normal variant. Needs to be in ≥2 contiguous leads"]}, {"icon": "08", "title": "ST Segment Analysis - STEMI vs NSTEMI", "subtitle": "The most critical step for acute management", "bullets": ["📏 **≥2mm elevation** in ≥2 contiguous leads in V2-V3 (≥2.5mm in men <40yrs, ≥1.5mm in women)", "📏 **≥1mm elevation** in ≥2 contiguous leads in all other leads"]}, {"icon": "09", "title": "T Wave & QT Interval", "subtitle": "Repolarisation abnormalities and dangerous QT prolongation", "bullets": ["§Normal T waves", "⬆️ Upright in I, II, V3-V6. Inverted in aVR. Variable in III, aVL, V1", "📏 Amplitude <5mm in limb leads, <10mm in precordial leads", "🔄 Same direction as QRS (concordant)", "§T wave abnormalities", "**Peaked / tall T waves**: Any · **Hyperkalemia** (earliest sign), hyperacute STEMI, early repolarisation", "**Deep symmetrical T inversion**: V1-V4 · Anterior ischaemia, NSTEMI, **Wellens syndrome** (proximal LAD stenosis!)", "**Deep symmetrical T inversion**: V1-V6 · Apical HCM (Yamaguchi pattern), large PE, NSTEMI", "**T inversion II, III, aVF**: Inferior · Inferior ischaemia, RV strain (PE, COPD)", "**Biphasic T waves in V2-V3**: V2-V3 · **Wellens type A** - reperfusing proximal LAD stenosis. High risk of anterior STEMI!", "**Flattened T waves**: Any · Non-specific - hypokalemia, LVH, digitalis", "§QT Interval - corrected QTc", "📏 Measure from start of QRS to end of T wave in V5 or II (clearest)", "🧮 **Bazett formula: QTc = QT ÷ √RR interval** (RR in seconds)", "✅ Normal QTc: <440ms (men), <460ms (women)", "🚨 QTc >500ms = high risk of **Torsades de Pointes** (polymorphic VT). Stop offending drugs!", "§Causes of prolonged QT", "**Drugs (most common)**: Amiodarone, sotalol, quinidine, haloperidol, methadone, macrolide antibiotics, fluconazole, chloroquine", "**Electrolytes**: Hypokalaemia, hypomagnesaemia, hypocalcaemia - all prolong QT. Check and correct urgently.", "**Congenital LQTS**: Romano-Ward (AD), Jervell-Lange-Nielsen (AR + deafness). Young patient, syncope, family history of sudden death", "**Acquired**: Myocarditis, hypothyroidism, hypothermia, head injury (raised ICP), subarachnoid hemorrhage"], "think": {"label": "CRITICAL!", "text": "**Wellens syndrome = pre-infarction pattern.** Biphasic or deep inverted T in V2-V3, often with minimal pain, may be pain-free at time of ECG. This patient has critical proximal LAD stenosis. Do NOT do stress test - urgent cath!"}}, {"icon": "10", "title": "Formulate Your ECG Report", "subtitle": "Put it all together - systematic conclusion every time", "bullets": ["§Structured report format", "1️⃣ **Rate:** \"Heart rate approximately ___ bpm\"", "2️⃣ **Rhythm:** \"Normal sinus rhythm / AF / VT etc.\"", "3️⃣ **Axis:** \"Normal axis / LAD / RAD\"", "4️⃣ **Intervals:** \"PR ___ ms, QRS ___ ms, QTc ___ ms. [Abnormal if prolonged/short]\"", "5️⃣ **P waves:** \"Normal / P mitrale / P pulmonale / absent\"", "6️⃣ **QRS:** \"Narrow / wide. RBBB/LBBB. Pathological Q waves in [territory]. Poor R wave progression.\"", "7️⃣ **ST segment:** \"STE in [leads] consistent with [territory] STEMI / STD in [leads] suggesting ischaemia\"", "8️⃣ **T waves:** \"T inversion in [leads]. Peaked T. Biphasic T in V2-V3 (Wellens).\"", "9️⃣ **Overall impression:** \"This ECG is consistent with [diagnosis]. Clinical correlation required.\"", "📞 **Urgent action if needed:** Call immediately for STEMI, VT, complete heart block, Torsades"], "think": {"label": "PEARL!", "text": "**Always compare with the old ECG!** Dynamic change (new LBBB, new STE, new deep T inversion) matters far more than an isolated finding in isolation. An ECG that \"looks normal\" may be massively abnormal for that patient."}}, {"icon": "11", "title": "⚡ Emergency Quick Reference", "subtitle": "ECG critical findings at a glance", "bullets": ["**STEMI**: STE ≥1mm in ≥2 contiguous leads. Activate cath lab NOW", "**Posterior MI**: STD in V1-V3 + tall R in V1. Do posterior leads. Easily missed!", "**RV Infarct**: Inferior STEMI + STE in V4R. No nitrates! Give fluids", "**VT**: Wide complex tachy = VT until proven. Never give verapamil!", "**VF**: Chaotic trace. No pulse. Defibrillate immediately. No other option", "**Complete Heart Block**: P waves dissociated from QRS. Urgent pacing assessment", "**Torsades**: QTc >500ms + polymorphic VT. Stop QT-prolonging drugs. Mg2+ IV", "**WPW + AF**: Irregularly irregular + wide QRS + delta waves. Avoid AV blockers! Procainamide", "**Wellens Syndrome**: Biphasic/deep T inv in V2-V3. Critical LAD stenosis. No stress test!", "**De Winter T waves**: Upsloping STD + tall T in V1-V6. Proximal LAD occlusion. Activate cath!", "**Hyperkalaemia**: Peaked T → wide QRS → sine wave → VF. Calcium gluconate first!", "**aVR STE**: STE in aVR + diffuse STD = left main / proximal LAD. Highest mortality"]}]}, {"key": "abg", "name": "Arterial Blood Gas", "short": "ABG", "accent": "#0d9488", "icon": "🩸", "tagline": "pH decides the story, everything else confirms it", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**pH**: 7.35 - 7.45", "**PaCO₂**: 35 - 45 mmHg", "**HCO₃⁻**: 22 - 26 mEq/L", "**PaO₂**: 80 - 100 mmHg", "**SpO₂**: >94%", "**Base Excess**: −2 to +2"]}, {"icon": "01", "title": "Step 1 - Assess the pH", "subtitle": "Is it acidaemia, alkalaemia, or normal?", "bullets": ["§pH classification", "**Acidaemia**: pH < 7.35; Primary process is an acidosis", "**Normal**: pH 7.35 - 7.45; Can still have mixed disorders!", "**Alkalaemia**: pH > 7.45; Primary process is an alkalosis", "🔑 pH <7.2 = severe acidaemia → life-threatening. Urgent management", "🔑 pH >7.6 = severe alkalaemia → risk of arrhythmias, tetany, seizures", "💡 The pH tells you the dominant disorder when two processes coexist"], "think": {"label": "CAUTION!", "text": "A **normal pH does NOT mean no disorder** - compensated or mixed disorders can have a normal pH. Always analyse all components regardless of pH."}}, {"icon": "02", "title": "Step 2 - Identify the Primary Disorder", "subtitle": "Is it respiratory or metabolic? Check PaCO₂ and HCO₃⁻", "bullets": ["§The 4 primary disorders", "**Respiratory Acidosis**: ↓ · ↑ >45 · Normal/↑ · Hypoventilation → CO₂ retention", "**Respiratory Alkalosis**: ↑ · ↓ <35 · Normal/↓ · Hyperventilation → CO₂ washout", "**Metabolic Acidosis**: ↓ · Normal/↓ · ↓ <22 · HCO₃⁻ loss or acid gain", "**Metabolic Alkalosis**: ↑ · Normal/↑ · ↑ >26 · HCO₃⁻ gain or acid loss"], "think": {"label": "PEARL!", "text": "**Key rule:** The parameter that moves in the SAME direction as pH = the compensatory change. The one that moves in the OPPOSITE direction = the primary driver."}}, {"icon": "03", "title": "Step 3 - Assess Compensation", "subtitle": "Is the compensation appropriate? Is there a second disorder hiding?", "bullets": ["§Expected compensation formulas", "**Metabolic Acidosis**: PaCO₂ = (1.5 × HCO₃⁻) + 8 ± 2; (Winter's formula) · Higher PaCO₂ = concurrent resp acidosis; Lower PaCO₂ = concurrent resp alkalosis", "**Metabolic Alkalosis**: PaCO₂ increases 0.7 mmHg per 1 mEq/L ↑ HCO₃⁻ · Lower = concurrent resp alkalosis; Higher = concurrent resp acidosis", "**Respiratory Acidosis (acute)**: HCO₃⁻ rises 1 mEq/L per 10 mmHg ↑ CO₂ · More HCO₃⁻ rise = concurrent met alkalosis", "**Respiratory Acidosis (chronic)**: HCO₃⁻ rises 3.5 mEq/L per 10 mmHg ↑ CO₂ · Chronic COPD - higher HCO₃⁻ expected", "**Respiratory Alkalosis (acute)**: HCO₃⁻ falls 2 mEq/L per 10 mmHg ↓ CO₂ · More fall = concurrent met acidosis", "**Respiratory Alkalosis (chronic)**: HCO₃⁻ falls 5 mEq/L per 10 mmHg ↓ CO₂ · Pregnancy, altitude acclimatisation"], "think": {"label": "THINK!", "text": "Compensation is **never complete** (never brings pH to exactly normal). If pH normalises fully → suspect a mixed disorder, not pure compensation."}}, {"icon": "04", "title": "Step 4 - Anion Gap (if Metabolic Acidosis)", "subtitle": "MANDATORY in every metabolic acidosis - narrows the differential dramatically", "bullets": ["§Anion Gap formula", "**High AG Metabolic Acidosis (>12)**: **MUDPILES / GOLDMARK:**", "**Normal AG Metabolic Acidosis (8-12)**: **HARDASS / USED CARP:**"]}, {"icon": "05", "title": "Step 5 - Oxygenation Assessment", "subtitle": "PaO₂, A-a gradient, and type of respiratory failure", "bullets": ["§Oxygenation parameters", "**PaO₂ Normal**: 80-100 mmHg on room air. Decreases with age: ~100 − (age/4)", "**PaO₂/FiO₂ ratio**: >400 normal. 200-300 = mild ARDS. 100-200 = moderate. <100 = severe ARDS", "**A-a Gradient**: PAO₂ − PaO₂. Normal = Age/4 + 4 mmHg. Elevated = parenchymal/vascular cause", "§A-a gradient formula: PAO₂ = (FiO₂ × 713) − (PaCO₂ ÷ 0.8)", "**Type 1 Failure**: ↓ · Normal or ↓ · Elevated · PE, pneumonia, pulm oedema, ARDS, fibrosis - V/Q mismatch or shunt", "**Type 2 Failure**: ↓ · ↑ >45 · Normal · COPD, resp muscle weakness, OHS, opiate excess, CNS depression - pump failure", "**High altitude / hypoventilation**: ↓ · ↑ · Normal · Low FiO₂ or reduced drive - no parenchymal disease"], "think": {"label": "CRITICAL!", "text": "**PaO₂ <60 mmHg = respiratory failure.** PaO₂ <55 mmHg = threshold for long-term oxygen therapy in COPD. PaO₂ <40 mmHg = life-threatening."}}, {"icon": "06", "title": "Step 6 - Common Clinical Scenarios", "subtitle": "Putting it all together at the bedside", "bullets": ["§Classic ABG patterns to recognise instantly", "**7.25**: 55 · 23 · Resp acidosis, acute · Acute severe asthma, opiate overdose, resp arrest", "**7.32**: 58 · 30 · Resp acidosis, chronic · COPD exacerbation, chronic hypoventilation", "**7.55**: 28 · 24 · Resp alkalosis · Anxiety, PE, early sepsis, pregnancy, altitude", "**7.20**: 22 · 8 · Met acidosis high AG · DKA, lactic acidosis, uraemia, toxic ingestion", "**7.30**: 30 · 14 · Met acidosis + resp comp · Diarrhoea, RTA, saline excess (normal AG)", "**7.50**: 48 · 36 · Met alkalosis + resp comp · Vomiting, NG suctioning, diuretics, Conn's syndrome", "**7.40**: 20 · 12 · Mixed met acidosis + resp alk · Salicylate poisoning (classic!), septic shock", "**7.38**: 50 · 29 · Compensated resp acidosis · Stable COPD with chronic CO₂ retention"], "think": {"label": "THINK!", "text": "**Salicylate poisoning classic pattern:** Mixed respiratory alkalosis (direct stimulation of respiratory centre) + high AG metabolic acidosis. If both are present = salicylate poisoning until proven otherwise."}}, {"icon": "07", "title": "⚡ Emergency Quick Reference", "subtitle": "ABG critical findings at a glance", "bullets": ["**pH <7.2**: Severe acidaemia. Urgent. Risk of haemodynamic collapse and arrhythmia", "**Type 2 Resp Failure**: PaO₂↓ + PaCO₂↑. Pump failure. NIV/intubation decision", "**DKA**: High AG met acidosis + ketones + glucose. AG often >20", "**Lactic Acidosis**: High AG + lactate >2. Sepsis, ischaemia, metformin, liver failure", "**COPD Exacerbation**: Resp acidosis. Compare with baseline. Chronic compensation HCO₃⁻ raised", "**Salicylate Poisoning**: Mixed resp alk + met acidosis. High AG. Classic dual pattern", "**Vomiting / NG suction**: Met alkalosis + hypochloraemia + hypokalaemia", "**ARDS**: PaO₂/FiO₂ <300. Bilateral infiltrates. Type 1 failure. Elevated A-a gradient"]}]}, {"key": "cbc", "name": "Complete Blood Count", "short": "CBC", "accent": "#dc2626", "icon": "🩸", "tagline": "Three lines: red cells, white cells, platelets", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**Hb (M/F)**: 130-180 / 120-160 g/L", "**MCV**: 80-100 fL", "**MCH**: 27-33 pg", "**MCHC**: 315-360 g/L", "**WBC**: 4-11 × 10⁹/L", "**Neutrophils**: 1.8-7.5 × 10⁹/L", "**Lymphocytes**: 1.0-4.0 × 10⁹/L", "**Platelets**: 150-400 × 10⁹/L", "**Reticulocytes**: 25-100 × 10⁹/L", "**Eosinophils**: 0.04-0.4 × 10⁹/L"]}, {"icon": "01", "title": "Anaemia - Classify by MCV First", "subtitle": "MCV-based classification is the most systematic approach", "bullets": ["§WHO anaemia definition: Hb <130 g/L (men), <120 g/L (women), <110 g/L (pregnant)", "**Microcytic (MCV <80 fL)**: **TAILS:**", "**Normocytic (MCV 80-100 fL)**", "**Macrocytic (MCV >100 fL)**: **ABCDE:**"]}, {"icon": "02", "title": "Iron Deficiency vs Anaemia of Chronic Disease", "subtitle": "The two most common anaemias - differentiate them precisely", "bullets": ["**MCV**: ↓ microcytic · Normal or ↓ · Often normal", "**Serum Iron**: ↓ Low · ↓ Low · ↓ Low", "**TIBC / Transferrin**: ↑ High · ↓ Low/normal · Normal", "**Transferrin Saturation**: ↓ <16% · ↓ <16% · ↓", "**Ferritin**: ↓ <12 µg/L · ↑ Normal or elevated · Variable", "**Soluble TfR**: ↑ Elevated · Normal · ↑", "**Reticulocyte Hb**: ↓ <28 pg · ↓ · ↓", "**Blood film**: Hypochromic, microcytic, pencil cells, target cells · Normochromic normocytic (usually) · Mixed"], "think": {"label": "CAUTION!", "text": "**Ferritin is an acute-phase reactant** - can be falsely elevated in infection, inflammation, malignancy, liver disease. A ferritin 12-100 µg/L in a patient with chronic disease may still represent iron deficiency. Use transferrin saturation + clinical context."}}, {"icon": "03", "title": "Macrocytic Anaemia - B12 & Folate", "subtitle": "Megaloblastic vs non-megaloblastic - the film is the key", "bullets": ["§Megaloblastic anaemia (B12 or folate deficiency)", "🔬 **Blood film:** Hypersegmented neutrophils (≥5 lobes in >5% neutrophils OR any neutrophil with ≥6 lobes) + macro-ovalocytes", "📉 Pancytopenia may develop in severe cases (all cell lines affected)", "🔺 LDH↑ + bilirubin↑ + haptoglobin↓ (intramedullary haemolysis - ineffective erythropoiesis)", "§B12 deficiency vs Folate deficiency", "**Neurological signs**: Yes - SACD (subacute combined degeneration) · No neurological signs", "**Causes**: Pernicious anaemia (anti-IF Ab), vegan diet, gastric surgery, metformin, Crohn's (terminal ileum) · Poor diet (alcohol, elderly), pregnancy, malabsorption, methotrexate, phenytoin, haemolytic anaemia (↑demand)", "**MMA level**: ↑ Methylmalonic acid elevated · Normal MMA", "**Homocysteine**: ↑ Elevated · ↑ Elevated (both raise homocysteine)", "**Treatment**: IM B12 (hydroxocobalamin) 1 mg alt days × 2 weeks, then 3-monthly · Folic acid 5 mg/day. Correct B12 first if both deficient!"], "think": {"label": "CRITICAL!", "text": "**Never give folic acid alone if B12 deficiency coexists** - will precipitate or worsen subacute combined degeneration of the cord (SACD). Always check B12 level before starting folate."}}, {"icon": "04", "title": "Haemolytic Anaemia", "subtitle": "Raised LDH + low haptoglobin + reticulocytosis = haemolysis until proven otherwise", "bullets": ["§Screen for haemolysis", "**LDH**: ↑ Elevated (cell lysis)", "**Haptoglobin**: ↓ Low (binds free Hb)", "**Bilirubin (unconjugated)**: ↑ Elevated (Hb breakdown)", "**Reticulocytes**: ↑ Elevated (BM response)", "§Intravascular vs Extravascular haemolysis", "**Intravascular Haemolysis**: Haemoglobinaemia, haemoglobinuria (pink/red urine), haemosiderinuria. Haptoglobin very low.;; **Causes:** TTP, HUS, MAHA, PNH, G6PD (acute), mechanical heart valves, transfusion reaction, malaria", "**Extravascular Haemolysis**: RBCs destroyed in spleen/liver. Jaundice. Splenomegaly. Urine normal colour.;; **Causes:** Autoimmune haemolytic anaemia (AIHA - warm or cold), hereditary spherocytosis, thalassaemia, sickle cell, hypersplenism"], "think": {"label": "THINK!", "text": "**Direct Antiglobulin Test (DAT / Coombs test):** Positive = immune-mediated haemolysis (AIHA, drug-induced, transfusion reaction). Negative = non-immune haemolysis (TTP, HUS, G6PD, hereditary spherocytosis, PNH)."}}, {"icon": "05", "title": "White Blood Cells - Differential Count", "subtitle": "Each cell type elevation or reduction has a specific differential", "bullets": ["🦠 Bacterial infection (most common), tissue necrosis, burns, MI, surgery", "💊 Steroids (demargination), G-CSF, lithium, adrenaline, smoking", "🩸 Myeloproliferative neoplasms (CML - especially if >50 × 10⁹/L + left shift + basophilia)", "😤 Physiological: exercise, pregnancy, stress, neonatal period", "🔴 **Neutropenia <0.5 × 10⁹/L = agranulocytosis → high risk sepsis. Neutropenic sepsis protocol!**", "🦠 Viral infections (EBV, CMV, HIV, hepatitis), sepsis (consumption)", "💊 Drugs: carbimazole (0.5%), clozapine (1-2%), NSAIDs, sulphonamides, chemotherapy", "🩸 Aplastic anaemia, SLE (anti-neutrophil Ab), hypersplenism, B12/folate deficiency", "🦠 Viral infections: EBV (glandular fever), CMV, hepatitis, COVID-19, HIV (acute), pertussis (\"lymphocytosis of pertussis\")", "🩸 CLL (most common leukaemia in adults - sustained lymphocytosis, smear cells on film)", "⚠️ Absolute lymphocyte count >10 × 10⁹/L + sustained = almost always CLL or lymphoma. Flow cytometry urgently", "🔴 HIV/AIDS (CD4 count guide). Steroids/immunosuppressants. Sepsis. SLE. Sarcoidosis. Chemotherapy", "⚠️ CD4 <200/µL = AIDS-defining. PCP, toxoplasma, CMV retinitis prophylaxis required", "🦠 Chronic infections: TB (classic!), brucellosis, subacute bacterial endocarditis, syphilis", "🔥 Inflammatory: IBD, sarcoidosis, connective tissue disease", "🩸 CMML (chronic myelomonocytic leukaemia) - absolute monocytosis >1.0 × 10⁹/L persistently → bone marrow biopsy", "🔄 Recovery phase after neutropenia (chemotherapy, viral illness) - monocytes recover first", "🩸 **CML (chronic myeloid leukaemia) - basophilia is a hallmark!** Also raised in PV, ET, myelofibrosis", "🦠 Viral infections (chickenpox, influenza), hypothyroidism, IgE-mediated allergy, iron deficiency", "⚠️ Basophils >10% of differential in high WBC context = blast crisis of CML → urgent haematology"]}, {"icon": "06", "title": "Platelets - Thrombocytopenia & Thrombocytosis", "subtitle": "Count + function + clinical context = the full picture", "bullets": ["§Thrombocytopenia severity", "**Mild (100-150)**: Usually safe. Monitor. Investigate cause", "**Moderate (50-100)**: Avoid major surgery. Increased bleeding risk", "**Severe (<50)**: Major bleeding risk. Transfuse if <10 or <20 with bleeding/procedure", "§Causes of thrombocytopenia", "**Decreased production**: Aplastic anaemia, chemotherapy, leukaemia (bone marrow replacement), B12/folate deficiency, alcohol, viral (HIV, EBV, CMV)", "**Increased destruction (immune)**: ITP (most common isolated thrombocytopenia), SLE, antiphospholipid syndrome, drug-induced (heparin = HIT, quinine, vancomycin), post-transfusion purpura", "**Increased destruction (non-immune)**: TTP (Hb↓ + plt↓ + renal failure + neuro signs + fever = pentad), HUS (E. coli O157), DIC (PT↑ + APTT↑ + fibrinogen↓ + D-dimer↑), HELLP, hypersplenism", "**Dilutional**: Massive transfusion, IV fluid resuscitation", "**Pseudothrombocytopenia**: EDTA-dependent platelet clumping. Always check blood film! Repeat in citrate tube", "§Thrombocytosis (>450 × 10⁹/L)", "🔥 **Reactive (most common):** Infection, inflammation, iron deficiency, post-splenectomy, post-surgery/trauma. CRP also elevated", "🩸 **Primary (clonal):** Essential thrombocythaemia (ET), PV, CML, myelofibrosis. Persistent >600 × 10⁹/L without cause → JAK2 V617F mutation + haematology referral"], "think": {"label": "CRITICAL!", "text": "**TTP = haematological emergency.** Pentad: microangiopathic haemolytic anaemia + thrombocytopenia + renal impairment + neurological symptoms + fever. Do NOT delay plasma exchange (PEX). ADAMTS13 activity <10% confirms. Avoid platelet transfusion - \"fuel to the fire.\""}}, {"icon": "07", "title": "Blood Film - The Most Informative Single Test", "subtitle": "Always request a film when the CBC is abnormal or diagnosis is unclear", "bullets": ["§RBC morphology", "**Spherocytes**: Small, dense, no central pallor · Hereditary spherocytosis, AIHA, burns", "**Schistocytes / Fragments**: Fragmented RBCs · TTP, HUS, DIC, mechanical valve haemolysis - MAHA", "**Target cells**: Central dense dot + peripheral ring · Thalassaemia, IDA, liver disease, post-splenectomy, HbC disease", "**Sickle cells**: Crescent-shaped · Sickle cell disease (HbSS)", "**Pencil cells**: Elongated, thin · Iron deficiency anaemia", "**Tear-drop cells (Dacrocytes)**: Tear-drop shape · Myelofibrosis, thalassaemia, marrow infiltration", "**Rouleaux**: Stacked coins · Multiple myeloma, inflammatory states, hyperproteinaemia", "**Acanthocytes (Spur cells)**: Spiculated, irregular · Liver disease, abetalipoproteinaemia, post-splenectomy", "**Hypochromic microcytic**: Small, pale · Iron deficiency, thalassaemia, lead poisoning", "**Howell-Jolly bodies**: Dense nuclear remnants · Asplenia (functional or surgical)", "§WBC abnormalities on film", "🔬 **Blast cells** - any blasts = leukaemia until proven otherwise. Urgent haematology", "🔬 **Smear cells (Smudge cells)** - CLL. Fragile lymphocytes smeared during slide preparation", "🔬 **Hypersegmented neutrophils** - megaloblastic anaemia (B12/folate deficiency)", "🔬 **Left shift (band forms)** - severe bacterial infection, CML, leukaemoid reaction", "🔬 **Toxic granulation + Döhle bodies** - severe bacterial infection, sepsis"]}, {"icon": "08", "title": "⚡ Emergency Quick Reference", "subtitle": "CBC critical findings at a glance", "bullets": ["**TTP**: Plt↓ + MAHA + neuro + renal + fever. Plasma exchange NOW. Do NOT give platelets", "**DIC**: Plt↓ + PT↑ + APTT↑ + fibrinogen↓ + D-dimer↑. Treat underlying cause. FFP + cryo + platelets", "**Febrile Neutropenia**: Temp >38°C + neutrophils <0.5. Broad-spectrum antibiotics within 1 hour. Don't wait for cultures", "**HIT**: Platelets ↓>50% 5-10d post-heparin. Stop ALL heparin. Start argatroban/fondaparinux. 4T score", "**Blast cells on film**: Any blasts = acute leukaemia until proven otherwise. Urgent haematology. NEVER delay", "**Pernicious Anaemia**: Macrocytic + neuro signs + anti-IF antibodies. IM B12 first - then folate if needed", "**CLL**: Sustained lymphocytosis + smear cells. Flow cytometry. CD5+/CD23+/CD19+ = CLL", "**Sickle Cell Crisis**: Hb↓ + pain + infarction. Oxygen + IV fluids + analgesia + exchange transfusion if severe"]}]}, {"key": "lft", "name": "Liver Function Tests", "short": "LFTs", "accent": "#65a30d", "icon": "🫘", "tagline": "Hepatocellular vs cholestatic pattern", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**ALT**: 7-56 U/L", "**AST**: 10-40 U/L", "**ALP**: 44-147 U/L", "**GGT**: 8-61 U/L", "**Bilirubin (total)**: <21 µmol/L", "**Albumin**: 35-50 g/L", "**Total Protein**: 60-80 g/L", "**PT / INR**: INR <1.2"]}, {"icon": "01", "title": "Identify the Pattern - Hepatocellular vs Cholestatic", "subtitle": "This single step directs your entire differential", "bullets": ["**Hepatocellular Pattern**: Predominantly **ALT + AST elevated**; ALP/GGT mildly raised or normal;; R ratio = ALT/ALP (both as ULN multiples); **R > 5 = hepatocellular**", "**Cholestatic Pattern**: Predominantly **ALP + GGT elevated**; ALT/AST mildly raised or normal;; **R < 2 = cholestatic**; R 2-5 = mixed pattern", "§Degree of ALT/AST elevation", "**Mild**: <3× ULN · NAFLD, medications, alcohol, chronic hepatitis, thyroid disease, coeliac", "**Moderate**: 3-10× ULN · Viral hepatitis, autoimmune hepatitis, alcohol, medications, NASH", "**Severe**: >10× ULN · Acute viral hepatitis, ischaemic hepatitis, drug-induced (paracetamol), autoimmune, acute Budd-Chiari", "**Massive (>100×)**: >1000 U/L · Paracetamol hepatotoxicity, ischaemic hepatitis (\"shock liver\"), acute viral hepatitis A/B"]}, {"icon": "02", "title": "AST: ALT Ratio - The DeRitis Ratio", "subtitle": "The ratio often tells you more than the absolute values", "bullets": ["**<1 (ALT dominant)**: ALT > AST · Viral hepatitis (A, B, C), NAFLD/NASH, drug-induced hepatitis", "**≈1**: Equal · Non-specific. Most chronic liver diseases", "**>2 (AST dominant)**: AST >> ALT · **Alcoholic hepatitis** (ratio often 2:1 to 3:1). Also: ischaemic hepatitis, Wilson's, cirrhosis", "**>3**: AST dominant · Strongly suggests alcoholic hepatitis if AST 100-300. GGT also very elevated", "ALT is more liver-specific than AST. AST also rises in muscle disease (myocarditis, rhabdomyolysis, MI) - always check CK if AST elevated with normal ALT."], "think": {"label": "PEARL!", "text": "**Alcoholic hepatitis rule:** AST rarely exceeds 300-400 U/L in alcohol even if severe. AST >1000 = another cause (not just alcohol)."}}, {"icon": "03", "title": "ALP & GGT - Cholestatic Markers", "subtitle": "Distinguish intra vs extrahepatic cholestasis", "bullets": ["§ALP - Alkaline Phosphatase", "🦴 **Non-hepatic ALP sources:** Bone (Paget's, fractures, metastases, adolescent growth), intestine, kidney, placenta - always check GGT!", "🟢 **GGT elevated with ALP** = hepatic/biliary origin confirmed", "🟡 **GGT normal with ALP elevated** = bone source. Check ALP isoforms or bone markers", "📏 ALP >3× ULN with normal ALT/AST = primary biliary cholangitis (PBC), PSC, drug-induced cholestasis, biliary obstruction, bone disease", "§GGT - Gamma GT", "🍺 **GGT is highly sensitive for alcohol use** - rises before other LFTs with regular alcohol intake. Not specific.", "💊 Also raised by: enzyme-inducing drugs (phenytoin, rifampicin, carbamazepine), fatty liver, any liver disease", "🔍 GGT isolated elevation: alcohol, drugs, NAFLD - rarely serious in isolation", "§Cholestasis differential", "**PBC, PSC, viral hepatitis, drugs (co-amoxiclav, flucloxacillin, steroids), alcohol, pregnancy (ICP), sepsis, TPN**: Choledocholithiasis, cholangiocarcinoma, pancreatic cancer head, pancreatitis, Mirizzi syndrome, biliary stricture"]}, {"icon": "04", "title": "Bilirubin - Jaundice Classification", "subtitle": "Pre-hepatic vs hepatic vs post-hepatic", "bullets": ["**Pre-hepatic (unconjugated)**: Bilirubin↑, conjugated normal; Urine: no bilirubin (not water-soluble); Urobilinogen↑;; **Causes:** Haemolysis (sickle cell, G6PD, autoimmune), Gilbert's syndrome, ineffective erythropoiesis", "**Hepatic (mixed)**: Both conjugated + unconjugated↑; Urine: bilirubin present; Dark urine + pale stools (if cholestatic component);; **Causes:** Hepatitis (viral, autoimmune, alcohol), cirrhosis, drugs, sepsis", "**Post-hepatic (conjugated)**: Conjugated bilirubin↑↑; Dark urine + pale stools + pruritus; ALP markedly elevated;; **Causes:** Bile duct stones, pancreatic cancer, cholangiocarcinoma, PSC, Mirizzi"], "think": {"label": "CAUTION!", "text": "**Gilbert's syndrome:** Isolated unconjugated bilirubin elevation, normal LFTs, triggered by fasting/illness/exercise. Benign. No treatment. Confirm by 5-day fasting test or UGT1A1 mutation."}}, {"icon": "05", "title": "Albumin, PT/INR - Synthetic Function", "subtitle": "The true measure of how well the liver is actually working", "bullets": ["§Markers of synthetic function", "🔬 **Albumin:** Made only by the liver. Half-life 20 days. Low albumin = chronic liver disease or malnutrition. Acute liver failure may have normal albumin initially!", "⏱️ **PT/INR:** Reflects clotting factor synthesis (factors I, II, V, VII, X - all liver-made). Half-life hours to days. Best acute marker of liver synthetic function", "📉 Albumin <30 g/L + elevated INR + jaundice = severe liver impairment or acute liver failure", "⚠️ Low albumin also from: nephrotic syndrome (urinary loss), malnutrition, sepsis (dilution + catabolism), protein-losing enteropathy"]}, {"icon": "06", "title": "Child-Pugh & MELD Score", "subtitle": "Scoring severity of chronic liver disease", "bullets": ["§Child-Pugh Score", "**Bilirubin**: <34 µmol/L · 34-51 · >51", "**Albumin**: >35 g/L · 28-35 · <28", "**PT prolongation**: <4 sec · 4-6 sec · >6 sec", "**Ascites**: None · Mild · Moderate-severe", "**Encephalopathy**: None · Grade 1-2 · Grade 3-4", "**Child A (5-6)**: Compensated. 1-yr survival 100%. No major contraindication to surgery", "**Child B (7-9)**: Significant dysfunction. 1-yr survival ~80%. Surgery high risk", "**Child C (10-15)**: Decompensated. 1-yr survival ~45%. Transplant assessment"]}, {"icon": "07", "title": "⚡ Emergency Quick Reference", "subtitle": "LFT critical findings at a glance", "bullets": ["**Acute Liver Failure**: Encephalopathy + coagulopathy + jaundice. KCH criteria for transplant", "**Paracetamol OD**: ALT/AST may reach >10,000. N-acetylcysteine urgently. pH <7.3 = transplant", "**Ischaemic Hepatitis**: ALT/AST >1000 rapidly. History of hypotension/cardiac event. Shock liver", "**Obstructive Jaundice**: ALP↑↑, conjugated bili↑↑, pale stools, dark urine. Ultrasound first", "**Alcoholic Hepatitis**: AST:ALT >2, ratio rarely >300, GGT↑↑, raised MCV. Maddrey score", "**PBC**: Middle-aged woman. ALP↑↑, GGT↑, AMA positive. Cholestatic pattern", "**Gilbert's**: Isolated unconjugated bili↑. All other LFTs normal. Benign. No Rx needed", "**Haemolysis**: Unconjugated bili↑, LDH↑, haptoglobin↓, DAT positive. Check blood film"]}]}, {"key": "rft", "name": "Renal Function Tests", "short": "RFTs", "accent": "#0891b2", "icon": "🫘", "tagline": "Urea, creatinine and the story they tell", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**Creatinine**: 60-110 µmol/L (M) 45-90 µmol/L (F)", "**Urea**: 2.5-7.5 mmol/L", "**eGFR**: >90 mL/min/1.73m²", "**Na⁺**: 135-145 mmol/L", "**K⁺**: 3.5-5.0 mmol/L", "**Bicarbonate**: 22-29 mmol/L", "**Urine PCR**: <15 mg/mmol", "**Urine ACR**: <3 mg/mmol"]}, {"icon": "01", "title": "Creatinine & eGFR - Understand the Numbers", "subtitle": "Creatinine is a late marker - GFR can halve before creatinine doubles", "bullets": ["§eGFR - CKD staging (KDIGO)", "**G1**: ≥90 · Normal or high · Treat if markers of kidney damage present (proteinuria/haematuria)", "**G2**: 60-89 · Mildly decreased · Monitor annually. Optimize BP/glucose", "**G3a**: 45-59 · Mildly-moderately decreased · Nephrology referral if declining. Avoid nephrotoxins", "**G3b**: 30-44 · Moderately-severely decreased · Nephrology referral. Manage complications (anaemia, bone disease)", "**G4**: 15-29 · Severely decreased · Prepare for RRT. AV fistula creation. Transplant workup", "**G5**: <15 · Kidney failure · Dialysis/transplant. Uraemic symptoms"], "think": {"label": "THINK!", "text": "**Creatinine is heavily influenced by muscle mass.** A bodybuilder with Cr 130 µmol/L may have normal GFR. An elderly woman with Cr 90 µmol/L may have Stage 3 CKD. ALWAYS use eGFR, not just creatinine alone."}}, {"icon": "02", "title": "AKI vs CKD - Distinguish Them", "subtitle": "Management is completely different - don't confuse them", "bullets": ["**AKI - Acute Kidney Injury**: Rise in Cr ≥26 µmol/L in 48h OR ≥1.5× baseline in 7d OR urine output <0.5 mL/kg/hr for >6h;; Kidneys are normal size on USS (or enlarged). No anaemia (acutely). No renal bone disease. Previous normal Cr. Rapid onset.", "**CKD - Chronic Kidney Disease**: Abnormalities of kidney structure or function present for >3 months;; Small shrunken kidneys on USS (except DM, ADPKD, amyloid - normal/large). Anaemia (↓EPO). Renal bone disease. Elevated PTH. Long history.", "§AKI KDIGO staging", "**AKI 1**: 1.5-1.9× baseline OR ↑≥26 µmol/L · <0.5 mL/kg/hr for 6-12h", "**AKI 2**: 2.0-2.9× baseline · <0.5 mL/kg/hr for ≥12h", "**AKI 3**: ≥3× baseline OR Cr ≥354 µmol/L OR RRT · <0.3 mL/kg/hr for ≥24h OR anuria ≥12h"]}, {"icon": "03", "title": "AKI Classification - Pre-renal, Intrinsic, Post-renal", "subtitle": "The urea:creatinine ratio and urine studies guide you", "bullets": ["**Urea:Cr ratio**: >100:1 · ~50:1 (normal) · Variable", "**Urine Na⁺**: <20 mmol/L · >40 mmol/L · Variable", "**FENa**: <1% · >2% · Variable", "**Urine osmolality**: >500 mOsm/kg · <350 mOsm/kg · Variable", "**Urine sediment**: Normal / hyaline casts · Muddy brown casts (granular) · Normal", "**Response to fluids**: Rapid improvement · No improvement · Improves after relief", "**Causes**: Hypovolaemia, low CO, NSAIDs, ACEi, sepsis · Ischaemia, gentamicin, contrast, myoglobin, myeloma · BPH, stones, pelvic mass, papillary necrosis"], "think": {"label": "PEARL!", "text": "**FENa = (urine Na × plasma Cr) ÷ (plasma Na × urine Cr) × 100.** FENa <1% in pre-renal (kidneys avidly retaining Na). Unreliable if on diuretics → use FEUrea instead (<35% = pre-renal)."}}, {"icon": "04", "title": "Electrolytes - Na⁺, K⁺, and their disorders", "subtitle": "Life-threatening electrolyte emergencies you must recognise", "bullets": ["§Hyponatraemia (Na⁺ <135) - classify by osmolality + volume", "**Hypervolaemic hyponatraemia**: Low · <20 · Heart failure, cirrhosis, nephrotic syndrome - excess water retention", "**Euvolaemic hyponatraemia**: Low · >20 · SIADH, hypothyroidism, adrenal insufficiency, reset osmostat", "**Hypovolaemic hyponatraemia**: Low · <20 (renal Na loss >20) · GI losses, burns. If urine Na >20: Addison's, diuretics, RTA", "**Pseudohyponatraemia**: Normal/High · - · Hyperglycaemia, hyperlipidaemia, hyperproteinaemia", "§Hyperkalaemia - the dangerous one", "5.5-6.0 - **Mild:** Peaked T waves on ECG", "6.0-6.5 - **Moderate:** Prolonged PR, wide QRS", ">6.5 - **Severe:** Sine wave, VF, asystole → **Calcium gluconate IV immediately!**"], "think": {"label": "CRITICAL!", "text": "**Correction of hyponatraemia:** Max 8-10 mmol/L per 24h (chronic). Overcorrection → **osmotic demyelination syndrome (ODS / central pontine myelinolysis)**. Irreversible. Devastating neurological injury."}}, {"icon": "05", "title": "Proteinuria & Haematuria - Kidney Damage Markers", "subtitle": "Structural damage markers - essential for CKD risk stratification", "bullets": ["§Proteinuria grading (ACR = albumin:creatinine ratio)", "**<3**: A1 - Normal · No significant proteinuria", "**3-30**: A2 - Moderately increased · Microalbuminuria. Early DM nephropathy. Start ACEi/ARB", "**>30**: A3 - Severely increased · Macroalbuminuria. Nephrotic range if >300 mg/mmol. Nephrology referral", "§Nephrotic vs Nephritic syndrome", "**Nephrotic Syndrome**: Proteinuria >3.5g/24h (or PCR >300) + Hypoalbuminaemia + Oedema ± Hyperlipidaemia;; **Causes:** MCD (children), FSGS (adults), membranous (middle-aged, anti-PLA2R), diabetic nephropathy, amyloid", "**Nephritic Syndrome**: Haematuria + Proteinuria (sub-nephrotic) + Hypertension + Oliguria + AKI;; **Causes:** IgA nephropathy, post-strep GN, ANCA vasculitis, anti-GBM (Goodpasture's), lupus nephritis, MPGN"]}, {"icon": "06", "title": "⚡ Emergency Quick Reference", "subtitle": "RFT critical findings at a glance", "bullets": ["**Hyperkalaemia >6.5**: Calcium gluconate IV first. ECG changes = emergency. Avoid K⁺-sparing drugs", "**AKI Stage 3**: Cr ≥3× baseline. Stop nephrotoxins. Fluid challenge if pre-renal. Urology if obstruction", "**Hyponatraemia**: Correct max 8 mmol/L/24h. Overcorrection = ODS/CPM. Check volume status first", "**Pulmonary Oedema + AKI**: Uraemic pulmonary oedema. Urgent dialysis may be needed. Loop diuretics first", "**eGFR <15**: Kidney failure. Prepare for RRT. Transplant assessment. AV fistula", "**Obstruction (Post-renal AKI)**: USS bladder + kidneys urgently. Catheterise / nephrostomy. Relieve then watch for post-obstructive diuresis", "**Rhabdomyolysis**: AKI + very high Cr/urea + CK >1000. Myoglobinuria. Aggressive IV fluids (target UO 200-300 mL/hr)", "**Contrast Nephropathy**: AKI 24-72h post-contrast. Pre-hydrate. Avoid nephrotoxins. Hold metformin"]}]}, {"key": "tft", "name": "Thyroid Function Tests", "short": "TFTs", "accent": "#7c3aed", "icon": "🦋", "tagline": "TSH leads, T3/T4 confirm", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**TSH**: 0.4 - 4.0 mIU/L", "**Free T4 (FT4)**: 9 - 25 pmol/L", "**Free T3 (FT3)**: 3.5 - 7.8 pmol/L", "**TPO antibodies**: <35 IU/mL", "**TRAb**: Negative", "**Thyroglobulin Ab**: <40 IU/mL"]}, {"icon": "01", "title": "The TSH - Your Primary Screen", "subtitle": "TSH is the most sensitive test for thyroid dysfunction - always start here", "bullets": ["**TSH low (<0.4)**: Thyroid hormone excess (hyperthyroidism) or excess exogenous T4. Check FT4 + FT3 next", "**TSH normal (0.4-4.0)**: Euthyroid. TSH is a log-linear scale - small changes are significant. If TSH normal + symptoms = unlikely thyroid cause", "**TSH high (>4.0)**: Hypothyroidism (primary) or TSH-secreting pituitary adenoma (rare). Check FT4 next", "§TSH interpretation nuances", "⚠️ **TSH lag:** TSH takes 4-6 weeks to reflect changes in thyroid hormone. Don't recheck TFTs too early after starting/adjusting treatment!", "🏥 **Sick euthyroid (non-thyroidal illness):** In acute illness, TSH + T3 + T4 all drop non-specifically. Do NOT treat unless truly hypothyroid", "🤰 **Pregnancy:** TSH naturally lower (hCG cross-reacts with TSH receptor). Upper limit of normal trimester 1 = ~2.5 mIU/L", "💊 **Drugs that suppress TSH:** Steroids, dopamine, metformin, amiodarone, somatostatin analogues"]}, {"icon": "02", "title": "Pattern Recognition - The TFT Matrix", "subtitle": "TSH + FT4 + FT3 combinations and what they mean", "bullets": ["**↓**: ↑ · ↑ · Overt hyperthyroidism · Graves', toxic MNG, toxic adenoma, thyroiditis (early), factitious", "**↓**: Normal · ↑ · T3 toxicosis · Early Graves', toxic adenoma - FT3 rises first", "**↓**: Normal · Normal · Subclinical hyperthyroidism · Same causes. Risk of AF, osteoporosis. Treat if TSH <0.1", "**↑**: ↓ · Low/normal · Overt hypothyroidism · Hashimoto's, post-ablation, post-thyroidectomy, iodine deficiency", "**↑**: Normal · Normal · Subclinical hypothyroidism · Early Hashimoto's. Treat if TSH >10 or symptomatic or pregnant", "**↓**: ↓ · ↓ · Central hypothyroidism · Pituitary/hypothalamic disease. Sheehan's, craniopharyngioma, pituitary adenoma", "**↑**: ↑ · - · TSH-secreting adenoma · Rare pituitary tumour. Check MRI pituitary", "**↓/Normal**: ↓/Normal · ↓ · Sick euthyroid · Acute illness. Do NOT treat. Recheck after recovery"]}, {"icon": "03", "title": "Hyperthyroidism - Causes & Clinical", "subtitle": "Not all hyperthyroidism is Graves' - differentiate carefully", "bullets": ["§Causes of hyperthyroidism", "**Graves' disease**: Young woman, goitre, exophthalmos, pretibial myxoedema, thyroid bruit · TRAb +ve (80-95%) · Diffuse increased uptake", "**Toxic MNG**: Older patient, multinodular goitre, no eye signs · Negative · Patchy increased uptake", "**Toxic adenoma**: Single nodule, younger patient · Negative · Hot nodule + suppressed rest", "**Thyroiditis (De Quervain's)**: Painful goitre, post-viral, high CRP/ESR, self-limiting · TPO may be +ve · Reduced uptake", "**Amiodarone-induced**: Type 1: iodine excess (MNG). Type 2: destructive thyroiditis. Complex management · Variable · Variable", "**Factitious**: Exogenous T4 ingestion. Low thyroglobulin! · Negative · Suppressed"], "think": {"label": "CRITICAL!", "text": "**Thyroid storm:** Extreme hyperthyroidism with multi-organ failure. Burch-Wartofsky score >45 = probable storm. Treat with PTU + beta-blockers + iodine (Lugol's) + steroids + supportive. ICU admission."}}, {"icon": "04", "title": "Hypothyroidism - Causes, Features & Treatment", "subtitle": "The great masquerader - think of it in every vague presentation", "bullets": ["§Causes of hypothyroidism", "**Hashimoto's thyroiditis**: Most common in developed world. Women. Goitre → atrophic. TPO Ab +ve · TPO Ab (95%), TgAb", "**Post-ablation / thyroidectomy**: History of treatment for hyperthyroidism or thyroid cancer · -", "**Iodine deficiency**: Developing world. Endemic goitre. Cretinism if maternal deficiency · Negative", "**Drug-induced**: Amiodarone (iodine content), lithium, interferon-α, tyrosine kinase inhibitors · Variable", "**Central (secondary)**: Pituitary/hypothalamic disease. TSH is low despite low FT4. Check other pituitary axes · Negative", "**Congenital**: Newborn screening programme. Cretinism if untreated - irreversible intellectual disability · -", "§Features of hypothyroidism - \"SLOW\"", "**Symptoms**: Fatigue, weight gain, cold intolerance, constipation, depression, menorrhagia, hair loss, dry skin, hoarse voice, carpal tunnel, bradycardia, delayed tendon reflexes, myxoedematous facies", "**Treatment**: Levothyroxine (T4). Start 50 mcg daily (25 mcg if elderly/cardiac disease). Titrate 6-weekly based on TSH. Target TSH 0.5-2.5 in pregnancy. Take 30-60 min before food."], "think": {"label": "CRITICAL!", "text": "**Myxoedema coma:** Hypothermia + hypoglycaemia + bradycardia + altered consciousness + hyponatraemia. ICU. IV T4 ± T3. Hydrocortisone (may have concurrent adrenal insufficiency). Avoid rapid warming."}}, {"icon": "05", "title": "Thyroid Antibodies & Special Scenarios", "subtitle": "When to check antibodies and what they mean", "bullets": ["§Thyroid antibodies guide", "**TPO Ab (anti-thyroid peroxidase)**: Hashimoto's (95%), Graves' (70%), 10% normal population · Autoimmune thyroid disease marker. Risk of developing hypothyroidism. Check in subclinical hypothyroidism", "**TRAb (TSH receptor Ab)**: Graves' disease (80-95%) · Diagnostic of Graves'. Predicts relapse risk after antithyroid drugs. Neonatal Graves' if high in pregnancy", "**Thyroglobulin Ab (TgAb)**: Hashimoto's, Graves' · Interferes with thyroglobulin assay (used in thyroid cancer follow-up). Check TgAb whenever checking Tg", "§Amiodarone and thyroid", "💊 Amiodarone contains 37% iodine by weight. Check TFTs before starting and every 6 months", "1️⃣ **Amiodarone-induced thyrotoxicosis type 1:** Excess iodine → excess hormone synthesis (iodine-induced). Underlying thyroid disease. Treat with thionamides + potassium perchlorate", "2️⃣ **Amiodarone-induced thyrotoxicosis type 2:** Destructive thyroiditis → leakage of hormone. Normal thyroid. Treat with prednisolone", "❄️ Amiodarone-induced hypothyroidism: More common. Iodine excess inhibits synthesis (Wolff-Chaikoff). Treat with levothyroxine"]}, {"icon": "06", "title": "⚡ Emergency Quick Reference", "subtitle": "TFT critical findings at a glance", "bullets": ["**Thyroid Storm**: Fever + tachyarrhythmia + confusion. Burch-Wartofsky >45. ICU. PTU + propranolol + Lugol's + steroids", "**Myxoedema Coma**: Hypothermia + bradycardia + ↓GCS. ICU. IV T4 ± T3. Hydrocortisone. Slow warming", "**Graves' disease**: TSH↓↓, FT4↑, FT3↑, TRAb +ve, exophthalmos. Carbimazole or PTU", "**De Quervain's**: Painful goitre, post-viral, raised ESR/CRP, self-limiting. NSAIDs ± steroids", "**Subclinical Hypo**: TSH >10 = treat. TSH 4-10 = treat if symptomatic, TPO +ve, or pregnant", "**Amiodarone toxicity**: Check TFTs before and 6-monthly. Type 1 vs Type 2 = different treatment", "**Sick Euthyroid**: Low T3 + T4 in acute illness. TSH usually normal or low. Do NOT treat. Repeat after recovery", "**Central Hypothyroidism**: Low FT4 + low/normal TSH. Check other pituitary axes. MRI pituitary"]}]}, {"key": "pft", "name": "Pulmonary Function Tests", "short": "PFTs", "accent": "#f59e0b", "icon": "🌬️", "tagline": "Obstructive vs restrictive, at a glance", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**FVC**: >80% predicted", "**FEV₁**: >80% predicted", "**FEV₁/FVC**: >0.70 (70%)", "**TLC**: 80-120% predicted", "**RV**: 80-120% predicted", "**DLCO**: >75% predicted", "**RV/TLC ratio**: <0.40", "**Peak Flow**: Varies by age/sex/height"]}, {"icon": "01", "title": "Is the Spirometry Acceptable Quality?", "subtitle": "Garbage in = garbage out. Always check test quality first", "bullets": ["§ATS/ERS acceptability criteria", "📈 **Reproducibility:** ≥3 acceptable efforts. Best FVC and FEV₁ within 150 mL of each other", "⚡ **Effort:** Rapid, forceful start. Peak flow should be achieved within 0.1s (steep initial upstroke)", "⏱️ **Duration:** Exhalation ≥6 seconds (≥3 seconds in children) OR plateau on volume-time curve", "🔄 **No artefacts:** No cough in first second, no glottic closure, no variable effort"], "think": {"label": "CAUTION!", "text": "A poorly performed spirometry is worse than no spirometry - a patient straining suboptimally can mimic obstruction. Report quality in your interpretation."}}, {"icon": "02", "title": "Step 2 - Obstructive vs Restrictive vs Mixed", "subtitle": "The FEV₁/FVC ratio is the key discriminator", "bullets": ["§Pattern identification algorithm", "**Normal**: >0.70 · Normal · Normal · Normal", "**Obstructive**: <0.70 · Normal or ↓ · ↓↓ · Normal or ↑ (air trapping)", "**Restrictive**: >0.70 (normal or ↑) · ↓ <80% · ↓ (proportional) · ↓ <80% (confirms restriction)", "**Mixed**: <0.70 · ↓ · ↓↓ · Variable", "§Severity grading of obstruction (FEV₁ % predicted)", "**Mild**: FEV₁ ≥70%", "**Moderate**: FEV₁ 50-69%", "**Mod-severe**: FEV₁ 30-49%", "**Severe**: FEV₁ <30%"], "think": {"label": "THINK!", "text": "**FVC alone cannot diagnose restriction** - low FVC can occur in obstruction (air trapping) or poor effort. TLC is the gold standard for restriction. FVC <80% + normal FEV₁/FVC = possible restriction. Always confirm with lung volumes (plethysmography or gas dilution)."}}, {"icon": "03", "title": "Obstructive Pattern - Causes & COPD Staging", "subtitle": "FEV₁/FVC <0.70 - narrow the differential", "bullets": ["§Obstructive pattern causes", "**Reversible Obstruction**", "**Irreversible / Fixed Obstruction**", "§COPD severity - GOLD staging (FEV₁ post-bronchodilator)", "**GOLD 1 - Mild**: ≥80% · Often no symptoms. Spirometry finding only", "**GOLD 2 - Moderate**: 50-79% · Exertional dyspnoea. Start LABA/LAMA", "**GOLD 3 - Severe**: 30-49% · Marked dyspnoea. Frequent exacerbations. Add ICS", "**GOLD 4 - Very severe**: <30% · Severe disability. LTOT criteria. Palliative discussion"], "think": {"label": "THINK!", "text": "**Bronchodilator reversibility testing:** Give salbutamol 400 mcg via spacer, repeat spirometry at 15-20 min. Significant = FEV₁ ↑≥12% AND ≥200mL → suggests asthma over COPD (though overlap exists)."}}, {"icon": "04", "title": "Restrictive Pattern - Causes & Lung Volumes", "subtitle": "FEV₁/FVC normal + TLC <80% = true restriction", "bullets": ["§Restrictive pattern causes", "**Intrinsic (Parenchymal)**", "**Extrinsic (Chest Wall / Pleural)**", "**Neuromuscular**"], "think": {"label": "THINK!", "text": "In **neuromuscular disease**, FVC drops significantly (≥20%) when measured supine vs upright - indicates diaphragm weakness. Test this in MND, GBS, myasthenia! Fall in supine FVC = early sign of nocturnal hypoventilation → needs NIV."}}, {"icon": "05", "title": "DLCO - Diffusion Capacity", "subtitle": "Gas transfer across the alveolar-capillary membrane", "bullets": ["§DLCO interpretation", "**Low DLCO**: Emphysema (alveolar destruction), obliterative bronchiolitis · IPF, asbestosis, sarcoidosis, drug-induced fibrosis · Pulmonary hypertension, PE (acute/chronic), anaemia, early ILD", "**Normal/High DLCO**: Asthma (usually normal), chronic bronchitis · Chest wall / neuromuscular restriction (normal gas exchange) · Polycythaemia, pulmonary haemorrhage (Hb in airspaces binds CO!)", "§DLCO correction", "🩸 Always correct DLCO for haemoglobin - anaemia falsely lowers it. DLCO correction = DLCO × (10.22 + Hb) ÷ (1.7 × Hb)", "🌡️ **DLCO high + obstruction** = ASTHMA (not COPD/emphysema). Emphysema always reduces DLCO", "💉 Pulmonary haemorrhage (Goodpasture's, vasculitis) = paradoxically ELEVATED DLCO - haemoglobin in alveolar spaces binds CO"]}, {"icon": "06", "title": "Flow-Volume Loops & Special Patterns", "subtitle": "The shape of the loop tells a story", "bullets": ["§Flow-volume loop patterns", "**Normal**: Triangular expiratory limb, smooth inspiratory limb · -", "**Obstructive**: Scooped-out / concave expiratory limb (classic \"excavation\") · COPD, asthma, bronchiectasis", "**Restrictive**: Small loop, tall narrow shape, normal contour · Fibrosis, chest wall disease", "**Fixed upper airway obstruction**: Flattening of BOTH inspiratory AND expiratory limbs · Tracheal stenosis, goitre compressing trachea, subglottic stenosis", "**Variable extrathoracic obstruction**: Flattening of **inspiratory** limb only · Vocal cord dysfunction, unilateral cord palsy, subglottic lesion", "**Variable intrathoracic obstruction**: Flattening of **expiratory** limb only · Tracheomalacia, intrathoracic tracheal tumour"], "think": {"label": "CAUTION!", "text": "**Flattening of both expiratory AND inspiratory limbs** = fixed large airway obstruction. Think tracheal stenosis, goitre, post-intubation stenosis. CT trachea + ENT/thoracic surgery referral urgently."}}, {"icon": "07", "title": "⚡ Emergency Quick Reference", "subtitle": "PFT critical findings at a glance", "bullets": ["**FEV₁ <1L or <30%**: Very severe obstruction. LTOT criteria if hypoxic. Palliative discussion. Lung transplant?", "**Asthma vs COPD**: Asthma: DLCO normal/↑, reversibility ≥12%+200mL. COPD: DLCO↓, poor/no reversibility, smoker", "**IPF pattern**: Restriction + DLCO↓ + bibasal Velcro crackles + UIP on HRCT. Antifibrotics (nintedanib/pirfenidone)", "**α1-Antitrypsin Deficiency**: Early-onset emphysema, non-smoker or minimal smoking, lower lobe predominance", "**Pulmonary Hypertension**: Isolated DLCO↓ with normal spirometry. Echocardiogram + RHC for confirmation", "**Fixed airway obstruction**: Flat loop both limbs. Tracheal stenosis / goitre. CT tra
