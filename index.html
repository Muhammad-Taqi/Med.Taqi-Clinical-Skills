chea urgently", "**MND / GBS**: Restrictive + FVC drop >20% supine. Diaphragm weakness. NIV when FVC <50%", "**Pulmonary Haemorrhage**: Elevated DLCO + haemoptysis. Goodpasture's / ANCA vasculitis. Anti-GBM antibodies"]}]}, {"key": "ua", "name": "Urinalysis", "short": "UA", "accent": "#ca8a04", "icon": "🧪", "tagline": "Colour, chemistry, then microscopy", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**Specific gravity**: 1.005-1.030", "**pH**: 4.5-8.0", "**Protein**: Negative (trace ok)", "**Glucose**: Negative", "**Ketones**: Negative", "**Blood / Hb**: Negative", "**Nitrite**: Negative", "**Leukocyte esterase**: Negative", "**Bilirubin**: Negative", "**Urobilinogen**: Normal / trace"]}, {"icon": "01", "title": "Macroscopic Appearance & Specific Gravity", "subtitle": "Look first - colour and clarity tell a story", "bullets": ["§Colour interpretation", "**Pale yellow / colourless**: Dilute urine - high fluid intake, diabetes insipidus", "**Dark yellow / amber**: Concentrated (dehydration, fever), normal if concentrated", "**Orange**: Rifampicin, bilirubinuria, dehydration, phenazopyridine", "**Red / pink**: Haematuria, haemoglobinuria, myoglobinuria, beetroot, rifampicin", "**Brown / cola**: Methaemoglobinaemia, myoglobinuria (rhabdomyolysis), bilirubinuria, old blood", "**Milky / cloudy**: Pyuria (UTI), chyluria, phosphaturia (normal cold urine)", "**Green / blue**: Pseudomonas UTI, amitriptyline, propofol infusion", "§Specific gravity", "**SG <1.005 (Hyposthenuric)**: Diabetes insipidus, psychogenic polydipsia, overhydration, early CKD (loss of concentrating ability)", "**SG 1.010 (Isosthenuric)**: Fixed SG = CKD with loss of concentrating ability. Urine osmolality = plasma.", "**SG >1.020 (Hypersthenuric)**: Dehydration, SIADH, post-contrast (falsely elevated), prerenal AKI, adrenal insufficiency"]}, {"icon": "02", "title": "Protein & Glucose", "subtitle": "Proteinuria grading and glucosuria interpretation", "bullets": ["§Proteinuria - dipstick is semi-quantitative", "**Trace**: <300 mg/L · Often benign if isolated. Repeat with MSU", "**1+ (~0.3 g/L)**: ~300 mg/L · Quantify: urine PCR / ACR. Exclude UTI first", "**2+ (~1 g/L)**: ~1000 mg/L · Significant - urgent urine PCR. Consider glomerulonephritis", "**3+ (~3 g/L)**: ~3000 mg/L · Nephrotic range. Urine PCR >300 mg/mmol. Nephrology referral", "**4+ (>20 g/L)**: >20,000 mg/L · Heavy proteinuria. Exclude Bence-Jones protein (myeloma) with immunofixation", "§Glucosuria", "🔴 **Diabetes mellitus:** Blood glucose >10 mmol/L exceeds renal threshold. Always check blood glucose.", "🟡 **Renal glucosuria:** Normal blood glucose. Defective tubular reabsorption (Fanconi syndrome, pregnancy, SGLT2 inhibitors).", "🟡 **Gestational diabetes:** Lower renal threshold in pregnancy. Check GTT."], "think": {"label": "CAUTION!", "text": "**Dipstick detects albumin poorly for Bence-Jones protein (light chains in myeloma).** Request urine protein electrophoresis / immunofixation if myeloma suspected. Dipstick can be negative despite heavy light chain proteinuria."}}, {"icon": "03", "title": "Blood, Nitrite & Leucocyte Esterase", "subtitle": "The UTI and haematuria triad", "bullets": ["§Blood (haematuria)", "**Microscopic haematuria**: >3 RBC/HPF on microscopy. Dipstick positive blood without visible colour change. Always investigate if persistent.", "**Macroscopic haematuria**: Visible red/brown urine. Always urgent investigation regardless of age. Urgent urology referral.", "**Haemoglobinuria**: Dipstick positive for blood, no RBCs on microscopy. Suggests haemolysis (intravascular). Check LDH, haptoglobin, blood film.", "**Myoglobinuria**: Dipstick positive, no RBCs. Rhabdomyolysis. Check CK urgently. Risk of AKI. Aggressive IV hydration.", "§Nitrite & Leucocyte Esterase (UTI dipstick)", "**Positive**: Positive · High probability of UTI - gram-negative bacteria (E.coli, Klebsiella, Proteus) convert nitrate → nitrite", "**Negative**: Positive · UTI possible - gram-positive bacteria (Enterococcus, Staph saprophyticus) don't produce nitrite. Send MSU.", "**Positive**: Negative · Nitrite positive alone - some Enterobacteriaceae. Clinical context important. Send MSU.", "**Negative**: Negative · UTI unlikely (NPV ~95%). Consider other causes if symptoms persist."], "think": {"label": "THINK!", "text": "False negative nitrite: Enterococcus, Pseudomonas, Staph saprophyticus (do not produce nitrite). Short dwell time in bladder (<4h). False positive LE: vaginal contamination, trichomonas, tissue inflammation without bacteria."}}, {"icon": "04", "title": "Ketones, Bilirubin & Urobilinogen", "subtitle": "Metabolic clues from a simple dipstick", "bullets": ["§Ketones", "🔴 **Diabetic ketoacidosis (DKA):** Moderate-large ketones + hyperglycaemia + acidosis. Urgent management protocol.", "🟡 **Alcoholic ketoacidosis:** Ketones + low/normal glucose. History of heavy alcohol. Normal or low blood glucose.", "🟡 **Starvation ketosis:** Mild ketonuria. Normal glucose. Prolonged fasting, hyperemesis gravidarum.", "🟢 **Low-carbohydrate diet / SGLT2 inhibitors:** Mild ketones. Euglycaemic DKA is a rare but serious SGLT2i complication.", "§Bilirubin & Urobilinogen - jaundice pattern", "**Negative**: Normal/↑ · Pre-hepatic (haemolysis) · Haemolytic anaemia, sickle cell, G6PD", "**Positive**: Normal/↑ · Hepatic (hepatocellular) · Viral hepatitis, alcoholic hepatitis, cirrhosis", "**Positive**: Absent/↓ · Post-hepatic (obstructive) · Gallstones, cholangiocarcinoma, pancreatic cancer"]}, {"icon": "05", "title": "Urine Microscopy - Casts & Cells", "subtitle": "Microscopy tells you WHERE the problem is in the nephron", "bullets": ["§Urinary casts - localise renal disease", "**Hyaline casts**: Normal - concentrated urine, exercise, dehydration", "**RBC casts**: Glomerulonephritis - diagnostic. Suggests nephritic syndrome", "**WBC casts**: Acute interstitial nephritis (AIN), pyelonephritis", "**Granular casts (\"muddy brown\")**: Acute tubular necrosis (ATN) - ischaemic or toxic AKI", "**Waxy / broad casts**: Advanced CKD - wide tubules in end-stage nephrons", "**Fatty casts / oval fat bodies**: Nephrotic syndrome - \"Maltese crosses\" under polarised light", "**Tubular epithelial cell casts**: ATN, nephrotoxic drug injury"], "think": {"label": "THINK!", "text": "**RBC casts = glomerular origin of haematuria.** Dysmorphic RBCs (acanthocytes) on phase contrast microscopy also indicate glomerular disease. Isomorphic RBCs suggest lower urinary tract bleeding."}}, {"icon": "06", "title": "⚡ Emergency Quick Reference", "subtitle": "Urinalysis critical findings at a glance", "bullets": ["**DKA**: Large ketones + glucose + acidosis. Urgent insulin + IV fluids. Hourly monitoring", "**Myoglobinuria**: Cola urine + CK >5000 U/L. Aggressive IVF 200-300 mL/hr. Monitor creatinine", "**Macroscopic Haematuria**: Always urgent urology. Rule out bladder/renal malignancy, stones, glomerulonephritis", "**RBC Casts**: Glomerulonephritis. Check ANCA, ANA, anti-GBM, complement, ASOT. Nephrology urgently", "**Heavy Proteinuria (3+/4+)**: Nephrotic syndrome: oedema + hypoalbuminaemia + hyperlipidaemia. Renal biopsy likely needed", "**Bence-Jones**: Dipstick neg but high protein on Urine PE. Myeloma screen: SPEP + immunofixation + serum free light chains", "**Sterile Pyuria**: WBCs but no bacteria. Consider TB (AFB × 3 early morning urine), interstitial nephritis, partially treated UTI", "**Glucosuria + Normal BSL**: Renal glucosuria. Consider Fanconi syndrome - check phosphate, bicarbonate, uric acid, amino acids"]}]}, {"key": "fluid", "name": "Fluid Balance", "short": "Fluids", "accent": "#0284c7", "icon": "💧", "tagline": "Volume status first, numbers second", "steps": [{"icon": "01", "title": "Pleural Fluid - Light's Criteria", "subtitle": "Transudate vs exudate - the most important first step", "bullets": ["§Light's Criteria - exudate if ANY ONE of:", "**Protein ratio**: Pleural protein / Serum protein >0.5", "**LDH ratio**: Pleural LDH / Serum LDH >0.6", "**Pleural LDH**: >⅔ upper limit of normal serum LDH", "§Causes by type", "**CCF (most common bilateral)**: Parapneumonic / empyema", "**Hypoalbuminaemia (cirrhosis, nephrotic)**: Malignancy (any cancer - lung, breast, lymphoma)", "**Hypothyroidism**: TB pleuritis (exudate, lymphocyte predominant)", "**Meig's syndrome (ovarian fibroma)**: PE (haemorrhagic, exudate ~80%)", "**Constrictive pericarditis**: Rheumatoid / SLE pleuritis", "**Peritoneal dialysis**: Chylothorax (milky, triglycerides >1.24 mmol/L)", "§Additional pleural fluid tests", "🔴 **pH <7.2:** Empyema or complicated parapneumonic - chest drain needed", "🔴 **Glucose <2.2 mmol/L:** Empyema, RA, malignancy, TB, oesophageal rupture", "🟡 **Amylase elevated:** Pancreatic effusion, oesophageal rupture, malignancy", "🟡 **Cytology:** Malignant cells - pleural carcinoma. Repeat ×3 for sensitivity", "🟢 **AFB / culture:** TB pleuritis (culture yield ~30%). Pleural biopsy better if suspected"], "think": {"label": "CAUTION!", "text": "**Light's misclassifies ~25% of CCF transudates as exudates** (especially if on diuretics). Use serum albumin − pleural albumin: if >12 g/L, it is a transudate regardless of Light's criteria."}}, {"icon": "02", "title": "Ascitic Fluid - SAAG & Causes", "subtitle": "Serum-ascites albumin gradient to classify ascites", "bullets": ["§SAAG (Serum Albumin − Ascites Albumin)", "**SAAG ≥11 g/L (High)**: Portal hypertension. Accuracy 97%. Cirrhosis, CCF, Budd-Chiari, portal vein thrombosis, right heart failure, constrictive pericarditis", "**SAAG <11 g/L (Low)**: No portal hypertension. TB peritonitis, malignant ascites, nephrotic syndrome, pancreatitis, serositis (SLE)", "§Additional ascitic tests", "🔬 Cell count: >500 WBC (lymphocyte predominant) → TB peritonitis (PMN if acute). Cytology for malignancy", "🧫 Culture in blood culture bottles at bedside (30 mL): increases yield from 40% → 70%", "💛 Amylase: elevated (>200 U/L) → pancreatic ascites", "🔴 Haemorrhagic ascites (RBC >50,000/mm³): malignancy, trauma, hepatocellular carcinoma"], "think": {"label": "CRITICAL!", "text": "**Ascitic PMN count ≥250 cells/mm³ = SBP until proven otherwise.** Start empirical antibiotics immediately (cefotaxime 2g TDS). Do NOT wait for culture results. Avoid aminoglycosides in cirrhosis (nephrotoxic). IV albumin (1.5 g/kg at diagnosis, 1 g/kg on day 3) reduces HRS risk."}}, {"icon": "03", "title": "CSF Analysis - Meningitis Pattern Recognition", "subtitle": "Rapid interpretation can be life-saving - know the patterns", "bullets": ["§Normal CSF values", "**Opening pressure**: 10-20 cmH₂O", "**Colour**: Clear, colourless", "**WBC**: <5 cells/mm³ (lymphocytes)", "**Protein**: 0.15-0.45 g/L", "**Glucose**: 2.5-4.5 mmol/L (60-80% serum)", "§CSF pattern recognition", "**Bacterial meningitis**: Turbid / purulent · ↑↑ PMN (>1000) · ↑↑ >1 g/L · ↓↓ <0.5", "**Viral (aseptic) meningitis**: Clear · ↑ Lymphocytes (50-500) · Normal/↑ slightly · Normal (>0.6)", "**TB meningitis**: Clear / xanthochromic · ↑ Lymphocytes (100-400) · ↑↑ 1-5 g/L · ↓↓ <0.5 (very low)", "**Fungal (Cryptococcus)**: Clear (India ink +ve) · ↑ Lymphocytes · ↑ · ↓", "**Subarachnoid haemorrhage**: Bloody → xanthochromic (>2h) · RBCs, xanthochromia · ↑ · Normal", "**Guillain-Barré**: Clear · Normal (<5) · ↑↑ (cyto-albuminous dissociation) · Normal"], "think": {"label": "CRITICAL!", "text": "**Do NOT delay antibiotics for LP if bacterial meningitis is suspected.** Ceftriaxone 2g IV immediately + dexamethasone 0.15 mg/kg QDS. Contraindications to LP: raised ICP, coagulopathy, local infection. CT head first only if clinical features of raised ICP (papilloedema, focal neuro deficit, GCS <13, immunocompromised)."}}, {"icon": "04", "title": "Synovial Fluid - Joint Aspiration", "subtitle": "Classify arthritis: crystal, septic, or inflammatory", "bullets": ["§Synovial fluid classification", "**Normal**: Clear, straw-coloured · <200 · <25% · Normal", "**Non-inflammatory**: Clear to slightly turbid · 200-2000 · <25% · OA, trauma, haemarthrosis", "**Inflammatory**: Turbid, yellow · 2000-50,000 · >50% · RA, reactive arthritis, gout, pseudogout, SLE", "**Septic**: Purulent, opaque · >50,000 (often >100,000) · >75% · Septic arthritis (Staph aureus most common)", "**Haemorrhagic**: Bloody · Variable · Variable · Trauma, haemophilia, pseudogout, tumour", "§Crystal analysis (polarised light microscopy)", "**Gout (MSU crystals)**: Negatively birefringent. Needle-shaped. Yellow when parallel to compensator. Monosodium urate.", "**Pseudogout (CPPD crystals)**: Positively birefringent. Rhomboid / rod-shaped. Blue when parallel to compensator. Calcium pyrophosphate."], "think": {"label": "CRITICAL!", "text": "**Septic arthritis is a surgical emergency.** WBC >50,000 with >75% PMN = septic until proven otherwise. Joint washout + IV antibiotics. Delay → cartilage destruction within 24-48h. Never withhold antibiotics awaiting crystal analysis."}}, {"icon": "05", "title": "⚡ Emergency Quick Reference", "subtitle": "Body Fluid critical findings at a glance", "bullets": ["**Bacterial Meningitis**: Turbid CSF + PMN↑↑ + glucose↓↓. Ceftriaxone + dexamethasone immediately. Don't delay for CT unless indicated", "**SBP**: Ascites PMN ≥250. Cefotaxime + IV albumin. Risk of hepatorenal syndrome", "**Septic Arthritis**: Joint WBC >50,000. Surgical washout + antibiotics. Urgent orthopaedics", "**Empyema**: Pleural pH <7.2 + turbid fluid. Chest drain + antibiotics. May need VATS if loculated", "**SAH**: Bloody LP → xanthochromia (>2h after ictus). CT first. Neurosurgery/IR referral", "**TB Meningitis**: CSF glucose very low + lymphocytes + high protein. AFB stain. 4-drug ATT + steroids", "**Chylothorax**: Milky white pleural fluid. Triglycerides >1.24 mmol/L. Lymphoma/trauma. Low-fat diet or surgery", "**Gout vs Pseudogout**: Polarised light: needle = MSU (gout), rhomboid = CPPD (pseudogout). Treat inflammation - NSAIDs/colchicine/steroids"]}]}, {"key": "elec", "name": "Electrolytes", "short": "Electrolytes", "accent": "#0369a1", "icon": "🧂", "tagline": "Sodium, potassium, calcium, magnesium", "steps": [{"icon": "00", "title": "Normal Values, Quick Reference", "bullets": ["**Sodium**: 135-145 mmol/L", "**Potassium**: 3.5-5.0 mmol/L", "**Calcium (total)**: 2.12-2.62 mmol/L", "**Corrected Ca²⁺**: Measured Ca + 0.02 × (40 − albumin)", "**Magnesium**: 0.7-1.0 mmol/L", "**Phosphate**: 0.8-1.5 mmol/L", "**Chloride**: 98-106 mmol/L"]}, {"icon": "01", "title": "Hyponatraemia - The Most Common Electrolyte Disorder", "subtitle": "Assess volume status FIRST - it determines treatment", "bullets": ["§Hyponatraemia definition: Na <135 mmol/L - Classify by severity", "**Mild (130-134)**: Often asymptomatic. Nausea, malaise, headache.", "**Moderate (125-129)**: Vomiting, confusion, drowsiness.", "**Severe (<125)**: Seizures, coma, respiratory arrest. URGENT.", "§Step-by-step approach", "**1. Exclude pseudohyponatraemia**: Serum osmolality · Normal (280-295) = artefact (high lipid/protein). Low (<275) = true hyponatraemia", "**2. Assess volume status**: Exam + urine Na · See below ↓", "**3. Hypovolaemic**: Urine Na · <20 = extra-renal loss (vomiting, diarrhoea). >20 = renal loss (diuretics, Addison's)", "**4. Euvolaemic**: Urine osmolality · >100 = SIADH, hypothyroidism, adrenal insufficiency. <100 = polydipsia, reset osmostat", "**5. Hypervolaemic**: Clinical · CCF (urine Na <20), cirrhosis (urine Na <20), nephrotic (urine Na <20), AKI/CKD (urine Na >20)", "§SIADH Diagnostic Criteria (Schwartz-Bartter)", "✅ Plasma osmolality <275 mOsm/kg", "✅ Urine osmolality >100 mOsm/kg (inappropriately concentrated)", "✅ Urine sodium >30 mmol/L", "✅ Clinical euvolaemia (no oedema, no dehydration)", "✅ Normal adrenal, thyroid, renal function"], "think": {"label": "CRITICAL!", "text": "**Osmotic demyelination syndrome (ODS / central pontine myelinolysis)** occurs if hyponatraemia is corrected TOO FAST. Maximum correction: 8-10 mmol/L per 24h (some guidelines: 10-12 mmol/L). Risk factors: alcoholism, malnutrition, liver disease. If overcorrected → relower Na with desmopressin + 5% dextrose."}}, {"icon": "02", "title": "Hypernatraemia - Almost Always Dehydration", "subtitle": "Na >145 - usually loss of free water", "bullets": ["§Causes", "**Inadequate water intake**: Elderly, ICU patient, infants, impaired thirst mechanism · High (>700)", "**Extra-renal water loss**: Fever, sweating, burns, diarrhoea, tachypnoea · High (>700)", "**Renal water loss (Central DI)**: Hypothalamic/pituitary damage: trauma, tumour, surgery, SAH · Low (<300) - responds to DDAVP", "**Renal water loss (Nephrogenic DI)**: Lithium, hypercalcaemia, hypokalemia, CKD, genetic · Low-moderate - does NOT respond to DDAVP", "**Salt excess**: Hypertonic saline, mineralocorticoid excess (Conn's, Cushing's) · Urine Na high"], "think": {"label": "CAUTION!", "text": "**Correct hypernatraemia slowly** - no faster than 10-12 mmol/L per 24h. Too rapid correction → cerebral oedema. Calculate free water deficit: 0.6 × weight (kg) × (Na/140 − 1). Replace over 48-72h using hypotonic fluids (0.45% saline or 5% dextrose)."}}, {"icon": "03", "title": "Hypokalaemia - ECG Changes & Management", "subtitle": "K <3.5 mmol/L - life-threatening at K <2.5", "bullets": ["§Causes of hypokalaemia", "**GI losses**: Vomiting (HCl loss → metabolic alkalosis → renal K wasting), diarrhoea, laxative abuse, ileostomy, fistulae, villous adenoma", "**Renal losses**: Diuretics (thiazide, loop), mineralocorticoid excess (Conn's/Cushing's), Bartter/Gitelman syndrome, hypomagnesaemia, RTA type 1 & 2, polyuria phase of AKI", "**Intracellular shift**: Alkalosis (0.6 mmol/L per 0.1 pH unit), insulin, β2-agonists (salbutamol), refeeding syndrome, hypokalaemic periodic paralysis, B12 therapy", "§ECG changes in hypokalaemia (in order of severity)", "📉 T-wave flattening / inversion", "📉 Prominent U waves (best seen V2-V4)", "📉 ST depression", "🔴 Prolonged QU interval (looks like long QT)", "🔴 Ventricular ectopics → VT / VF (especially if on digoxin)", "§Replacement", "**Mild (3.0-3.5)**: Oral KCl 40-80 mmol/day. Increase dietary potassium.", "**Moderate (2.5-3.0)**: Oral if no symptoms. IV if symptomatic or not absorbing. Max IV rate 20 mmol/h peripherally.", "**Severe (<2.5) or arrhythmia**: IV KCl via central line up to 40 mmol/h with continuous ECG monitoring. ICU setting."], "think": {"label": "CAUTION!", "text": "**Always check and correct magnesium** - hypomagnesaemia causes refractory hypokalaemia (Mg required for NKCC2 and ROMK function in kidney). K will not replace if Mg is low."}}, {"icon": "04", "title": "Hyperkalaemia - Cardiac Emergency Protocol", "subtitle": "K >6.5 mmol/L = MEDICAL EMERGENCY - ECG immediately", "bullets": ["§Causes of hyperkalaemia", "🔴 AKI/CKD - reduced renal excretion (most common)", "🔴 ACE inhibitors, ARBs, potassium-sparing diuretics, NSAIDs", "🟡 Acidosis (0.6 mmol/L rise per 0.1 pH unit drop) - shifts K extracellularly", "🟡 Addison's disease / hypoaldosteronism (type 4 RTA)", "🟡 Massive cell lysis - rhabdomyolysis, tumour lysis syndrome, haemolysis, burns", "🟢 Pseudohyperkalaemia - haemolysed sample, prolonged tourniquet, high platelets/WBC. Repeat sample!", "§ECG changes in hyperkalaemia (in order of severity)", "📈 Peaked (tall tented) T waves - first sign (K ~5.5-6.5)", "📈 Prolonged PR interval", "📈 Widened QRS", "🔴 P wave flattening / disappearance (sino-ventricular conduction)", "🔴 Sine wave pattern → VF / asystole", "§Emergency management - ABCDE approach", "**A - Stabilise membrane**: 10 mL 10% Calcium gluconate IV over 5-10 min · Cardioprotective within 1-3 min. Duration 30-60 min. Repeat if ECG unchanged after 5 min.", "**B - Shift K into cells**: Insulin (10 units soluble) + 50 mL 50% glucose IV (or actrapid + dextrose) · Lowers K by 0.5-1.5 mmol/L within 15-30 min. Duration 4-6h.", "**B - Shift K into cells**: Nebulised salbutamol 10-20 mg · Lowers K by 0.5-1.0 mmol/L. Synergistic with insulin. Avoid in cardiac arrhythmia.", "**B - Shift K into cells**: 8.4% Sodium bicarbonate 50 mmol IV (if metabolic acidosis) · Effective only if acidotic. Lowers K by ~0.5 mmol/L", "**C - Remove K from body**: Furosemide 40-80 mg IV (if not anuric) · Renal excretion. Hours to days. Maintain urine output.", "**C - Remove K from body**: Sodium zirconium cyclosilicate (Lokelma) 10 g TDS × 48h · Binds K in GI tract. Onset 1h. Or patiromer. Better tolerated than calcium resonium.", "**D - Dialysis**: Urgent haemo/peritoneal dialysis · For refractory severe hyperkalaemia or anuric patient. Most effective removal method."]}, {"icon": "05", "title": "Calcium Disorders - Corrected Calcium Formula", "subtitle": "Always correct for albumin before interpreting calcium", "bullets": ["§Hypercalcaemia (corrected Ca >2.62 mmol/L)", "**Causes - \"Bones, Groans, Moans, Psychic Overtones\"**: Primary hyperparathyroidism (most common outpatient). Malignancy (most common inpatient): bone mets, PTHrP (solid tumours), myeloma, lymphoma (1,25-OH vitamin D). Vitamin D toxicity, sarcoidosis, granulomatous disease, milk-alkali, thiazides, thyrotoxicosis.", "§Symptoms by severity", "**<3.0 mmol/L**: Often asymptomatic. Nausea, constipation, polyuria (nephrogenic DI)", "**3.0-3.5 mmol/L**: Nausea, vomiting, confusion, lethargy, bone pain, abdominal pain", "**>3.5 mmol/L (crisis)**: Coma, renal failure, cardiac arrhythmia, pancreatitis - EMERGENCY", "§Management of hypercalcaemia crisis (>3.5 mmol/L)", "💧 **IV 0.9% saline:** 3-4 L over 24h - volume expansion promotes calciuresis", "💊 **IV bisphosphonate:** Zoledronic acid 4 mg or pamidronate 60-90 mg - onset 2-4 days, duration weeks", "💊 **Calcitonin 4-8 IU/kg IM/SC:** Rapid onset (4-6h), tachyphylaxis after 48h", "💊 **Steroids:** For sarcoidosis, vitamin D toxicity, haematological malignancy", "🏥 **Haemodialysis:** For refractory or severe cases with renal failure", "§Hypocalcaemia (corrected Ca <2.12 mmol/L)", "**Causes**: Hypoparathyroidism (post-thyroid/parathyroid surgery most common), vitamin D deficiency/resistance, hypomagnesaemia (refractory), pancreatitis (saponification), CKD, pseudohypoparathyroidism, hungry bone syndrome post-parathyroidectomy", "**Symptoms (Neuromuscular excitability)**: Paraesthesiae (perioral, fingertips), tetany, Trousseau's sign (carpal spasm with BP cuff), Chvostek's sign (facial twitch), seizures, QT prolongation, stridor (laryngospasm)", "§Treatment", "🔴 **Symptomatic/severe:** 10 mL 10% calcium gluconate IV over 10 min (contains 2.25 mmol Ca²⁺). Can repeat. Then infusion.", "🟡 **Mild/asymptomatic:** Oral calcium carbonate 1-2 g/day + vitamin D (calcitriol if PTH deficient)", "✅ Always check and replace magnesium - hypomagnesaemia causes refractory hypocalcaemia"], "think": {"label": "THINK!", "text": "**Corrected calcium formula:** Corrected Ca²⁺ = Measured Ca²⁺ + 0.02 × (40 − albumin g/L). Low albumin → spuriously low calcium. Always use corrected value."}}, {"icon": "06", "title": "Magnesium & Phosphate Disorders", "subtitle": "Often overlooked but clinically critical - especially in ICU", "bullets": ["§Hypomagnesaemia (Mg <0.7 mmol/L)", "**Causes**: Poor intake (alcoholism, malnutrition), GI losses (diarrhoea, PPI use - chronic), renal losses (diuretics, cisplatin, amphotericin, aminoglycosides, EGFR inhibitors), refeeding syndrome", "**Clinical effects**: Causes refractory hypokalaemia and hypocalcaemia. ECG: prolonged QT, TdP. Neuromuscular: tremor, seizures, ataxia. Hypomagnesaemia is the great electrolyte masquerader.", "§Hypophosphataemia (PO₄ <0.8 mmol/L)", "**Causes**: Refeeding syndrome (classic - K, Mg, PO₄ all drop when nutrition restarted in malnourished), hyperparathyroidism (PTH promotes renal PO₄ wasting), antacid use (binds PO₄ in gut), DKA recovery, vitamin D deficiency, respiratory alkalosis", "**Severe effects (<0.3 mmol/L)**: Haemolysis, rhabdomyolysis, encephalopathy, respiratory muscle weakness (failure to wean ventilator), cardiomyopathy, platelet dysfunction"], "think": {"label": "CAUTION!", "text": "**Refeeding syndrome:** Malnourished patient given nutrition → insulin surge → cellular uptake of K, Mg, PO₄ → all three crash. Monitor closely for 72h after restarting nutrition. Restrict calories initially (10 kcal/kg/day) and supplement electrolytes proactively."}}, {"icon": "07", "title": "⚡ Emergency Quick Reference", "subtitle": "Electrolytes critical findings at a glance", "bullets": ["**Severe Hyperkalaemia**: ECG changes (peaked T/wide QRS). Calcium gluconate → insulin/dextrose → salbutamol → dialysis", "**Hypercalcaemia Crisis (>3.5)**: IV saline + IV bisphosphonate + calcitonin. Check PTH + PTHrP + malignancy screen", "**Severe Hyponatraemia + Seizures**: 3% hypertonic saline 150 mL bolus. Target 4-6 mmol/L rise in 6h. ICU. No faster than 10 mmol/L/24h total", "**Symptomatic Hypocalcaemia**: 10 mL 10% calcium gluconate IV over 10 min. Then infusion. Check Mg.", "**Hyponatraemia + SIADH**: Fluid restriction 500-700 mL/day. Tolvaptan if severe/refractory. Treat underlying cause", "**Refeeding Syndrome**: K/Mg/PO₄ all fall when feeding restarted. Monitor daily. Replace proactively. Restrict calories initially", "**DI (Diabetes Insipidus)**: Polyuria + hypernatraemia. Central DI: responds to DDAVP. Nephrogenic: treat cause (lithium, hypercalcaemia)", "**Hypomagnesaemia**: Refractory hypokalaemia/hypocalcaemia = check Mg. Replace first. IV MgSO₄ if symptomatic"]}]}, {"key": "ct", "name": "CT Brain", "short": "CT Brain", "accent": "#4338ca", "icon": "🧠", "tagline": "A structured sweep, slice by slice, window by window", "steps": [{"icon": "01", "title": "Confirm Patient & Scan Details", "subtitle": "Before you look at a single image", "bullets": ["§Always verify first", "**Patient ID**: Name, DOB, MRN - right patient?", "**Clinical Indication**: Trauma? Stroke? Headache? Seizure? Changes your search pattern.", "**Date & Time**: Compare with priors. Timing matters for infarct/bleed evolution.", "**Contrast?**: NCCT = acute blood/trauma. CE-CT = infection, tumour, abscess.", "§CT-specific checks", "📐 Slice thickness: 5mm standard; 1-1.5mm for posterior fossa / skull base", "🔧 Note window settings - you must adjust them yourself (brain + subdural + bone)", "✂️ Coverage: vertex to foramen magnum? Posterior fossa fully included?"]}, {"icon": "02", "title": "Set Your Windows - All Three, Every Time", "subtitle": "The lens through which you see everything", "bullets": ["§CT Window Settings", "**🧠 Brain W:70-80 / L:35**: Cortex, WM/GM differentiation, edema, parenchymal hemorrhage", "**🩸 Subdural W:150-200 / L:75**: Subtle/isodense SDH, thin extra-axial collections - NEVER skip!", "**💀 Bone W:2000-4000 / L:700**: Fractures, skull lesions, calcification, sinuses", "§Hounsfield Unit Reference", "**Air**: −1000 · Black", "**Fat**: −100 to −50 · Dark", "**CSF / Water**: 0-10 · Dark grey", "**White matter**: 20-30 · Light grey", "**Grey matter**: 37-45 · Slightly lighter", "**Acute blood**: 50-80 · Bright white", "**Calcification**: 100-1000 · Very bright", "**Bone**: 400-1000 · Brilliant white"], "think": {"label": "CAUTION!", "text": "**Isodense SDH (1-3 weeks old) is invisible on brain window.** Only the subdural window reveals it. Look for sulcal effacement and white matter \"buckling.\""}}, {"icon": "03", "title": "Midline Shift & Mass Effect", "subtitle": "Do this BEFORE detailed parenchyma review", "bullets": ["§Measuring Midline Shift", "📍 Use the **septum pellucidum** as your midline marker (at the level of foramen of Monro)", "📏 Measure perpendicular distance from the falx (true midline) to the septum pellucidum", "🚨 **≥5mm = significant** - surgical consult needed. Identify direction", "🔄 Shift TOWARD lesion = atrophy/old injury. Shift AWAY = active mass/edema/hemorrhage", "§Mass Effect Signs", "**Sulcal Effacement**: Loss of cortical sulci = raised ICP or local edema compressing subarachnoid space", "**Ventricular Compression**: Ipsilateral ventricle compressed/shifted. Check all ventricles - lateral, 3rd, 4th", "**Basal Cistern Effacement**: Loss of suprasellar/perimesencephalic cisterns = critically raised ICP → impending herniation", "**GW Differentiation Loss**: Blurring of grey-white junction = early cytotoxic edema (infarct). Subtle - easy to miss!", "**Subfalcine** - cingulate under falx", "**Uncal** - medial temporal through tentorial notch → CN3 palsy, blown pupil", "**Central transtentorial** - bilateral downward shift", "**Tonsillar** - cerebellar tonsils through foramen magnum → Cushing's triad"], "think": {"label": "CRITICAL!", "text": "**Herniation patterns:**"}}, {"icon": "04", "title": "Ventricles & CSF Spaces", "subtitle": "Hydrocephalus, IVH, obstruction", "bullets": ["§Check each ventricle in order", "**Lateral Ventricles**: Frontal, temporal, occipital horns. IVH? Asymmetry? Dilated temporal horns = hydrocephalus", "**3rd Ventricle**: Slit-like normally. Enlarged = downstream block. Check for colloid cyst!", "**4th Ventricle**: Diamond-shaped. Compressed = posterior fossa SOL. Enlarged = outflow obstruction", "**Aqueduct of Sylvius**: Best on sagittal MRI. Stenosis = 3rd+lateral dilated, 4th NORMAL", "§Hydrocephalus Types", "🔒 **Obstructive:** Block at aqueduct/4th V → only upstream ventricles dilate", "🌊 **Communicating:** Block at arachnoid granulations → ALL ventricles dilate. Causes: SAH, meningitis, NPH", "📉 **Ex-vacuo:** Dilated ventricles + wide sulci = atrophy. NOT true hydrocephalus", "⚠️ **NPH triad:** Wet + Wobbly + Wacky + disproportionate ventriculomegaly"], "think": {"label": "THINK!", "text": "Periventricular lucency (hypodensity on CT) = transependymal CSF seepage = ACTIVE hydrocephalus with raised pressure"}}, {"icon": "05", "title": "Hemorrhage - Know Every Type Cold", "subtitle": "Location, shape, density, and cause", "bullets": ["**EDH**: Biconvex hyperdense · Skull-dura interface · MMA rupture, temporal # fracture", "**SDH**: Crescent hyperdense · Dura → arachnoid · Bridging veins, elderly/trauma", "**SAH**: Bright sulci/cisterns · Subarachnoid space · Aneurysm rupture, AVM, trauma", "**IPH**: Round/irregular hyperdense · Brain parenchyma · HTN, AVM, amyloid, tumour", "**IVH**: Hyperdense cast in ventricle · Ventricular system · Extension of IPH or SAH", "**EDH = arterial bleed → expands RAPIDLY. Lucid interval then sudden deterioration. Neurosurgery immediately regardless of current GCS!**"], "think": {"label": "CAUTION!", "text": "**EDH does NOT cross suture lines** (dura adherent). **SDH DOES cross sutures** but NOT the falx/tentorium. Use this to distinguish them."}}, {"icon": "06", "title": "Brain Parenchyma - Lobe by Lobe", "subtitle": "Never skip a region - be systematic", "bullets": ["§Review order", "1️⃣ **Frontal lobes** - ACA territory, white matter changes, subfrontal contusions", "2️⃣ **Parietal lobes** - MCA territory, watershed zones", "3️⃣ **Temporal lobes** - MCA territory, contusions, uncal herniation", "4️⃣ **Occipital lobes** - PCA territory, visual cortex, coup-contrecoup", "5️⃣ **Basal ganglia & thalami** - deep perforators, hypertensive IPH, lacunar infarcts", "6️⃣ **Internal capsule / corona radiata** - watershed, small vessel disease", "7️⃣ **Cerebellum** - PICA/AICA territory, metastases very common here!", "8️⃣ **Brainstem** - Basilar perforators, DAI, Duret hemorrhages", "§Edema patterns", "**Vasogenic**: White matter \"fingers.\" BBB breakdown. Mass lesion / met / abscess", "**Cytotoxic**: Grey + white matter in vascular territory. Cell death. Infarction", "**Interstitial**: Periventricular halo. CSF seeping through ependyma. Hydrocephalus"]}, {"icon": "07", "title": "Vascular Signs & Vessels", "subtitle": "Don't miss the hyperdense vessel signs", "bullets": ["🔴 **Hyperdense MCA sign:** Spontaneous hyperdensity in MCA = acute thrombus → ischemic stroke → urgent CTA + thrombectomy assessment", "🔴 **Dense basilar sign:** Hyperdense basilar artery = basilar thrombosis → catastrophic if missed. High mortality", "⭕ **SAH in basal cisterns** → aneurysm until proven otherwise → CTA immediately", "🌀 Vessel wall calcification (atherosclerosis) = common incidental finding", "🔵 **Dense sinus sign:** Hyperdense dural sinus = CVST (dural sinus thrombosis) → confirm with CTV/MRV"], "think": {"label": "CRITICAL!", "text": "**Missing the hyperdense MCA sign = missed acute stroke.** Deliberately check every MCA when stroke is on the differential - even subtle hyperdensity counts."}}, {"icon": "08", "title": "Posterior Fossa & Brainstem", "subtitle": "Most commonly missed - especially on CT", "bullets": ["§What to look for", "🔵 **Cerebellum:** PICA infarct = wedge-shaped. Swelling → fatal herniation → urgent posterior fossa decompression", "🧠 **Brainstem:** Pontine hemorrhage (HTN) = bilateral \"butterfly\" hyperdensity. Catastrophic prognosis", "📐 **4th ventricle:** Compressed = posterior fossa mass. Expanded + child = medulloblastoma. Adult = ependymoma", "⬇️ **Foramen magnum:** Cerebellar tonsils >5mm below FM = Chiari I malformation", "🔍 **CPA angle:** Acoustic schwannoma most common - ice cream cone filling internal auditory meatus"], "think": {"label": "CAUTION!", "text": "Severe beam hardening artifact from petrous bones on CT. Small lesions are often invisible. **MRI is always superior for posterior fossa pathology!**"}}, {"icon": "09", "title": "Skull, Sinuses & Orbits", "subtitle": "Always use bone window - don't stop at the brain", "bullets": ["§Skull (bone window)", "💀 **Fractures:** Linear (common), depressed (compound?), basilar - fluid in sphenoid = base of skull fracture", "🔍 **Lytic lesions:** Myeloma, metastases, Langerhans cell histiocytosis", "⬜ **Sclerotic lesions:** Paget's, fibrous dysplasia, osteoblastic mets", "§Sinuses & Mastoids", "💧 Sphenoid sinus fluid in trauma = base of skull fracture until proven otherwise", "🦻 Mastoid opacification + non-filling sigmoid sinus on CTV = otogenic lateral sinus thrombosis (missed diagnosis!)", "👁️ Proptosis, orbital wall fracture, retrobulbar hemorrhage - check orbital slices carefully"]}, {"icon": "10", "title": "Extra-Axial Spaces & Meninges", "subtitle": "The space around the brain matters as much as the brain itself", "bullets": ["🔴 **Epidural space:** Biconvex collection = EDH. Does NOT cross suture lines", "🟠 **Subdural space:** Crescent collection. DOES cross sutures. Does NOT cross falx. Chronic = isodense/hypodense", "🟡 **Subarachnoid:** CSF density normally. Hyperdensity = SAH. FLAIR bright = SAH/meningitis on MRI", "🟢 **Sulcal widening:** Diffuse = atrophy. Asymmetric = check for adjacent pathology"]}, {"icon": "11", "title": "Normal Variants & Incidentals", "subtitle": "Know what's normal so you don't over-report", "bullets": ["§Benign / Normal Findings", "✅ **Pineal calcification** - normal in adults. Worry if >1cm or in child <10yrs", "✅ **Choroid plexus calcification** - normal in adults", "✅ **Pacchionian granulations** - arachnoid granulations indenting dural sinuses - normal", "✅ **Virchow-Robin spaces** - follow CSF density/signal on ALL sequences", "✅ **Cavum septum pellucidum** - CSF space between septal leaflets - normal variant", "§🚨 Never Miss These", "🚨 Hyperdense MCA or basilar artery sign", "🚨 Effaced basal cisterns - herniation imminent", "🚨 Unexpected acute hemorrhage in any location", "🚨 Uncal herniation signs - effaced ipsilateral suprasellar cistern", "🚨 Non-accidental injury pattern - SDH of different ages in children"]}, {"icon": "12", "title": "Formulate Your Report", "subtitle": "Systematic conclusion before you write anything", "bullets": ["📝 **Technique:** State modality, slices, contrast or not", "📝 **Findings:** Go through each region systematically - don't just describe the obvious finding", "📝 **Impression:** Lead with the most critical finding. Provide a differential if uncertain", "📞 **Communicate urgent findings immediately** - don't wait for a typed report", "🔄 Recommend follow-up or further imaging if needed (e.g., MRI for posterior fossa, CTA for vessel query)"], "think": {"label": "PEARL!", "text": "**Report tip:** Always end with \"Clinical correlation recommended\" only when genuinely uncertain - don't use it as a cop-out for every report!"}}, {"icon": "13", "title": "⚡ Emergency Quick Reference", "subtitle": "CT Brain critical findings at a glance", "bullets": ["**Acute Stroke**: CT: subtle hypodensity + loss of GWJ + hyperdense MCA sign", "**SAH**: Hyperdense sulci/basal cisterns → CTA immediately", "**EDH**: Biconvex, arterial. Lucid interval. Call neurosurgery NOW", "**SDH**: Crescent, venous. Acute=bright, chronic=dark. Check subdural window!", "**Raised ICP**: Effaced cisterns + sulcal loss → herniation imminent", "**CVST**: Dense sinus on CT. Confirm with CTV. Mimics stroke/ICH", "**Cerebellar Infarct**: Wedge-shape posterior fossa. Can swell → fatal if missed", "**Pontine Hemorrhage**: Bilateral hyperdensity. Catastrophic prognosis. HTN cause"]}]}, {"key": "mri", "name": "MRI Brain", "short": "MRI Brain", "accent": "#9333ea", "icon": "🧲", "tagline": "Know your sequences before you read the scan", "steps": [{"icon": "01", "title": "Confirm Details & Sequences Acquired", "subtitle": "Know what you have before interpreting", "bullets": ["**Field Strength**: 1.5T vs 3T. Higher field = better resolution but more artifact", "**Sequences**: Which sequences were acquired? Missing DWI = can't exclude acute stroke", "**Gadolinium**: Enhancement = BBB breakdown. Essential for tumour/infection workup", "**Planes**: Axial (BG, ventricles), Coronal (hippocampus), Sagittal (CC, brainstem)"], "think": {"label": "CAUTION!", "text": "MRI is NOT ideal for acute bone injury or hyperacute blood (<6hrs). CT remains superior for these. Know when to use which."}}, {"icon": "02", "title": "Understand Each Sequence - What It Shows", "subtitle": "Click each sequence to review its role", "bullets": ["⚪ **Fat = bright, CSF = dark, WM slightly brighter than GM**", "🔍 Best for: anatomy, subacute blood (met-Hb bright!), fat-containing lesions, post-contrast enhancement", "💡 **T1 bright causes:** fat, subacute hemorrhage, melanin, gadolinium, calcification (sometimes), proteinaceous fluid", "⚫ **T1 dark causes:** CSF, water, necrosis, most tumours (at baseline)", "💧 **CSF = bright, pathology usually bright (edema, gliosis, tumour, demyelination)**", "🔍 Best for: edema, demyelination, ischemia (subacute), tumours, cysts, syrinx", "⚫ **T2 dark causes:** acute blood (deoxyhemoglobin), calcification, melanin, air, dense cellularity (lymphoma, meningioma)", "⚠️ T2 is sensitive but not specific - nearly every pathology is bright on T2", "🌊 **Like T2 but CSF is nulled (dark) - lesions near CSF become visible**", "🔍 Best for: periventricular MS plaques, cortical lesions, SAH (bright sulci!), encephalitis, hippocampal signal change", "⚠️ **FLAIR bright sulci =** SAH, meningitis, leptomeningeal carcinomatosis, or high O₂ (ICU patients)", "💡 DWI + FLAIR mismatch in stroke: DWI positive + FLAIR negative = infarct <4.5 hours (thrombolysis window!)", "⚡ **DWI bright + ADC dark = TRUE restricted diffusion = ACUTE INFARCT (within minutes of onset!)**", "⚠️ **T2 shine-through trap:** DWI bright + ADC BRIGHT = NOT true restriction - old T2 lesion. ALWAYS check ADC!", "🔍 DWI restriction also in: abscess (pus restricts strongly), epidermoid cyst, lymphoma, CJD (cortical ribboning), hypercellular tumours", "🕐 Stroke DWI positivity: within minutes → up to ~7-10 days. After that may normalise (pseudonormalisation)", "💊 DWI + FLAIR mismatch → infarct within 4.5h window → eligible for thrombolysis (wake-up stroke protocol)", "⚫ **Sensitive to paramagnetic substances → dark \"blooming\" artifact (appears larger than true size)**", "🔍 Best for: microbleeds (HTN, CAA, DAI), cavernomas, venous malformations, calcification vs blood", "💡 SWI is more sensitive than GRE - preferred for microhemorrhage detection", "🔄 **HTN microbleeds:** deep, basal ganglia, brainstem. **CAA microbleeds:** lobar/cortical distribution", "🧠 **DAI (diffuse axonal injury):** SWI shows punctate bleeds at grey-white junctions, corpus callosum, brainstem"]}, {"icon": "03", "title": "Midline Shift, Mass Effect & Herniation", "subtitle": "Same rules as CT - assess before parenchyma detail", "bullets": ["📍 Septum pellucidum displacement from midline = midline shift. ≥5mm = significant", "💧 Sulcal effacement, ventricular compression, basal cistern loss = mass effect / raised ICP", "🔴 **Subfalcine:** Cingulate gyrus under falx on coronal T2/FLAIR", "🔴 **Uncal:** Medial temporal herniation on coronal T2 → effaced suprasellar cistern + CN3 stretch → ipsilateral blown pupil", "🔴 **Tonsillar:** Cerebellar tonsils below foramen magnum on sagittal T1 - >5mm = Chiari I"]}, {"icon": "04", "title": "Blood Products - Dating Hemorrhage on MRI", "subtitle": "Every stage has a distinct T1/T2 signal pattern", "bullets": ["**Hyperacute**: <6 hrs · Oxyhemoglobin · Iso/Dark · Bright · Variable", "**Acute**: 6h - 3d · Deoxyhemoglobin · Iso/Dark · Dark · Dark bloom", "**Early subacute**: 3 - 7d · Intracellular met-Hb · Bright · Dark · Dark bloom", "**Late subacute**: 1 - 4 wk · Extracellular met-Hb · Bright · Bright · Dark bloom", "**Chronic**: >4 wk · Hemosiderin · Dark · Dark · Dark bloom"], "think": {"label": "PEARL!", "text": "💎 **Memory aid:** \"BIRD\" - Bright In subacute (T1). GRE/SWI always blooms dark for any blood product - the most sensitive sequence for microbleeds and old hemorrhage."}}, {"icon": "05", "title": "Ventricles, White Matter & Parenchyma", "subtitle": "Systematic lobe-by-lobe review on all sequences", "bullets": ["§White matter lesions - FLAIR is key", "🔵 **Periventricular + juxtacortical + infratentorial:** MS plaques (Dawson's fingers = perpendicular to ventricles on sagittal FLAIR)", "⚪ **Subcortical small vessel disease:** Confluent periventricular WM changes, lacunar infarcts in BG/thalamus", "🌊 **CADASIL:** Anterior temporal pole + external capsule WM changes + family history", "🧠 **Corpus callosum lesions:** MS (Dawson's fingers on sagittal), lymphoma, PRES, trauma (DAI)", "§Hippocampus (coronal T2 / FLAIR)", "📐 Mesial temporal sclerosis (MTS): unilateral hippocampal atrophy + T2/FLAIR signal increase + loss of internal architecture", "🔥 Limbic encephalitis (HSV, anti-NMDA): bilateral medial temporal FLAIR hyperintensity"]}, {"icon": "06", "title": "Lesion Characterisation on MRI", "subtitle": "A systematic approach to any brain lesion", "bullets": ["§For every lesion, answer these questions", "📍 **Location:** Intra-axial vs extra-axial? Which lobe? Deep vs cortical? Which vascular territory?", "🔢 **Number:** Single (primary tumour, abscess, tumefactive MS) vs multiple (mets, MS, septic emboli, cavernomas)", "📏 **Margins:** Well-defined (met, abscess) vs infiltrative (HGG, lymphoma, encephalitis)", "💧 **Edema:** Extensive vasogenic = met/HGG. Minimal = LGG, cavernoma", "✨ **Enhancement pattern:** Solid, ring, nodular, no enhancement?", "⚡ **DWI:** Restricts? (Abscess, lymphoma, hypercellular tumour)", "⬛ **SWI:** Blooms? (Cavernoma, calcification, hemorrhagic met, AVM)", "§Ring enhancing lesion DDx", "**Abscess**: Smooth THIN ring. DWI bright inside (pus restricts!). Surrounding edema. Fever + source", "**GBM / HGG**: THICK irregular ring. No DWI restriction inside. Infiltrative margins. Crosses corpus callosum", "**Metastasis**: Well-defined ring. Grey-white junction location. Multiple lesions. Known primary", "**Tumefactive MS**: OPEN ring (incomplete). DWI at active margin. Young patient. Other MS lesions"]}, {"icon": "07", "title": "Posterior Fossa, Brainstem & Vessels", "subtitle": "MRI is the gold standard here - use it", "bullets": ["🌊 **Flow void:** Normal arteries = dark on T1/T2. Loss of flow void = thrombus or slow flow (CVST, AVM nidus)", "⚡ **MRA (TOF):** Circle of Willis, aneurysm, stenosis, occlusion. No contrast needed", "🔵 **MRV:** Dural venous sinuses. Filling defect = CVST. Superior sagittal sinus most commonly affected", "🧠 **Brainstem:** Small lacunar infarcts, central pontine myelinolysis (CPM - DWI + T2 bright trident sign), brainstem glioma in children", "⬇️ **Sagittal T1:** Corpus callosum integrity, pituitary, aqueduct, cerebellar tonsil position (Chiari)"], "think": {"label": "PEARL!", "text": "💎 **CVST tip:** DWI may show restricted diffusion in the sinus (thrombus) OR in adjacent parenchyma (venous infarct). Venous infarcts don't respect arterial territories!"}}, {"icon": "08", "title": "⚡ Emergency Quick Reference", "subtitle": "MRI Brain critical findings at a glance", "bullets": ["**Acute Stroke**: DWI bright + ADC dark within minutes. DWI+FLAIR mismatch = <4.5h window", "**SAH**: FLAIR bright sulci. CT may be negative after 24h. MRI FLAIR more sensitive late", "**Abscess**: DWI bright INSIDE ring = pus. Thin smooth ring enhancement", "**Encephalitis**: FLAIR bright medial temporal (HSV). Check DWI. Urgent LP", "**CVST**: Loss of flow void in sinus. Filling defect on MRV. Venous infarct ≠ arterial territory", "**Tumefactive MS**: Open ring enhancement. Young patient. DWI at margins", "**GBM**: Thick irregular ring. Crosses CC. No DWI inside. Infiltrative", "**Microbleeds**: SWI/GRE blooming. HTN=deep. CAA=lobar. DAI=GWJ/CC"]}]}, {"key": "echo", "name": "Echocardiogram", "short": "ECHO", "accent": "#db2777", "icon": "❤️", "tagline": "Function, structure, then flow", "steps": [{"icon": "💪", "title": "Ejection Fraction", "bullets": ["Normal EF: **55-70%**", "**HFrEF** (heart failure with reduced EF): EF <40%", "**HFpEF** (heart failure with preserved EF): EF normal but diastolic dysfunction present", "Assessed visually or more accurately by Simpson's biplane method"]}, {"icon": "📦", "title": "Chamber Size & Wall Thickness", "bullets": ["Check every chamber for dilatation", "**Left ventricular hypertrophy** → hypertension, aortic stenosis, hypertrophic cardiomyopathy", "Dilated atria are common in longstanding atrial fibrillation or valve disease"]}, {"icon": "🚪", "title": "Valves", "bullets": ["Assess each valve for **stenosis** (restricted opening, high velocity jet) or **regurgitation** (leaking backward)", "Doppler estimates pressure gradients and quantifies severity", "A bicuspid aortic valve is a common congenital finding predisposing to stenosis later in life"]}, {"icon": "🌊", "title": "Wall Motion", "bullets": ["Regional wall motion abnormalities suggest a prior infarction in that coronary territory", "Global hypokinesia (all walls moving poorly) suggests a dilated cardiomyopathy"]}, {"icon": "💧", "title": "Pericardium", "bullets": ["Check for a pericardial effusion and signs of tamponade physiology (right-sided chamber collapse, respiratory variation in flow)"], "note": {"peds": "Echo is the primary diagnostic tool for congenital heart disease in neonates/infants - septal defects, valve anomalies, and great vessel abnormalities.", "adult": "Adults are more often scanned for acquired disease - ischaemic damage, degenerative valve disease, and hypertensive changes."}}]}, {"key": "lipid", "name": "Lipid Profile", "short": "Lipids", "accent": "#16a34a", "icon": "🧈", "tagline": "LDL is the target, HDL is the protector", "steps": [{"icon": "📊", "title": "The Four Numbers", "bullets": ["Total cholesterol, **LDL**, **HDL**, and triglycerides", "LDL is usually calculated (Friedewald equation) unless triglycerides are very high, in which case it's measured directly", "A fasting sample is traditionally preferred, though non-fasting testing is now widely accepted"]}, {"icon": "🎯", "title": "LDL Cholesterol", "bullets": ["'Bad' cholesterol - the main driver of atherosclerotic plaque formation", "Target level depends on the patient's overall cardiovascular risk category (primary vs secondary prevention)"]}, {"icon": "🛡️", "title": "HDL Cholesterol", "bullets": ["'Good' cholesterol - helps transport cholesterol away from arteries back to the liver", "Low HDL is itself an independent cardiovascular risk factor, regardless of the LDL level"], "think": {"label": "THINK!", "text": "L for Lousy (LDL), H for Healthy (HDL) - a simple way to remember which one you want low and which you want high."}}, {"icon": "🍔", "title": "Triglycerides", "bullets": ["Very high levels (>1000 mg/dL / >11.3 mmol/L) risk acute pancreatitis", "Often elevated with poor diet, alcohol excess, obesity, and uncontrolled diabetes", "Very high triglycerides can also cause a falsely low calculated LDL - direct measurement is then needed"], "note": {"peds": "Familial hypercholesterolaemia should be suspected in a child with a very high LDL and a strong family history of early cardiac events.", "adult": "Lipid profile is part of routine cardiovascular risk scoring in adults, alongside blood pressure, smoking, and diabetes status."}}]}, {"key": "card", "name": "Cardiac Markers", "short": "Troponin", "accent": "#b91c1c", "icon": "🫀", "tagline": "Timing is everything", "steps": [{"icon": "⏳", "title": "Troponin Kinetics", "bullets": ["Rises **3-6 hours** after myocardial injury begins", "Peaks at **12-24 hours**, and stays elevated for **7-14 days**", "Highly sensitive and cardiac-specific for myocardial injury of any cause"]}, {"icon": "🔁", "title": "Serial Testing", "bullets": ["A single normal troponin taken too early does NOT exclude ACS", "Repeat at 3-6 hours (or per high-sensitivity protocol) to look for a genuine **rise and/or fall** pattern"], "think": {"label": "THINK!", "text": "One troponin tells you a moment in time - a SERIES of troponins tells you the story."}}, {"icon": "⚠️", "title": "Causes of a Raised Troponin", "bullets": ["Not just ACS - also pulmonary embolism, sepsis, renal failure, myocarditis, heart failure, arrhythmia, strenuous exercise", "Always interpret the value alongside the ECG and the full clinical picture, never in isolation"]}, {"icon": "🕐", "title": "Other Markers", "bullets": ["**CK-MB** - rises faster and normalises sooner than troponin; historically useful for detecting early reinfarction", "**Myoglobin** - rises very early but is not cardiac-specific (also released from skeletal muscle injury)"], "note": {"peds": "Elevated troponin in children is far more likely due to myocarditis or Kawasaki disease than atherosclerotic ACS.", "adult": "In adults, troponin trend + ECG + clinical risk score together drive the ACS rule-out pathway."}}]}, {"key": "coag", "name": "Coagulation Profile", "short": "PT/APTT", "accent": "#57534e", "icon": "🩸", "tagline": "Two pathways, one common road", "steps": [{"icon": "🛣️", "title": "Extrinsic Pathway - PT/INR", "bullets": ["Tests factors **II, V, VII, X** and the extrinsic pathway", "Prolonged by warfarin, liver disease, and vitamin K deficiency", "INR standardises PT results across different labs/reagents - used to monitor warfarin therapy"]}, {"icon": "🛤️", "title": "Intrinsic Pathway - APTT", "bullets": ["Tests the intrinsic pathway - factors VIII, IX, XI, XII", "Prolonged by unfractionated heparin, haemophilia A/B, and lupus anticoagulant"], "think": {"label": "THINK!", "text": "PT/INR = warfarin & 'EXTRINSIC' (Play Tennis outside). APTT = heparin & 'INTRINSIC' (stays inside)."}}, {"icon": "🎯", "title": "Common Pathway", "bullets": ["Fibrinogen and the final factors (I, II, V, X) that both pathways converge on", "Low fibrinogen or **DIC (disseminated intravascular coagulation)** prolongs BOTH PT and APTT together, with low platelets and raised D-dimer"]}, {"icon": "🩹", "title": "Platelet & Bleeding Time", "bullets": ["A normal PT/APTT with abnormal clinical bleeding suggests a **platelet or vessel wall** problem, not a clotting factor deficiency", "Consider von Willebrand disease if there's a mucocutaneous bleeding pattern with normal routine coagulation tests"], "note": {"peds": "Haemophilia typically presents in early childhood with joint/muscle bleeds after minor trauma, or prolonged bleeding after circumcision.", "adult": "Acquired coagulopathy (liver disease, warfarin, DIC) is far more common than an inherited factor deficiency in adults."}}]}], "exams": [{"key": "hx", "name": "History Taking", "short": "Hx", "accent": "#0f766e", "icon": "📋", "tagline": "The story before the signs", "steps": [{"icon": "01", "title": "Opening & Patient Details", "subtitle": "Set the scene - establish rapport first", "bullets": ["🤝 Introduce yourself: name, role, purpose of consultation", "🪑 Ensure comfort, privacy and appropriate environment. Offer chaperone if needed", "📝 Confirm: **Name, Age/DOB, Occupation, Handedness** (neurology) - document before starting", "🗣️ Open question: \"What's brought you in today?\" or \"Tell me about your problem\" - then LISTEN for 2 minutes uninterrupted"]}, {"icon": "02", "title": "Presenting Complaint & History of Presenting Complaint", "subtitle": "Use SOCRATES + ICE to explore every symptom", "bullets": ["§SOCRATES Mnemonic (for pain/any symptom)", "**S - Site**: Where exactly? Ask patient to point with one finger. Localised vs diffuse?", "**O - Onset**: When did it start? Sudden (seconds) vs rapid (hours) vs gradual (days/weeks)? What were you doing?", "**C - Character**: What does it feel like? Sharp, dull, aching, burning, crushing, throbbing, colicky?", "**R - Radiation**: Does it go anywhere? Arm/jaw (MI), back (aortic dissection), groin (renal colic), shoulder tip (diaphragm)", "**A - Associations**: Other symptoms? Nausea, vomiting, sweating, dyspnoea, fever, change in bowel/bladder", "**T - Time course**: Constant vs intermittent? Getting better, worse or same? Any previous episodes?", "**E - Exacerbating/Relieving**: What makes it worse/better? Movement, food, GTN, rest, posture, breathing, defaecation?", "**S - Severity**: Pain score 0-10. Compared to worst ever? Preventing daily activities? Waking from sleep?", "§ICE - Ideas, Concerns, Expectations", "**Ideas**: \"What do you think is causing your symptoms?\" - patient's own understanding and health beliefs", "**Concerns**: \"Is there anything you are particularly worried about?\" - what fears does the patient have?", "**Expectations**: \"What were you hoping we might do for you today?\" - management expectations and desired outcomes"]}, {"icon": "03", "title": "Past Medical & Surgical History", "subtitle": "PMH, PSH, hospitalisations - build the medical timeline", "bullets": ["📖 \"Have you had any significant illnesses in the past?\" - prompt with MJ THREADS if needed", "🏥 Previous hospitalisations, operations, procedures, blood transfusions", "🔪 Surgical history: type of surgery, when, complications, anaesthetic issues", "⚠️ Any previous similar episodes? Diagnosed conditions? Regular follow-up?", "§MJ THREADS - Common Conditions to Screen", "**M - MI / Cardiac**: Angina, MI, heart failure, arrhythmias, rheumatic fever", "**J - Jaundice / Liver**: Hepatitis, cirrhosis, gallstones", "**T - TB / Respiratory**: TB, asthma, COPD, pneumonia", "**H - Hypertension**: BP, hyperlipidaemia, stroke, TIA", "**R - Rheumatic/Renal**: Arthritis, joint problems, kidney disease", "**E - Epilepsy / Neuro**: Seizures, blackouts, headaches, neurological conditions", "**A - Anaemia/Blood**: Anaemia, bleeding disorders, clotting problems, DVT/PE", "**D - Diabetes**: Type 1, Type 2, gestational, complications", "**S - Stroke/Surgery**: Any previous surgeries, hospitalisations, procedures"]}, {"icon": "04", "title": "Drug History & Allergies", "subtitle": "Medications - prescribed, OTC, herbal, illicit; allergies with reactions", "bullets": ["💊 \"Are you taking any medications?\" - name, dose, frequency, how long, compliance", "🌿 \"Any over-the-counter medications? Herbal remedies? Vitamins/supplements?\"", "💉 \"Any recreational drugs? Contraceptive pill?\" - ask non-judgementally", "⚠️ **Allergies:** \"Do you have any allergies?\" - Always ask: DRUG, food, environmental. Document: allergen + reaction type (anaphylaxis vs rash vs intolerance)", "🔄 Recent changes to medications? Any new drugs started before symptoms began?"], "think": {"label": "CRITICAL!", "text": "**Allergy vs intolerance - critical distinction:** Nausea/GI upset = intolerance (NOT a true allergy). Urticaria, angioedema, bronchospasm, anaphylaxis = TRUE allergy. Mislabelling causes under-treatment and medication errors."}}, {"icon": "05", "title": "Family History", "subtitle": "Three generations - construct a family tree if relevant", "bullets": ["👨‍👩‍👧 \"Is there any history of similar problems in the family?\" - parents, siblings, grandparents, children", "💔 Cardiac disease: MI at young age (<55 yrs in males, <65 in females) → familial hypercholesterolaemia, HCM", "🎗️ Cancer: colorectal (Lynch syndrome), breast/ovarian (BRCA), gastric, lung", "🧬 Genetic conditions: haemophilia, cystic fibrosis, Huntington's, sickle cell, thalassaemia", "🫀 Autoimmune: diabetes, thyroid disease, SLE, IBD - tendency to run in families", "🧠 Neurological: epilepsy, dementia (Alzheimer's, Huntington's), familial ataxias", "⚰️ Age and cause of death of parents/siblings if deceased"]}, {"icon": "06", "title": "Social History", "subtitle": "SADMA - the context that shapes health and management", "bullets": ["§SADMA Framework", "**S - Smoking**: Current/ex/never. Pack-years = (packs/day × years). Smoking type (cigarettes, shisha, cannabis). Quit date if ex", "**A - Alcohol**: Units/week (1 unit = 10ml/8g ethanol). Men <21 units/week, women <14. CAGE/AUDIT questionnaire. Type, binge pattern", "**D - Drugs**: Illicit drug use - type, frequency, route (IV drug use → hepatitis, HIV, endocarditis risk)", "**M - Marital/Relationships**: Married/partner/widowed/divorced. Dependants. Support network. Carer status", "**A - Activity/Occupation**: Job (hazards - asbestos, silica, solvents, shift work). Exercise level. ADLs - can they manage independently?", "§Additional Social Factors", "🏠 **Living situation:** House/flat, stairs, alone vs with family, ground floor? Sheltered accommodation? Care home?", "✈️ **Travel history:** Recent international travel (malaria, TB, typhoid, Dengue, COVID-19) - specific regions, activities", "🐾 **Animal contact:** Pets, farm animals, exotic animals (zoonoses - brucellosis, Q fever, psittacosis)", "🍽️ **Diet:** Vegetarian/vegan (B12 deficiency), food restrictions, appetite changes, weight loss"]}, {"icon": "07", "title": "Systems Review", "subtitle": "Brief screen of all systems - don't miss relevant symptoms", "bullets": ["**CVS**: Chest pain, palpitations, dyspnoea, orthopnoea, PND, ankle swelling, syncope, intermittent claudication", "**Respiratory**: Cough (productive?), haemoptysis, wheeze, dyspnoea, night sweats, pleuritic chest pain", "**GIT**: Nausea, vomiting, dysphagia, odynophagia, heartburn, abdominal pain, altered bowel habit, PR bleeding, melaena, weight loss, jaundice", "**Urinary**: Dysuria, frequency, nocturia, haematuria, hesitancy, poor stream, incontinence, loin pain", "**Neurological**: Headache, visual changes, seizures, weakness, numbness, speech problems, memory, balance, blackouts", "**MSK**: Joint pain/swelling/stiffness (morning stiffness duration), muscle weakness, back pain, fractures", "**Endocrine**: Thirst, polyuria, weight change, heat/cold intolerance, sweating, hair/skin/voice changes", "**Haematological**: Fatigue, pallor, bruising, bleeding tendency, lymphadenopathy, night sweats, infections", "**Obs/Gynae (♀)**: LMP, cycle regularity, menorrhagia, dysmenorrhoea, pregnancy history, smear history, HRT"], "think": {"label": "GOOD TO KNOW", "text": "**Closing the consultation:** \"Is there anything else you'd like to tell me or ask me about?\" - summarise your findings back to the patient, confirm understanding, explain next steps clearly."}}], "diff": {"peds": ["History is usually taken from a **parent/caregiver** - always document who is giving the history and how reliable they seem", "Always ask about **birth history, feeding, immunisation status, and developmental milestones**", "Growth (weight/height/head circumference, plotted on a chart) is a core part of every paediatric history", "School performance and behaviour are important in the older child"], "adult": ["History is taken directly from the patient wherever possible, with a collateral history if cognition is impaired", "Occupational, cardiovascular risk factor, and lifestyle history become central to most adult presentations", "Menstrual and obstetric history is included where relevant in adult women", "Advance care preferences become relevant in the frail or elderly adult"]}}, {"key": "gpe", "name": "General Physical Examination", "short": "GPE", "accent": "#4f46e5", "icon": "🧍", "tagline": "The head to toe overview before you focus in", "steps": [{"icon": "01", "title": "Introduction & First Impression", "subtitle": "Even before you touch the patient - observe everything", "bullets": ["🤝 Introduce yourself, confirm patient identity (name, DOB), explain the examination, gain verbal consent", "👁️ **General appearance:** Well/unwell, distressed/comfortable, obese/cachectic, jaundiced/pale/cyanosed/flushed", "🛏️ **Posture & environment:** Sitting upright vs. orthopnoea, oxygen mask, drips, drains, monitoring equipment", "🗣️ **Speech:** Normal, dysarthric, dysphonic, dysphasic", "🧠 **Mental state:** Alert, drowsy, confused, agitated - document GCS if relevant", "**Nutritional Status**: Wasting (temporal, thenar), cachexia (malignancy, TB, cardiac), obesity - note distribution (central vs peripheral)", "**Hydration**: Dry mucous membranes, skin turgor (pinch), sunken eyes, postural hypotension → dehydration"]}, {"icon": "02", "title": "Vital Signs", "subtitle": "The six vital signs - measure, interpret, act", "bullets": ["**HR (bpm)**: 60-100", "**BP (mmHg)**: 90-140 / 60-90", "**RR (breaths/min)**: 12-20", "**Temp**: 36.5-37.5°C", "**SpO₂**: ≥95%", "**BG (fasting)**: 4-11 mmol/L", "**HR >100**: Tachycardia - pain, fever, hypovolaemia, arrhythmia, anxiety, drugs · ECG, fluid status, sepsis screen", "**HR <60**: Bradycardia - drugs (β-blocker, digoxin), athletic, heart block, hypothyroidism · ECG urgently if symptomatic", "**BP <90/60**: Hypotension - sepsis, haemorrhage, cardiac failure, Addison's, neurogenic shock · IV access, fluids, urgent review", "**BP ≥140/90**: Hypertension - essential, CKD, Cushing's, phaeochromocytoma, coarctation · Check other limb, fundoscopy, urine", "**RR >20**: Tachypnoea - infection, PE, acidosis, pain, anxiety, cardiac failure · Most sensitive early sepsis marker", "**Temp >38°C**: Fever - infection, malignancy, autoimmune, drugs, pulmonary embolism · Blood cultures × 2, CRP, WBC, source"], "think": {"label": "CAUTION!", "text": "**ALWAYS measure BP in both arms** - a difference >15 mmHg suggests aortic dissection or subclavian stenosis. **RR is the most sensitive early warning sign of deterioration** - document it properly."}}, {"icon": "03", "title": "Hands & Nails", "subtitle": "A window into systemic disease - examine both hands", "bullets": ["§Nails", "**Clubbing**: Loss of nail fold angle (>180°). Causes: lung CA, fibrosing alveolitis, bronchiectasis, cyanotic CHD, IBD, cirrhosis, infective endocarditis", "**Koilonychia**: Spoon-shaped nails → iron deficiency anaemia", "**Leukonychia**: White nails → hypoalbuminaemia (liver disease, nephrotic syndrome)", "**Beau's lines**: Transverse ridges = past systemic illness (note timing by distance from matrix)", "**Splinter haemorrhages**: Infective endocarditis, vasculitis, trauma", "**Onycholysis**: Nail separation from bed → psoriasis, thyrotoxicosis, fungal infection", "§Palms & Dorsum", "**Palmar erythema**: Liver cirrhosis, pregnancy, thyrotoxicosis, RA, polycythaemia", "**Dupuytren's contracture**: Palmar fascia fibrosis → ring/little finger. Liver disease, Peyronie's, idiopathic", "**Thenar wasting**: Median nerve compression (carpal tunnel), T1 root lesion, motor neurone disease", "**Asterixis (flap)**: Outstretched hands: coarse flapping tremor = hepatic encephalopathy, CO₂ retention, uraemia"]}, {"icon": "04", "title": "Face, Eyes & Mouth", "subtitle": "Critical signs in the face - never skip", "bullets": ["§Eyes", "**Jaundice (sclerae)**: Bilirubin >35 µmol/L. Pre-hepatic, hepatic, post-hepatic - follow the algorithm", "**Anaemia (conjunctiva)**: Pallor of lower palpebral conjunctiva. Haemoglobin <~80 g/L to see clinically", "**Xanthelasma**: Periorbital cholesterol deposits → hyperlipidaemia (but can be normolipidaemic)", "**Corneal arcus**: White ring - significant if <50 yrs → hypercholesterolaemia", "**Kayser-Fleischer rings**: Copper deposits at corneal margin → Wilson's disease (needs slit-lamp)", "**Exophthalmos**: Thyrotoxicosis (Graves') - lid lag, lid retraction, chemosis", "§Mouth & Mucous Membranes", "🔵 **Central cyanosis:** Bluish tongue/lips → SpO₂ <85%. Peripheral = cold hands only (vasospasm/vasoconstriction)", "🟡 **Angular stomatitis / glossitis:** Iron, B12, folate, riboflavin deficiency", "⬜ **Oral candidiasis:** Immunosuppression (HIV, steroids, chemotherapy)", "🟫 **Pigmented buccal mucosa:** Addison's disease (also scars, gums)"]}, {"icon": "05", "title": "Lymph Nodes & Neck", "subtitle": "Systematic lymph node examination - head, neck, axillae, groins", "bullets": ["§Cervical Lymph Node Groups (examine from behind)", "**Submental & Submandibular**: Floor of mouth, lip, cheek pathology. Dental infection", "**Anterior cervical**: Tonsillar → tonsillitis, pharyngitis, EBV", "**Posterior cervical**: EBV/CMV, TB, lymphoma, scalp infection", "**Supraclavicular**: **Always pathological**. Left (Virchow's = Troisier's) → gastric/abdominal malignancy. Right → lung/mediastinal", "**Axillary**: Breast cancer, upper limb infection, lymphoma", "**Inguinal**: Lower limb, perineal pathology. Reactive common. Fixed/hard → malignancy", "§Thyroid", "👀 Inspect from front - any midline swelling (goitre)? Asymmetry?", "💧 Ask to swallow water - thyroid and thyroglossal cysts rise. Lymph nodes do NOT", "🖐️ Palpate from behind - lobes, isthmus, consistency, tender, nodular?", "🔊 Auscultate for bruit → Graves' hyperthyroidism (increased vascularity)"], "think": {"label": "CAUTION!", "text": "**Hard, fixed, non-tender, rubbery lymph nodes = malignancy until proven otherwise.** Soft, tender, fluctuant = infection/reactive. Always examine all groups - generalised lymphadenopathy = EBV, lymphoma, HIV, CMV, sarcoid"}}, {"icon": "06", "title": "Oedema & Peripheral Signs", "subtitle": "Pitting vs non-pitting - always examine legs and sacrum", "bullets": ["**Pitting Oedema**: Finger pressure leaves pit. Causes: cardiac failure (↑venous pressure), hypoalbuminaemia (nephrotic, cirrhosis, malnutrition), lymphoedema, venous insufficiency, drugs (CCBs, NSAIDs)", "**Non-Pitting Oedema**: Does NOT pit. Causes: lymphoedema (post-radiotherapy, malignancy, filariasis), myxoedema (hypothyroidism - cool, doughy, non-pitting pretibial)", "§Grading Pitting Oedema", "**1+**: 2 mm · Immediate · Foot/ankle only", "**2+**: 4 mm · <15 sec · Below knee", "**3+**: 6 mm · 1-2 min · To knee", "**4+**: 8 mm+ · >2 min · Generalised/anasarca"], "think": {"label": "THINK!", "text": "**Always examine the sacrum in bed-bound patients** - gravity-dependent oedema collects there, not the ankles. Bilateral oedema = systemic. Unilateral = local (DVT, lymphoedema, cellulitis)"}}], "diff": {"peds": ["Plot **weight, height/length, and head circumference** on standardised growth charts every visit", "Assess for **dysmorphic features** and screen developmental milestones appropriate to age", "Normal vital sign ranges are strongly age-dependent - a 'normal' adult heart rate would be significantly tachycardic in a neonate", "Examination is often opportunistic - do the least distressing/most cooperative parts first"], "adult": ["Greater focus on cardiovascular risk exam findings (BMI, waist circumference, blood pressure)", "Occupational and lifestyle-related signs (nicotine staining, tattoos, needle marks) carry diagnostic weight", "Frailty and functional assessment become important in the elderly adult"]}}, {"key": "cvs", "name": "Cardiovascular Examination", "short": "CVS", "accent": "#dc2626", "icon": "❤️", "tagline": "Inspect, palpate, auscultate, from the hands to the ankles", "steps": [{"icon": "01", "title": "General Inspection & Approach", "subtitle": "From the end of the bed - before you touch the patient", "bullets": ["§Before approaching", "🙋 Introduce yourself, confirm patient identity, gain consent", "🛏️ Position patient at **45° incline** - standard for JVP assessment", "👁️ Stand at foot of bed - scan for: breathlessness, pallor, cyanosis, distress, cachexia", "§General inspection - look for", "**🏥 Bedside clues**: GTN spray, inhalers, oxygen, cardiac monitors, pacemaker box, GTN patch on chest", "**📋 Patient appearance**: Malar flush (MS), cyanosis (central/peripheral), pallor, jaundice, cachexia (heart failure), diaphoresis", "**🫁 Breathing**: Use of accessory muscles, pursed-lip breathing, Cheyne-Stokes respiration (severe HF)", "**💉 Lines/Devices**: IVs, O2 delivery, cardiac telemetry leads, surgical scars visible from bed"]}, {"icon": "02", "title": "Hands & Peripheral Signs", "subtitle": "Nails → wrists → arms - a wealth of information", "bullets": ["§Nails", "**Clubbing**: Loss of nail-fold angle (Schamroth's sign). Causes: IE, cyanotic CHD, atrial myxoma", "**Splinter Haemorrhages**: Linear dark streaks under nails. **Infective endocarditis** (also trauma)", "**Koilonychia**: Spoon-shaped nails → iron deficiency anaemia", "**Leukonychia**: White nails → hypoalbuminaemia (chronic HF, cirrhosis)", "§Palms & Hands", "🌡️ **Temperature:** Warm/cool peripheries - check capillary refill (<2 sec normal)", "🔴 **Palmar erythema:** High-output states (thyrotoxicosis, liver disease, pregnancy, HF)", "🔴 **Osler's nodes:** Painful red nodules on finger pulps → Infective Endocarditis (immune complex)", "🔴 **Janeway lesions:** Painless flat red macules on palms/soles → IE (septic emboli)", "💛 **Tendon xanthomata:** Yellow deposits over tendons → familial hypercholesterolaemia", "🫀 **Dupuytren's contracture:** Palmar fibrosis - associated with alcohol (dilated cardiomyopathy)", "§Radial Pulse", "**Rate**: Count for 30 sec × 2. Normal 60-100 bpm. Report bradycardia (<60) or tachycardia (>100)", "**Rhythm**: Regular / regularly irregular / **irregularly irregular** (AF). Count for 1 full minute if irregular", "**Character**: Volume: full (aortic regurgitation) / low (shock, AS). Collapsing (waterhammer) = AR", "**Radio-radial delay**: Check both radials simultaneously → delay = aortic arch pathology / coarctation"], "think": {"label": "CAUTION!", "text": "**Collapsing/waterhammer pulse test:** Elevate patient's arm above heart level while feeling pulse - exaggerated impulse = aortic regurgitation. Always ask about pain first!"}}, {"icon": "03", "title": "Blood Pressure & Brachial Pulse", "subtitle": "Correct technique is essential for accuracy", "bullets": ["💪 Expose arm fully, apply cuff 2-3 cm above antecubital fossa, at heart level", "🔍 Palpate brachial pulse first - estimate systolic before auscultation", "🩺 Place stethoscope over brachial artery - listen for Korotkoff sounds", "📊 Record both arms - >20 mmHg difference = aortic dissection / subclavian stenosis", "🏃 Check for **postural hypotension** if clinically indicated (lying → standing → fall >20 systolic)", "**Pulsus paradoxus**: SBP drops >10 mmHg on inspiration → cardiac tamponade, constrictive pericarditis, severe asthma", "**Pulsus alternans**: Alternating strong/weak pulses → severe LV dysfunction", "**Wide pulse pressure**: >60 mmHg → AR, thyrotoxicosis, anaemia, Paget's, AV fistula", "**Narrow pulse pressure**: <25 mmHg → AS, tamponade, cardiogenic shock, hypovolaemia"]}, {"icon": "04", "title": "Face & Neck Inspection", "subtitle": "Eyes, mouth, JVP - don't rush this", "bullets": ["§Eyes", "🟡 **Xanthelasma:** Yellow plaques around eyelids → hypercholesterolaemia", "⬜ **Corneal arcus:** White ring around cornea. In <50 yrs → familial hyperlipidaemia", "🔴 **Conjunctival pallor:** Pull down lower lid → pale conjunctiva = anaemia → high-output HF, IE", "🟡 **Scleral icterus:** Jaundice → haemolysis (prosthetic valve), right HF with hepatic congestion", "🔵 **Argyll Robertson pupils:** Syphilitic aortitis (rare but examined!)", "§Mouth", "💙 **Central cyanosis:** Blue lips/tongue = SaO2 <85% - significant hypoxia", "⬜ **Dental hygiene:** Poor dentition → risk factor for infective endocarditis", "🔴 **High-arched palate:** Marfan syndrome (AR, MVP, aortic dissection)", "§JVP - Jugular Venous Pressure", "**Normal JVP**: <3 cm above sternal angle. Double waveform (a + v waves). Decreases with inspiration", "**Raised JVP**: Right HF, cor pulmonale, tamponade, SVCO, fluid overload, constrictive pericarditis", "**Absent a-wave**: Atrial fibrillation (no coordinated atrial contraction)", "**Giant v-wave**: Tricuspid regurgitation - systolic pulsation in neck veins", "**Cannon a-wave**: Complete heart block, VT, junctional rhythm (atrium contracts against closed TV)", "**Kussmaul's sign**: JVP rises on inspiration → constrictive pericarditis, restrictive cardiomyopathy", "**Hepatojugular reflex:** Apply firm pressure over liver for 15 sec - JVP rises >3 cm = right heart failure / tricuspid regurgitation"], "think": {"label": "THINK!", "text": "Position at **45°**. Turn head slightly away. Look for double waveform pulsation in the right internal jugular vein (not carotid - JVP is not palpable, obliterates with pressure, and changes with respiration)"}}, {"icon": "05", "title": "Precordial Inspection & Palpation", "subtitle": "Before the stethoscope goes on", "bullets": ["§Inspect the precordium", "🔍 Chest deformity - **pectus excavatum** (MVP, Marfan), pectus carinatum", "⭐ Visible apex beat or abnormal pulsations", "🪡 Surgical scars - sternotomy (CABG, valve replacement), lateral thoracotomy (mitral valvotomy), pacemaker scar (left infraclavicular)", "📍 Pacemaker/ICD device bulge below left clavicle", "💧 Visible chest wall pulsations - right ventricular heave", "§Apex Beat - Palpation", "**Location (Normal)**: 5th intercostal space, midclavicular line. Use **flat of hand** first, then fingertips", "**Displaced laterally**: LV dilation → volume overload (AR, MR), dilated cardiomyopathy", "**Heaving / Sustained**: LV hypertrophy → AS, hypertension (pressure overload)", "**Hyperdynamic**: Vigorous but not sustained → volume overload (AR, MR, high-output)", "**Double impulse**: HOCM - pre-systolic impulse from atrial kick + systolic impulse", "**Impalpable**: Obesity, COPD (barrel chest), pericardial effusion, dextrocardia", "§Other Palpation Points", "✋ **Parasternal heave (left sternal edge):** Right ventricular hypertrophy (cor pulmonale, MS, PE, pulmonary HTN)", "✋ **Palpable P2 (pulmonary area):** Pulmonary hypertension", "📳 **Thrills:** Palpable murmurs - grade ≥4/6 by definition. Systolic thrill at base = AS or PS. Diastolic thrill at apex = MS"]}, {"icon": "06", "title": "Auscultation - Heart Sounds & Murmurs", "subtitle": "The core skill - systematic 4-area approach", "bullets": ["§Auscultation Areas (in order)", "**① Aortic Area**: 2nd ICS, right sternal border. Use **diaphragm**. Best for AS", "**② Pulmonary Area**: 2nd ICS, left sternal border. Best for PS, pulmonary regurgitation", "**③ Tricuspid Area**: 4th-5th ICS, left sternal border. Best for TR, TS", "**④ Mitral Area (Apex)**: 5th ICS, MCL. **Bell** for low-freq sounds (MS, S3, S4), diaphragm for others", "§Normal Heart Sounds", "🔴 **S1 (Lub):** Mitral + tricuspid valve CLOSURE. Best at apex. Loud in MS (early), soft in MR, long PR", "🔵 **S2 (Dub):** Aortic + pulmonary valve CLOSURE. Best at base. Listen for splitting", "🔵 **A2-P2 splitting:** Physiological on inspiration. Fixed splitting = ASD. Paradoxical = LBBB, AS", "§Added Heart Sounds", "**S3 (Ventricular gallop)**: Early diastole, low-pitched, apex with bell. **Volume overload:** HF, MR, AR, hyperkinetic states. Normal in young/pregnancy", "**S4 (Atrial gallop)**: Late diastole (pre-systolic), low-pitched. Stiff, non-compliant LV. **HTN, AS, HOCM, HCM**. Never normal", "**Opening Snap (OS)**: High-pitched, early diastole, medial to apex. **Mitral stenosis.** Closer to S2 = more severe MS", "**Ejection Click**: Early systole after S1. Aortic/pulmonary - bicuspid AV, PS. Moves with respiration if pulmonary", "**Mid-systolic Click**: Apex, followed by late systolic murmur = **MVP (mitral valve prolapse)**", "**Pericardial friction rub**: Scratchy, 3-component, best leaning forward at expiration. **Pericarditis.** Varies with position", "§Murmur Assessment - Always Report ALL of These", "**Timing**: Systolic / Diastolic / Continuous", "**Grade**: 1 (barely audible) → 6 (audible without stethoscope)", "**Location**: Where loudest - apex / LSE / base / axilla", "**Radiation**: Axilla (MR), neck/carotids (AS), back (PS/coarctation)", "**Character**: Harsh / blowing / rumbling / high-pitched / low-pitched"], "think": {"label": "THINK!", "text": "**Auscultate axilla for MR radiation, then carotids for AS radiation.** Always listen with patient leaning forward (expiration held) for AR. Left lateral decubitus position for MS."}}, {"icon": "07", "title": "Lung Bases & Peripheral Oedema", "subtitle": "Complete the CVS exam", "bullets": ["§Lung bases (posterior)", "🫁 Percuss from shoulder → base bilaterally - dullness = pleural effusion (HF)", "🩺 Auscultate both bases - **fine bibasal crepitations** = pulmonary oedema (HF)", "🔊 Coarse crackles + bronchial breathing = consolidation/pneumonia (rule out)", "§Peripheral Oedema", "👣 Inspect ankles/shins - bilateral pitting oedema = right HF / hypoalbuminaemia / venous insufficiency", "👆 Press firmly over tibia/sacrum (bedridden patients) for 5 seconds - pitting = fluid overload", "📏 Document extent - ankle / mid-shin / knee / thigh", "📍 Unilateral oedema → DVT (not cardiac) - check Homan's sign (dorsiflexion calf pain)", "§Abdomen (hepatomegaly / splenomegaly)", "🫀 **Hepatomegaly:** Tender, pulsatile (TR), smooth enlarged liver = right HF / hepatic congestion", "🔴 **Splenomegaly:** Infective endocarditis (septic emboli), portal hypertension", "🩸 **Ascites:** Right HF, constrictive pericarditis - shifting dullness, fluid thrill"], "think": {"label": "CRITICAL!", "text": "**Always complete your exam by saying:** \"To complete my CVS examination I would also check: oxygen saturations, 12-lead ECG, CXR, and request relevant bloods (BNP, troponin, U&E, FBC, LFTs).\""}}], "diff": {"peds": ["Always palpate the **femoral pulses** in every child exam - absent or delayed pulses strongly suggest coarctation of the aorta", "Check for **central cyanosis and failure to thrive**, both important markers of congenital heart disease", "A precordial bulge can indicate cardiomegaly present since early infancy"], "adult": ["Greater focus on ischaemic heart disease risk factor assessment and ECG correlation", "Signs of infective endocarditis are interpreted in the context of risk factors like IV drug use or prosthetic valves", "Peripheral vascular disease and carotid bruits become more relevant with age"]}}, {"key": "resp", "name": "Respiratory Examination", "short": "Resp", "accent": "#0ea5e9", "icon": "🫁", "tagline": "Same four steps, top to bottom, front and back", "steps": [{"icon": "01", "title": "General Inspection", "subtitle": "From the end of the bed - appearance, environment, breathing pattern", "bullets": ["🙋 Introduce, confirm ID, gain consent. Position at **45°**", "🏥 **Bedside:** Inhalers, spacers, nebuliser, O2 mask, sputum pot, peak flow meter, smoking history", "😰 **Distress:** Dyspnoea at rest, inability to complete sentences, pursed-lip breathing", "💙 **Cyanosis:** Central (tongue/lips → SaO2 <85%) vs peripheral (fingertips → vasoconstriction)", "📏 **Chest shape:** Barrel chest (COPD - AP = transverse diameter), pectus excavatum/carinatum, kyphoscoliosis (restrictive defect), Harrison's sulcus (childhood asthma)", "🔄 **Chest movement:** Symmetrical? Unequal expansion = pneumothorax, pleural effusion, pneumonia, collapse on that side", "⚡ **Use of accessory muscles:** SCM, scalenes, interco
